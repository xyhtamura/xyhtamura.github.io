<style>

    /* halocline ground — under-surface indigo, saline light from above */

    --ground-1:#0e1430;

    --faint:#7e90b8;     /* periwinkle */

  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;overflow:hidden;background:var(--ground-0)}
  body{font-family:"DM Mono",monospace;color:var(--ink);-webkit-tap-highlight-color:transparent;touch-action:none;cursor:crosshair}

  #title.dim{opacity:.35}

/* UI Toggle Class */
  body.hide-ui #title,

    opacity: 0 !important;
    pointer-events: none !important;
  }
  /* wet/dry send — the collection's one shared control */
  #fx{position:fixed;left:50%;bottom:max(22px,env(safe-area-inset-bottom));transform:translateX(-50%);
      display:flex;align-items:center;gap:11px;opacity:.32;transition:opacity .5s ease;z-index:5;user-select:none}
  #fx:hover{opacity:.95}
  #fx .lbl{font-size:9.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--faint)}

  <div class="gi">
    <h1>cytophone: halocline</h1>
    <p>a boundary layer that sings.</p>

<script>
"use strict";
/* ============================================================
   cytophone — halocline
   the sustained sibling. where understory & xenolith STRIKE and
   decay, halocline cells BOW: each excitation swells a held tone
   that breathes on a slow current and beats against itself, then
   releases. mid register — it overlaps the gong below and the bell
   above, so the three sit together as one body of water.

   size      -> pitch (big cell = deeper, mid band ~140..520 Hz)
   energy    -> loudness + brightness (an opened lowpass = "bowed harder")
   hue       -> beating rate / current speed (the salinity gradient)
   geometry  -> spectral tilt (rounder = darker/vowelly, lobed = reedier)
   one wet/dry send into a wide, watery plate.
   ============================================================ */

const rnd=(a,b)=>a+Math.random()*(b-a);
const clamp=(v,a,b)=>v<a?a:v>b?b:v;
const lerp=(a,b,t)=>a+(b-a)*t;
const TAU=Math.PI*2;
const u=x=>0.5+0.5*Math.sin(x);

/* size -> fundamental (mid band). big body = lower voice. */
const sizeToF0 = r => clamp(10560/r, 140, 520);

/* near-harmonic voice with a faint reedy formant on the 3rd partial,
   slightly stretched so it never locks to a clean scale. */
const VOX_RATIO = [0.5, 1.0, 2.0, 3.01, 4.03, 5.06];
const VOX_AMP   = [0.30, 1.0, 0.62, 0.78, 0.34, 0.18]; // bump on partial 3 = vowel

/* ============================================================
   AUDIO  — sustained / bowed voices
   ============================================================ */
const Sound={
  ctx:null, master:null, dry:null, wet:null, comp:null, out:null, voices:0, MAX:6, wetAmt:0.42,
  start(){
    if(this.ctx) return;
    const AC=window.AudioContext||window.webkitAudioContext; const ctx=new AC(); this.ctx=ctx;

    const comp=ctx.createDynamicsCompressor();
    comp.threshold.value=-20; comp.knee.value=28; comp.ratio.value=8;
    comp.attack.value=0.006; comp.release.value=0.30;

    const out=ctx.createGain(); out.gain.value=0.0;
    const master=ctx.createGain();              // all voices land here (dry source)
    const dry=ctx.createGain();
    const conv=ctx.createConvolver(); conv.buffer=this._plate(4.2);
    const wet=ctx.createGain();

    master.connect(dry).connect(comp);
    master.connect(conv).connect(wet).connect(comp);
    comp.connect(out).connect(ctx.destination);

    this.master=master; this.dry=dry; this.wet=wet; this.comp=comp; this.out=out;
    this.setWet(this.wetAmt);
    out.gain.linearRampToValueAtTime(0.95, ctx.currentTime+1.2);
  },
  setWet(w){ this.wetAmt=w; if(!this.ctx)return;
    this.dry.gain.value = lerp(1.0,0.70,w);     // dry stays present (send style)
    this.wet.gain.value = w*0.95;               // water tail can go lush
  },
  _plate(dur){ // wide, smooth, slightly bright tail — open water, not a dark room
    const ctx=this.ctx,n=Math.floor(ctx.sampleRate*dur),b=ctx.createBuffer(2,n,ctx.sampleRate);
    for(let c=0;c<2;c++){const d=b.getChannelData(c);let lp=0;
      for(let i=0;i<n;i++){const t=i/n;
        const white=(Math.random()*2-1)*Math.pow(1-t,1.9);
        lp=lp*0.30+white*0.70;                  // light smoothing, keep shimmer
        d[i]=lp;}}
    return b;
  },

  /* bow(cell, vel) — ensure the cell has a voice, then (re)energize it.
     A voice = osc bank -> tremGain(LFO) -> envGain -> lowpass -> master. */
  bow(cell, vel){
    const ctx=this.ctx; if(!ctx) return;
    vel=clamp(vel,0,1);

    let V=cell._voice;
    if(!V){
      if(this.voices>=this.MAX) return;           // at capacity, no new voice
      V=this._spawn(cell);
      cell._voice=V; this.voices++;
    }
    const now=ctx.currentTime;

    // accumulate energy -> level & brightness
    cell.energy = Math.min(1, cell.energy + 0.32 + vel*0.7);
    const lvl = lerp(0.05, 0.30, cell.energy);
    const cut = lerp(360, 3400, cell.energy);
    const hold = 0.18;
    const release = V.release;

    // swell in, hold briefly, then long release — re-bowing glides from current value
    const eg=V.env.gain;
    eg.cancelScheduledValues(now);
    eg.setTargetAtTime(lvl, now, 0.07);
    eg.setTargetAtTime(0.0006, now+hold, release*0.32);

    const lf=V.lp.frequency;
    lf.cancelScheduledValues(now);
    lf.setTargetAtTime(cut, now, 0.08);
    lf.setTargetAtTime(520, now+hold, release*0.4);

    // schedule teardown well after it has faded; bump the deadline on each bow
    V.deadline = now + hold + release + 0.4;
    if(V.timer) clearTimeout(V.timer);
    V.timer=setTimeout(()=>this._reap(cell), (hold+release+0.55)*1000);
  },

  _spawn(cell){
    const ctx=this.ctx, now=ctx.currentTime;
    const f0=sizeToF0(cell.r);
    const geom=cell.geom;                          // 0 round .. 1 lobed
    const env=ctx.createGain(); env.gain.value=0.0001;
    const lp=ctx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=520; lp.Q.value=0.6;
    const trem=ctx.createGain(); trem.gain.value=0.86; // intrinsic; LFO sums on top

    // slow "current" tremolo — rate set by hue (salinity gradient)
    const lfo=ctx.createOscillator(); lfo.type='sine';
    lfo.frequency.value = lerp(0.12, 0.62, u(cell.hue/360*TAU));
    const lfoDepth=ctx.createGain(); lfoDepth.gain.value=0.16;
    lfo.connect(lfoDepth).connect(trem.gain); lfo.start(now);

    trem.connect(env).connect(lp).connect(this.master);

    const oscs=[];
    const beatHz = lerp(0.7, 3.6, u(cell.hue/360*TAU+1.3)); // beating rate from hue
    for(let i=0;i<VOX_RATIO.length;i++){
      const f=f0*VOX_RATIO[i]; if(f>9000) continue;
      // geometry tilts the spectrum: lobed cells lift the upper partials (reedier)
      const tilt = (i>=3) ? lerp(0.7,1.5,geom) : lerp(1.1,0.85,geom);
      const a = VOX_AMP[i]*tilt*0.16;
      const o=ctx.createOscillator(); o.type='sine'; o.frequency.value=f;
      const og=ctx.createGain(); og.gain.value=a;
      o.connect(og).connect(trem); o.start(now); oscs.push(o);
      // beating partner on fundamental + 1st two upper partials -> water shimmer
      if(i>=1 && i<=2){
        const o2=ctx.createOscillator(); o2.type='sine'; o2.frequency.value=f+beatHz*(i);
        const og2=ctx.createGain(); og2.gain.value=a*0.6;
        o2.connect(og2).connect(trem); o2.start(now); oscs.push(o2);
      }
    }
    return { env, lp, trem, lfo, oscs, release: lerp(2.2, 5.2, cell.sizeN), timer:null, deadline:0 };
  },

  _reap(cell){
    const V=cell._voice; if(!V) return;
    const ctx=this.ctx, now=ctx.currentTime;
    // only reap if it has actually fallen quiet (a late bow may have revived it)
    if(now < V.deadline-0.05){
      V.timer=setTimeout(()=>this._reap(cell), Math.max(120,(V.deadline-now)*1000));
      return;
    }
    try{ V.lfo.stop(); }catch(e){}
    for(const o of V.oscs){ try{o.stop()}catch(e){} }
    try{ V.lp.disconnect(); V.env.disconnect(); V.trem.disconnect(); }catch(e){}
    cell._voice=null; this.voices=Math.max(0,this.voices-1);
  }
};

/* ============================================================
   FIELD
   ============================================================ */
const cv=document.getElementById('stage'); const g=cv.getContext('2d',{alpha:false});
let W=0,H=0,DPR=1;
function resize(){DPR=Math.min(2,window.devicePixelRatio||1);W=innerWidth;H=innerHeight;cv.width=W*DPR;cv.height=H*DPR;cv.style.width=W+'px';cv.style.height=H+'px';g.setTransform(DPR,0,0,DPR,0,0);}
addEventListener('resize',resize); resize();

// salinity palette: indigo/blue dominant, saline cyan, violet, rare coral oil-slick
function weightedHue(bands){
  let total=bands.reduce((s,b)=>s+b[2],0), r=Math.random()*total;
  for(const [a,b,w] of bands){ if((r-=w)<=0) return rnd(a,b); }
  const last=bands[bands.length-1]; return rnd(last[0],last[1]);
}
function baseHue(){ return weightedHue([
  [205,255,.58],   // deep indigo / blue
  [180,202,.18],   // saline cyan (bluer than xenolith's teal)
  [256,288,.14],   // violet
  [330,358,.10]    // coral oil-slick, rare
]); }
function rimHue(base){
  if(Math.random()<.45) return weightedHue([[186,210,.5],[300,338,.3],[40,60,.2]]);
  const off=[28,52,128,168,210,292];
  return (base+off[Math.random()*off.length|0]+rnd(-8,8)+360)%360;
}

const cells=[]; const MAX_CELLS=12;

class Cell{
  constructor(x,y,r){
    this.x=x;this.y=y;this.vx=rnd(-9,9);this.vy=rnd(-9,9);
    this.r=r;                                   // structural radius -> pitch
    this.sizeN=(clamp(r,22,70)-22)/(70-22);
    this.geom=Math.random();                    // round<->lobed -> spectral tilt
    this.hue=baseHue(); this.hue2=rimHue(this.hue);
    this.hueDrift=rnd(-.7,.7);
    this.breath=rnd(0,TAU);
    this.lobes=[]; const n=3+(Math.random()*3|0);
    for(let i=0;i<n;i++) this.lobes.push({k:2+(Math.random()*4|0),amp:rnd(0.04,0.10+this.geom*0.12),ph:rnd(0,TAU),sp:rnd(-0.18,0.18)});
    this.rot=rnd(0,TAU); this.spin=rnd(-0.22,0.22);
    this.band=rnd(0,TAU);                        // halocline stratum phase
    this.energy=0;                              // shared by audio + visuals
    this.glow=0;                                // smoothed visual excitation
    this.cool=0; this.age=0; this.born=0; this.ripples=[];
    this._voice=null;
  }
  get rr(){ return this.r*(1+0.05*Math.sin(this.breath)); }
  outline(a){ let m=1; for(const l of this.lobes) m+=l.amp*Math.sin(l.k*a+l.ph); return m; }

  excite(vel,contact){
    if(this.cool>0) return; vel=clamp(vel,0,1); if(vel<0.04) return;
    this.cool=0.12;
    this.glow=Math.min(1.4,this.glow+0.4+vel*0.7);
    this.ripples.push({r:this.rr*0.5,a:0.4+vel*0.4});
    Sound.bow(this,vel);
  }
  step(dt,t){
    this.age+=dt; this.born=Math.min(1,this.born+dt*1.4); this.cool=Math.max(0,this.cool-dt);
    // glow tracks energy: holds while bowed, eases away after
    this.energy=Math.max(0,this.energy-dt*(this._voice?0.16:0.7));
    this.glow=lerp(this.glow, this.energy*1.1, 1-Math.pow(0.001,dt));
    this.breath+=dt*0.45; this.rot+=this.spin*dt; this.band+=dt*0.6;
    this.hue=(this.hue+this.hueDrift*dt+360)%360; this.hue2=(this.hue2+this.hueDrift*0.7*dt+360)%360;
    for(const l of this.lobes) l.ph+=l.sp*dt;

    // buoyant current — slow, with a faint upward float so bodies rise like in water
    const fx=Math.sin(this.y*0.0035+t*0.11)+Math.sin(this.x*0.0028-t*0.08);
    const fy=Math.cos(this.x*0.0035-t*0.10)+Math.sin(this.y*0.0026+t*0.06)-0.18;
    this.vx+=fx*5*dt; this.vy+=fy*5*dt; this.vx*=Math.pow(0.5,dt); this.vy*=Math.pow(0.5,dt);
    this.x+=this.vx*dt; this.y+=this.vy*dt;

    const R=this.rr;
    if(this.x<R){this.x=R;this.vx=Math.abs(this.vx);this.excite(clamp(Math.abs(this.vx)/64,0,1),1);}
    if(this.x>W-R){this.x=W-R;this.vx=-Math.abs(this.vx);this.excite(clamp(Math.abs(this.vx)/64,0,1),1);}
    if(this.y<R){this.y=R;this.vy=Math.abs(this.vy);this.excite(clamp(Math.abs(this.vy)/64,0,1),1);}
    if(this.y>H-R){this.y=H-R;this.vy=-Math.abs(this.vy);this.excite(clamp(Math.abs(this.vy)/64,0,1),1);}

    for(const rp of this.ripples){rp.r+=90*dt;rp.a-=0.6*dt;}
    this.ripples=this.ripples.filter(rp=>rp.a>0);
  }
  draw(){
    const R=this.rr*this.born, ex=this.glow;
    g.save(); g.translate(this.x,this.y);

    const steps=64; const pathPts=[];
    g.beginPath();
    for(let i=0;i<=steps;i++){const a=i/steps*TAU;const rad=R*this.outline(a)*(1+ex*0.05);const px=Math.cos(a)*rad,py=Math.sin(a)*rad;pathPts.push([px,py]);i?g.lineTo(px,py):g.moveTo(px,py);}
    g.closePath();

    g.save(); g.clip();
    // base body — deep, lit slightly more from above (sub-surface light)
    const L=lerp(18,46,this.energy);
    const core=g.createRadialGradient(-R*0.25,-R*0.5,R*0.1,0,0,R*1.3);
    core.addColorStop(0,`hsl(${this.hue},66%,${clamp(L+30,6,82)}%)`);
    core.addColorStop(0.5,`hsl(${this.hue},58%,${clamp(L+6,5,60)}%)`);
    core.addColorStop(1,`hsl(${(this.hue+18)%360},48%,${clamp(L-12,3,42)}%)`);
    g.fillStyle=core; g.fillRect(-R*2,-R*2,R*4,R*4);

    // THE HALOCLINE — a saline stratum band that drifts vertically through the body
    const by=Math.sin(this.band)*R*0.42;
    const bh=R*(0.34+0.12*Math.sin(this.band*0.7));
    g.globalCompositeOperation='lighter';
    const band=g.createLinearGradient(0,by-bh,0,by+bh);
    band.addColorStop(0,`hsla(${this.hue2},80%,60%,0)`);
    band.addColorStop(0.5,`hsla(${this.hue2},88%,${64+ex*16}%,${0.32+ex*0.4})`);
    band.addColorStop(1,`hsla(${(this.hue2+30)%360},80%,58%,0)`);
    g.fillStyle=band; g.fillRect(-R*2,by-bh,R*4,bh*2);

    // caustic oil-slick shimmer (watery, not metallic)
    const con=g.createConicGradient?g.createConicGradient(this.rot,0,0):null;
    if(con){
      g.globalAlpha=0.4+ex*0.3;
      con.addColorStop(0,    `hsla(${(this.hue+40)%360},78%,62%,0)`);
      con.addColorStop(0.18, `hsla(${(this.hue+40)%360},86%,66%,.6)`);
      con.addColorStop(0.36, `hsla(${(this.hue+150)%360},70%,56%,0)`);
      con.addColorStop(0.58, `hsla(${(this.hue+250)%360},80%,62%,.45)`);
      con.addColorStop(0.8,  `hsla(${(this.hue+90)%360},70%,58%,0)`);
      con.addColorStop(1,    `hsla(${(this.hue+40)%360},78%,62%,0)`);
      g.fillStyle=con; g.fillRect(-R*2,-R*2,R*4,R*4);
      g.globalAlpha=1;
    }

    // sustained nucleus — breathes while the voice is held (pulses with the current)
    if(this.energy>0.02){
      const pulse=0.5+0.5*Math.sin(this.band*2.0);
      g.globalAlpha=clamp(this.energy*(0.4+0.35*pulse),0,0.9);
      const nu=g.createRadialGradient(0,0,0,0,0,R*0.7);
      nu.addColorStop(0,`hsla(${(this.hue+30)%360},92%,82%,1)`);
      nu.addColorStop(0.45,`hsla(${this.hue},80%,60%,.55)`);
      nu.addColorStop(1,`hsla(${this.hue2},78%,54%,0)`);
      g.fillStyle=nu; g.fillRect(-R,-R,R*2,R*2);
      g.globalAlpha=1;
    }
    g.restore(); // unclip

    // membrane line
    g.globalCompositeOperation='lighter'; g.globalAlpha=0.5+ex*0.4; g.lineWidth=1.1;
    g.strokeStyle=`hsla(${this.hue2},80%,${58+ex*18}%,.62)`;
    g.beginPath(); pathPts.forEach((p,i)=>i?g.lineTo(p[0],p[1]):g.moveTo(p[0],p[1])); g.closePath(); g.stroke();
    // slow water ripples
    for(const rp of this.ripples){g.globalAlpha=clamp(rp.a,0,1)*0.5;g.lineWidth=1.3;g.strokeStyle=`hsla(${this.hue2},78%,66%,1)`;g.beginPath();g.arc(0,0,rp.r,0,TAU);g.stroke();}
    g.restore(); g.globalCompositeOperation='source-over'; g.globalAlpha=1;
  }
}

function seed(x,y){ if(cells.length>=MAX_CELLS){const old=cells.shift(); if(old._voice) Sound._reap(old);} cells.push(new Cell(x,y,rnd(22,70))); }

function collide(dt){
  for(let i=0;i<cells.length;i++)for(let j=i+1;j<cells.length;j++){
    const a=cells[i],b=cells[j],dx=b.x-a.x,dy=b.y-a.y,d=Math.hypot(dx,dy)||0.001,min=a.rr+b.rr;
    if(d<min){const nx=dx/d,ny=dy/d,ov=min-d;
      a.x-=nx*ov*0.5;a.y-=ny*ov*0.5;b.x+=nx*ov*0.5;b.y+=ny*ov*0.5;
      const vn=(b.vx-a.vx)*nx+(b.vy-a.vy)*ny;
      if(vn<0){const imp=-vn*0.85;a.vx-=nx*imp;a.vy-=ny*imp;b.vx+=nx*imp;b.vy+=ny*imp;
        const inten=clamp(Math.abs(vn)/80,0,1); a.excite(inten,0.4); b.excite(inten,0.4);
      }
    }
  }
}

/* interaction: tap empty = seed; tap body = bow + drift */
let lastInteract=performance.now();
function hit(x,y){for(let i=cells.length-1;i>=0;i--){const c=cells[i];if(Math.hypot(x-c.x,y-c.y)<Math.max(c.rr,26)*1.08)return c;}return null;}
function pointer(x,y){lastInteract=performance.now();const c=hit(x,y);
  if(c){c.cool=0;c.excite(0.9,0.1);const ang=rnd(0,TAU);c.vx+=Math.cos(ang)*46;c.vy+=Math.sin(ang)*46;}
  else seed(x,y);
}
cv.addEventListener('pointerdown',e=>{e.preventDefault();pointer(e.clientX,e.clientY);},{passive:false});

const wetEl=document.getElementById('wet');
wetEl.addEventListener('input',()=>Sound.setWet(wetEl.value/100));

/* gate */
const gate=document.getElementById('gate'),hint=document.getElementById('hint'),titleEl=document.getElementById('title');
let started=false;
function begin(){if(started)return;started=true;Sound.start();gate.classList.add('gone');
  for(let i=0;i<3;i++) seed(rnd(W*0.25,W*0.75),rnd(H*0.3,H*0.7));
  setTimeout(()=>hint.classList.add('gone'),7000); setTimeout(()=>titleEl.classList.add('dim'),4000);
}
gate.addEventListener('pointerdown',e=>{e.preventDefault();begin();},{passive:false});

/* loop */
let last=performance.now();
function frame(now){
  let dt=Math.min((now-last)/1000,0.05);last=now;const t=now/1000;
  g.globalCompositeOperation='source-over';
  g.fillStyle='rgba(8,10,22,0.28)'; g.fillRect(0,0,W,H);
  // sub-surface caustic wash — light from above, deep below
  const vg=g.createRadialGradient(W*0.5,H*0.0,Math.min(W,H)*0.05,W*0.5,H*0.55,Math.max(W,H)*0.85);
  vg.addColorStop(0,'rgba(90,150,200,0.05)'); vg.addColorStop(0.5,'rgba(40,56,120,0.04)'); vg.addColorStop(1,'rgba(6,8,18,0.14)');
  g.fillStyle=vg; g.fillRect(0,0,W,H);
  if(started){
    for(const c of cells)c.step(dt,t);
    collide(dt);
    for(const c of cells)c.draw();
    if(now-lastInteract>14000) hint.classList.remove('gone');
  }
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

/* ---------- UI Toggle (Press 'h' to hide/show) ---------- */
window.addEventListener('keydown', (e) => {
  if (e.key.toLowerCase() === 'h') {
    document.body.classList.toggle('hide-ui');
  }
});

/* ---------- UI Toggle (Double-tap for mobile) ---------- */
let lastTap = 0;
window.addEventListener('pointerup', (e) => {
  const currentTime = new Date().getTime();
  const tapLength = currentTime - lastTap;
  if (tapLength < 300 && tapLength > 0) {
    document.body.classList.toggle('hide-ui');
    e.preventDefault();
  }
  lastTap = currentTime;
});
</script>
</body>
