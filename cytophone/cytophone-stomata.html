<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>cytophone: stomata</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@1,9..144,300..500&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root{
    /* Light Mode Palette */
    --ground-0:#f0f2eb;
    --ground-1:#e2ebd8;
    --ink:#202b23;
    --faint:#6d8071;
    --guard:#388c6e;
    --mucosa:#b85882;
    --spore:#8ba32e;
    --bruise:#5a4882;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;overflow:hidden;background:var(--ground-0)}
  body{
    font-family:"DM Mono",monospace;
    color:var(--ink);
    -webkit-tap-highlight-color:transparent;
    touch-action:none;
    cursor:crosshair;
  }
  #stage{display:block;width:100vw;height:100vh}

  body.hide-ui #title,
  body.hide-ui #hint,
  body.hide-ui #fx,
  body.hide-ui #weather-ui {
    opacity: 0 !important;
    pointer-events: none !important;
  }
  
  /* weather ui — top-right container */
  #weather-ui{
    position:fixed;top:max(20px,env(safe-area-inset-top));right:22px;
    display:flex;flex-direction:column;align-items:flex-end;gap:6px;
    z-index:20;transition:opacity 0.5s ease;
  }
  
  /* city input */
  #city-input{
    font-family:"DM Mono",monospace;font-size:10px;letter-spacing:.12em;
    text-transform:uppercase;color:var(--ink);background:transparent;
    border:1px solid rgba(109,128,113,0.3);border-radius:4px;padding:4px 8px;
    outline:none;width:130px;text-align:right;opacity:0.5;
    transition:all 0.3s ease;
  }
  #city-input:focus, #city-input:hover { opacity:1; border-color:var(--faint); }
  #city-input::placeholder { color:var(--faint); }

  #weather-tag{
    font-family:"DM Mono",monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;
    color:var(--faint);pointer-events:none;user-select:none;
    opacity:0;transition:opacity 2.5s ease;
    text-shadow:0 1px 8px rgba(240,242,235,.6);
  }
  #weather-tag.visible{opacity:.8}

  #title{
    position:fixed;top:max(20px,env(safe-area-inset-top));left:22px;
    font-family:"Fraunces",serif;font-style:italic;font-weight:300;
    font-size:17px;letter-spacing:.01em;color:var(--faint);
    pointer-events:none;user-select:none;transition:opacity 2s ease;
  }
  #title.dim{opacity:.6}

  #hint{
    position:fixed;left:0;right:0;bottom:max(64px,calc(env(safe-area-inset-bottom) + 44px));
    text-align:center;pointer-events:none;
    font-size:13px;letter-spacing:.02em;color:var(--faint);
    transition:opacity 1.6s ease;opacity:1;
    text-shadow:0 1px 14px rgba(240,242,235,.8);
  }
  #hint em{font-family:"Fraunces",serif;font-style:italic;color:var(--ink);font-weight:400}
  #hint.gone{opacity:0}

  #fx{
    position:fixed;left:50%;bottom:max(22px,env(safe-area-inset-bottom));transform:translateX(-50%);
    display:flex;align-items:center;gap:11px;opacity:.6;transition:opacity .5s ease;z-index:5;user-select:none;
  }
  #fx:hover{opacity:1}
  #fx .lbl{font-size:9.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--faint)}
  #wet{-webkit-appearance:none;appearance:none;width:168px;height:2px;background:#b0c2b8;border-radius:2px;outline:none;cursor:pointer}
  #wet::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;border-radius:50%;background:#8ba32e;box-shadow:0 0 10px rgba(139,163,46,.45);cursor:pointer}
  #wet::-moz-range-thumb{width:13px;height:13px;border:none;border-radius:50%;background:#8ba32e;box-shadow:0 0 10px rgba(139,163,46,.45);cursor:pointer}

  #gate{
    position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
    background:
      radial-gradient(85% 70% at 52% 44%, rgba(56,140,110,.12) 0%, transparent 52%),
      radial-gradient(55% 40% at 50% 40%, rgba(184,88,130,.10) 0%, transparent 65%),
      radial-gradient(120% 120% at 50% 40%, #e2ebd8 0%, #f0f2eb 72%);
    z-index:10;transition:opacity .9s ease;
  }
  #gate.gone{opacity:0;pointer-events:none}
  #gate .g-inner{text-align:center;max-width:360px;padding:0 24px;animation:rise 1.4s cubic-bezier(.2,.8,.2,1) both}
  #gate h1{font-family:"Fraunces",serif;font-style:italic;font-weight:300;font-size:34px;color:var(--ink);margin-bottom:14px}
  #gate p{font-size:13px;line-height:1.7;color:var(--faint)}
#gate .pulse {
  margin: 30px auto 0;
  width: 68px;
  height: 68px;
  border-radius: 44% 56% 48% 52% / 56% 43% 57% 44%;
  background: radial-gradient(circle at 38% 34%, var(--ground-0) 0%, var(--spore) 18%, var(--guard) 45%, var(--mucosa) 72%, var(--bruise) 100%);
  box-shadow:
    0 0 34px rgba(56, 140, 110, 0.28),
    0 0 72px rgba(184, 88, 130, 0.14),
    inset 0 0 18px rgba(240, 242, 235, 0.5);
  animation: breathe 3.6s ease-in-out infinite;
}
  @keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
  @keyframes breathe{0%,100%{transform:scale(.92) rotate(-2deg);opacity:.8}50%{transform:scale(1.08) rotate(3deg);opacity:1}}
</style>
</head>
<body>
<canvas id="stage"></canvas>
<div id="title">cytophone: stomata</div>

<div id="weather-ui">
  <input type="text" id="city-input" placeholder="MANILA, PH" autocomplete="off" spellcheck="false" />
  <div id="weather-tag"></div>
</div>

<div id="hint"><em>press</em> to build pressure · <em>drag</em> to open · <em>right-click / double-tap</em> to erase</div>
<div id="fx"><span class="lbl">dry</span><input id="wet" type="range" min="0" max="100" value="36"><span class="lbl">wet</span></div>

<div id="gate">
  <div class="g-inner">
    <h1>cytophone: stomata</h1>
    <p>aerophone puffs based on breath and pressure</p>
    <div class="pulse"></div>
    <p style="margin-top:24px;font-size:11px;letter-spacing:.06em;opacity:.7">TOUCH TO ENTER · SOUND ON</p>
  </div>
</div>

<script>
"use strict";

const rnd=(a,b)=>a+Math.random()*(b-a);
const clamp=(v,a,b)=>v<a?a:v>b?b:v;
const lerp=(a,b,t)=>a+(b-a)*t;
const TAU=Math.PI*2;

const css=v=>getComputedStyle(document.documentElement).getPropertyValue(v).trim();
const COLORS={
  ink:css('--ink'),
  faint:css('--faint'),
  guard:css('--guard'),
  mucosa:css('--mucosa'),
  spore:css('--spore'),
  bruise:css('--bruise')
};

function hexToRgb(hex){
  const h=hex.replace('#','');
  const s=h.length===3 ? h.split('').map(c=>c+c).join('') : h;
  return {r:parseInt(s.slice(0,2),16),g:parseInt(s.slice(2,4),16),b:parseInt(s.slice(4,6),16)};
}
function rgba(hex,a){ const c=hexToRgb(hex); return `rgba(${c.r},${c.g},${c.b},${a})`; }

const Sound={
  ctx:null, master:null, dry:null, wet:null, wetAmt:0.36, noiseBuffer:null,
  ambGain:null, ambFilter:null,
  inFilter:null, fryFilter:null, fryOsc:null, inhaleGain:null,
  _inhaleCenterFreq: 200, _fryBaseFreq: 41,

  /* weather-driven parameters — defaults are neutral Manila baseline */
  pitchMult:        1.0,   /* temperature → f0 scale for exhales          */
  durMult:          1.0,   /* humidity    → duration scale for exhales     */
  idleIntervalMult: 1.0,   /* wind speed  → idle breath frequency          */
  condAmpMult:      1.0,   /* condition   → amplitude modifier             */
  condDurMult:      1.0,   /* condition   → duration modifier              */

start(){
    if(this.ctx) return;
    const AC=window.AudioContext||window.webkitAudioContext;
    const ctx=new AC(); this.ctx=ctx;

    const master=ctx.createGain();
    const dry=ctx.createGain();
    const wet=ctx.createGain();
    const conv=ctx.createConvolver(); conv.buffer=this._plate(4.1);
    const comp=ctx.createDynamicsCompressor();
    comp.threshold.value=-22; comp.knee.value=20; comp.ratio.value=8;
    comp.attack.value=0.005; comp.release.value=0.22;
    const out=ctx.createGain(); out.gain.value=0.0;

    master.connect(dry).connect(comp);
    master.connect(conv).connect(wet).connect(comp);
    comp.connect(out).connect(ctx.destination);

    this.master=master; this.dry=dry; this.wet=wet; this.out=out;
    this.setWet(this.wetAmt);
    out.gain.linearRampToValueAtTime(1.5, ctx.currentTime+1.0);

    const n=ctx.sampleRate*3.2;
    const buf=ctx.createBuffer(1,n,ctx.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<n;i++) d[i]=Math.random()*2-1;
    this.noiseBuffer=buf;

    /* ambient presence — very quiet continuous breath, fills the silence */
    const ambNoise=ctx.createBufferSource(); ambNoise.buffer=this.noiseBuffer; ambNoise.loop=true;
    const ambFilter=ctx.createBiquadFilter(); ambFilter.type='bandpass'; ambFilter.frequency.value=260; ambFilter.Q.value=0.55;
    const ambGain=ctx.createGain(); ambGain.gain.value=0.005;
    ambNoise.connect(ambFilter).connect(ambGain).connect(this.master); ambNoise.start();
    this.ambGain=ambGain; this.ambFilter=ambFilter;

    /* inhale synth — continuous, gated by inhaleGain */
    const inhaleGain=ctx.createGain(); inhaleGain.gain.value=0;

    const inNoise=ctx.createBufferSource(); inNoise.buffer=this.noiseBuffer; inNoise.loop=true;
    const inFilter=ctx.createBiquadFilter(); inFilter.type='bandpass'; inFilter.frequency.value=200; inFilter.Q.value=1.5;
    inNoise.connect(inFilter).connect(inhaleGain); inNoise.start();

    /* triangle is softer than sawtooth — less harsh on sustained hold */
    const fryOsc=ctx.createOscillator(); fryOsc.type='triangle'; fryOsc.frequency.value=41.2;
    const fryFilter=ctx.createBiquadFilter(); fryFilter.type='lowpass'; fryFilter.frequency.value=120;
    fryOsc.connect(fryFilter).connect(inhaleGain); fryOsc.start();

    inhaleGain.connect(this.master);
    this.inFilter=inFilter; this.fryFilter=fryFilter; this.fryOsc=fryOsc; this.inhaleGain=inhaleGain;
  },

  setWet(w){
    this.wetAmt=w;
    if(!this.ctx) return;
    this.dry.gain.value=lerp(1.0,0.60,w);
    this.wet.gain.value=w*0.95;
  },

  /* call at the start of each pointer-down — randomises this inhale's pitch/colour */
  startInhale(){
    if(!this.ctx) return;
    const now=this.ctx.currentTime;
    this._inhaleCenterFreq = rnd(140, 400);
    this._fryBaseFreq = rnd(22, 74) * clamp(this.pitchMult, 0.6, 1.6);
    if(this.fryOsc) this.fryOsc.frequency.setTargetAtTime(clamp(this._fryBaseFreq,16,110), now, 0.015);
    if(this.inFilter) this.inFilter.Q.value = rnd(1.0, 2.6);
  },

  updateInhale(pressure, isDown){
    if(!this.ctx || !this.inhaleGain) return;
    const now=this.ctx.currentTime;
    const cFreq = this._inhaleCenterFreq || 200;
    const fBase = Math.min(this._fryBaseFreq || 41, 85);
    if(isDown){
      /* subtler ceiling — was 0.02+p*0.12, now 0.006+p*0.06 */
      this.inhaleGain.gain.setTargetAtTime(0.006 + pressure*0.06, now, 0.05);
      this.inFilter.frequency.setTargetAtTime(cFreq + pressure*1600, now, 0.1);
      this.fryFilter.frequency.setTargetAtTime(fBase + pressure*260, now, 0.1);
    }else{
      this.inhaleGain.gain.setTargetAtTime(0, now, 0.18);
    }
  },

  /* brief one-shot inhale event for idle triggers */
  triggerIdleInhale(){
    if(!this.ctx || !this.inhaleGain) return;
    const now=this.ctx.currentTime;
    const freq = clamp(rnd(22, 80) * this.pitchMult, 16, 110);
    const noiseFq = rnd(110, 460);
    const dur = rnd(0.22, 0.6) * clamp(this.durMult, 0.7, 1.8);
    const amp = rnd(0.004, 0.013);
    if(this.fryOsc) this.fryOsc.frequency.setValueAtTime(freq, now);
    if(this.inFilter){ this.inFilter.frequency.setValueAtTime(noiseFq, now); this.inFilter.Q.value=rnd(1.2,2.8); }
    this.inhaleGain.gain.cancelScheduledValues(now);
    this.inhaleGain.gain.setValueAtTime(Math.max(this.inhaleGain.gain.value, 0.0001), now);
    this.inhaleGain.gain.linearRampToValueAtTime(amp, now+0.05);
    this.inhaleGain.gain.exponentialRampToValueAtTime(0.0001, now+dur);
  },

  _plate(dur){
    const ctx=this.ctx, n=Math.floor(ctx.sampleRate*dur), b=ctx.createBuffer(2,n,ctx.sampleRate);
    for(let c=0;c<2;c++){
      const d=b.getChannelData(c); let lp=0;
      for(let i=0;i<n;i++){
        const t=i/n;
        const white=(Math.random()*2-1)*Math.pow(1-t,2.2);
        lp=lp*0.38+white*0.62;
        d[i]=lp*(0.82+0.18*Math.sin(i*0.00017+(c*0.7)));
      }
    }
    return b;
  },
  exhale(pore, pressure=0.8){
    const ctx=this.ctx; if(!ctx || !this.noiseBuffer) return;
    const now=ctx.currentTime+0.003;

    /* weather: temperature scales pitch register; conditions scale amp+dur */
    const f0=clamp(1200/pore.r, 120, 680) * clamp(this.pitchMult, 0.6, 1.6);
    const ap=clamp(pore.aperture,0,1);
    const durCombined = clamp(this.durMult * this.condDurMult, 0.5, 2.2);
    const amp=(0.08 + ap*0.14 + pressure*0.12) * (1.1 + pore.bias*0.5) * this.condAmpMult;
    const dur=(0.28 + ap*0.9 + pressure*0.55) * durCombined;

    const noiseAmp = pore.isFlute ? amp * lerp(1.1, 0.15, pore.mixBalance) : amp;

    const src=ctx.createBufferSource();
    src.buffer=this.noiseBuffer;
    src.playbackRate.value = lerp(0.6, 1.8, pore.tint);

    const hp=ctx.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=clamp(f0*0.7,80,900);
    const bp1=ctx.createBiquadFilter(); bp1.type='bandpass'; bp1.frequency.value=f0; bp1.Q.value=lerp(0.8,5.0,ap);
    const bp2=ctx.createBiquadFilter(); bp2.type='bandpass'; bp2.frequency.value=f0*lerp(1.6,2.45,pore.tint); bp2.Q.value=lerp(1.1,6.5,ap*0.8+pressure*0.2);
    
    const lp=ctx.createBiquadFilter(); lp.type='lowpass'; 
    lp.frequency.setValueAtTime(lerp(1500, 7500, ap*0.7+pressure*0.3), now);
    lp.frequency.exponentialRampToValueAtTime(lerp(400, 2200, pore.bias), now+dur);

    const mix=ctx.createGain();
    const env=ctx.createGain();
    env.gain.setValueAtTime(0.0001,now);
    env.gain.linearRampToValueAtTime(noiseAmp,now+0.08);
    env.gain.exponentialRampToValueAtTime(Math.max(0.0001,noiseAmp*0.55),now+dur*0.28);
    env.gain.exponentialRampToValueAtTime(0.0001,now+dur);

    const pan=ctx.createStereoPanner();
    pan.pan.value=clamp((pore.x/W)*2-1,-1,1)*0.55;

    const breath=ctx.createGain();
    breath.gain.value=pore.isFlute ? lerp(0.10,0.26,ap) : 1.0;

    src.connect(hp);
    hp.connect(bp1); hp.connect(bp2);
    bp1.connect(breath); bp2.connect(breath);
    breath.connect(mix);

    const osc=ctx.createOscillator();
    let lfo=null;

    if(pore.isFlute){
      osc.type='square';
      const flutePitch = f0 * pore.flutePitchMult;
      osc.frequency.setValueAtTime(flutePitch,now);
      osc.frequency.linearRampToValueAtTime(flutePitch*(1+0.03*pressure),now+dur*0.5);

      const fluteLp=ctx.createBiquadFilter();
      fluteLp.type='lowpass';
      fluteLp.frequency.value=flutePitch*2.2;
      fluteLp.Q.value=1.6;

      lfo=ctx.createOscillator();
      lfo.type='sine';
      lfo.frequency.value=5.5+rnd(-0.5,0.5);
      const lfoGain=ctx.createGain();
      lfoGain.gain.value=16+rnd(-3,3);
      lfo.connect(lfoGain).connect(osc.detune);

      const og=ctx.createGain();
      const fluteAmp = amp * lerp(0.3, 1.2, pore.mixBalance);
      og.gain.setValueAtTime(0.0001,now);
      og.gain.linearRampToValueAtTime(fluteAmp,now+0.07);
      og.gain.exponentialRampToValueAtTime(Math.max(0.0001,fluteAmp*0.6),now+dur*0.62);
      og.gain.exponentialRampToValueAtTime(0.0001,now+dur);

      osc.connect(fluteLp).connect(og).connect(mix);
    }else{
      osc.type='triangle';
      osc.frequency.setValueAtTime(f0*(1+0.005*rnd(-1,1)),now);
      osc.frequency.exponentialRampToValueAtTime(f0*lerp(0.97,0.92,pressure),now+dur*0.45);

      const og=ctx.createGain();
      og.gain.setValueAtTime(0.0001,now);
      og.gain.linearRampToValueAtTime(amp*0.60,now+0.04);
      og.gain.exponentialRampToValueAtTime(0.0001,now+dur*0.85);

      osc.connect(og).connect(mix);
    }
    const wob=ctx.createOscillator(); wob.type='sine'; wob.frequency.value=lerp(2.0,7.8,pore.bias);
    const wobG=ctx.createGain(); wobG.gain.value=amp*0.08*(0.5+ap*0.8);
    wob.connect(wobG).connect(env.gain);

    mix.connect(lp).connect(env).connect(pan).connect(this.master);
    src.start(now); src.stop(now+dur+0.05);
    osc.start(now); osc.stop(now+dur+0.05);
    if(lfo){ lfo.start(now); lfo.stop(now+dur+0.05); }
    wob.start(now); wob.stop(now+dur+0.05);
  },

  applyWeatherProfile(p){
    if(!this.ctx) return;

    /* temperature → pitch register */
    this.pitchMult = lerp(0.75, 1.35, p.tempNorm);

    /* humidity → exhale duration + reverb wetness + ambient presence */
    this.durMult = lerp(0.8, 1.5, p.humNorm);
    const humWet = lerp(0.22, 0.52, p.humNorm);
    this.setWet(humWet);
    const wetEl = document.getElementById('wet');
    if(wetEl) wetEl.value = humWet * 100;
    if(this.ambGain){
      this.ambGain.gain.setTargetAtTime(lerp(0.003, 0.011, p.humNorm), this.ctx.currentTime, 0.8);
      this.ambFilter.frequency.setTargetAtTime(lerp(200, 380, p.humNorm), this.ctx.currentTime, 0.8);
    }

    /* wind speed → idle breath frequency (more wind = shorter intervals) */
    this.idleIntervalMult = lerp(1.3, 0.45, p.windNorm);

    /* condition → amplitude + duration character */
    const condMap = {
      'Clear':        { amp:1.0,  dur:0.85 },
      'Clouds':       { amp:1.0,  dur:1.0  },
      'Rain':         { amp:0.9,  dur:1.35 },
      'Drizzle':      { amp:0.85, dur:1.2  },
      'Thunderstorm': { amp:1.25, dur:0.65 },
      'Mist':         { amp:0.7,  dur:1.65 },
      'Fog':          { amp:0.65, dur:1.7  },
      'Haze':         { amp:0.9,  dur:1.05 },
      'Smoke':        { amp:0.85, dur:1.1  },
    };
    const cm = condMap[p.condition] || { amp:1.0, dur:1.0 };
    this.condAmpMult = cm.amp;
    this.condDurMult = cm.dur;
  },
};

/* ─── WEATHER — fetched once on load, applied on enter ──────────────── */
const Weather = {
  apiKey : '577a29cc9a4c7e6bc3cb4675384e8d4e',
  city   : 'Manila,PH',
  data   : null,
  profile : {
    tempNorm  : 0.50,  /* ~30°C Manila baseline */
    humNorm   : 0.75,  /* ~75% RH Manila baseline */
    windNorm  : 0.20,
    condition : 'Clear',
    cloudNorm : 0.30,
  },
  async fetch(){
    try {
      const res = await fetch(
        `https://api.openweathermap.org/data/2.5/weather?q=${encodeURIComponent(this.city)}&appid=${this.apiKey}&units=metric`
      );
      if(!res.ok) {
        const tag = document.getElementById('weather-tag');
        if(tag) tag.textContent = 'CITY NOT FOUND';
        return;
      }
      const d = await res.json();
      this.data = d;
      const p = this.profile;
      p.tempNorm  = clamp((d.main.temp - 20) / 20, 0, 1);
      p.humNorm   = d.main.humidity / 100;
      p.windNorm  = clamp((d.wind?.speed || 0) / 12, 0, 1);
      p.condition = d.weather?.[0]?.main || 'Clear';
      p.cloudNorm = (d.clouds?.all || 0) / 100;
      const tag = document.getElementById('weather-tag');
      if(tag){
        tag.textContent = `${p.condition.toLowerCase()} · ${Math.round(d.main.temp)}° · ${d.main.humidity}%rh`;
        tag.classList.add('visible');
      }
      /* if user already entered before fetch completed, apply now */
      if(Sound.ctx) Sound.applyWeatherProfile(p);
    } catch(e) { /* silent — profile stays at Manila defaults */ }
  },
};

/* Event listener for city input */
const cityInput = document.getElementById('city-input');
if(cityInput) {
  cityInput.addEventListener('keydown', (e) => {
    if(e.key === 'Enter' && cityInput.value.trim() !== '') {
      Weather.city = cityInput.value.trim();
      Weather.fetch();
      cityInput.blur();
    }
  });
}

Weather.fetch(); /* one call only — no refresh */


const cv = document.getElementById('stage');
const g=cv.getContext('2d');
let W=0,H=0,DPR=Math.max(1,Math.min(2,window.devicePixelRatio||1));

function resize(){
  W=window.innerWidth; H=window.innerHeight;
  cv.width=Math.floor(W*DPR); cv.height=Math.floor(H*DPR);
  cv.style.width=W+'px'; cv.style.height=H+'px';
  g.setTransform(DPR,0,0,DPR,0,0);
}
window.addEventListener('resize',resize,{passive:true}); resize();

const pores=[];
let lastT=0;
let idleClock=0;
let pointer={down:false,id:-1,x:0,y:0,lastX:0,lastY:0,moved:false};
let pressure=0;
let pressurePeak=0;
let holdTime=0;
let nextIdleBreath=1.4;
let lastTapTime=0;
let microClock=0, nextMicroBreath=rnd(0.35,0.8);
let inhaleClock=0, nextIdleInhale=rnd(3.0,7.0);



function seedPore(x,y,r){
  const isFlute = Math.random() > 0.6;
  pores.push({
    x,y,r,
    aperture:rnd(0.06,0.22),
    target:rnd(0.08,0.18),
    pulse:rnd(0,TAU),
    bias:rnd(0,1),
    tint:rnd(0,1),
    wet:rnd(0.4,1),
    flash:0,
    phase:rnd(0,TAU),
    isFlute: isFlute,
    flutePitchMult: isFlute ? rnd(0.1, 5) : 1.0, 
    mixBalance: isFlute ? rnd(0.1, 0.95) : 0 
  });
}

for(let i=0;i<10;i++) seedPore(rnd(90,Math.max(90,W-90)), rnd(110,Math.max(110,H-120)), rnd(18,42));

function poreAt(x,y){
  for(let i=pores.length-1;i>=0;i--){
    const p=pores[i], dx=x-p.x, dy=y-p.y;
    if(dx*dx+dy*dy < (p.r*1.5)*(p.r*1.5)) return p;
  }
  return null;
}

function erasePoreAt(x, y) {
  const p = poreAt(x, y);
  if (p) {
    const idx = pores.indexOf(p);
    if (idx !== -1) {
      pores.splice(idx, 1);
      return true;
    }
  }
  return false;
}

function openAround(x,y,amount=0.07){
  for(const p of pores){
    const dx=x-p.x, dy=y-p.y;
    const d=Math.hypot(dx,dy);
    const reach=p.r*2.3 + 30;
    if(d<reach){
      const a=(1-d/reach)*amount;
      p.target=clamp(p.target+a,0.02,1);
      p.flash=Math.max(p.flash,a*2.2);
    }
  }
}

function closeSome(){
  for(const p of pores){
    p.target=clamp(p.target-rnd(0.02,0.08),0.02,1);
  }
}

function exhaleAll(force=1){
  let active=0;
  for(const p of pores){
    const ap=(p.aperture*0.65 + p.target*0.35);
    if(ap>0.09){
      const local=clamp(force*(0.6+ap*0.8),0,1.4);
      Sound.exhale(p, local);
      p.flash=Math.max(p.flash,0.6*local);
      p.target=clamp(p.target*lerp(0.78,0.55,local),0.02,1);
      active++;
    }
  }
  if(active===0 && pores.length){
    const p=pores[(Math.random()*pores.length)|0];
    p.target=clamp(p.target+0.18,0.02,1);
    Sound.exhale(p,0.45*force);
    p.flash=Math.max(p.flash,0.3);
  }
}

function randomIdleBreath() {
  const modeRoll = Math.random();
  let participants = [];
  
  if (modeRoll < 0.35) {
    participants.push(pores[Math.floor(Math.random() * pores.length)]);
  } else if (modeRoll < 0.70) {
    const count = Math.floor(rnd(2, 5));
    const shuffled = [...pores].sort(() => 0.5 - Math.random());
    participants = shuffled.slice(0, count);
  } else if (modeRoll < 0.90) {
    const count = Math.floor(pores.length * 0.6);
    const shuffled = [...pores].sort(() => 0.5 - Math.random());
    participants = shuffled.slice(0, count);
  } else {
    participants = [...pores];
  }

  const intensityRoll = Math.random();
  let force, targetBoost;
  
  if (intensityRoll < 0.4) {
    force = rnd(0.1, 0.4);
    targetBoost = rnd(0.1, 0.3);
  } else if (intensityRoll < 0.85) {
    force = rnd(0.4, 0.85);
    targetBoost = rnd(0.3, 0.6);
  } else {
    force = rnd(0.9, 1.5);
    targetBoost = rnd(0.6, 1.0);
  }

  for (const p of participants) {
    if (!p) continue;
    p.target = clamp(p.target + targetBoost, 0.02, 1);
    p.flash = Math.max(p.flash, force * 0.5);
    Sound.exhale(p, force);
  }
  
  for (const p of pores) {
    if (!participants.includes(p)) {
      p.target = clamp(p.target - rnd(0.02, 0.1), 0.02, 1);
    }
  }
}

function bgField(t){
  // Switched the hardcoded gradient to match light mode base colors
  const grad=g.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,'#f0f2eb');
  grad.addColorStop(0.55,'#e2ebd8');
  grad.addColorStop(1,'#e9ece3');
  g.fillStyle=grad;
  g.fillRect(0,0,W,H);

  for(let i=0;i<6;i++){
    const cx=W*(0.15 + i*0.16) + Math.sin(t*0.00016 + i*1.7)*30;
    const cy=H*(0.2 + ((i%3)*0.22)) + Math.cos(t*0.00012 + i)*25;
    const r=120 + (i%3)*80;
    const rg=g.createRadialGradient(cx,cy,0,cx,cy,r);
    const a=0.04 + 0.015*Math.sin(t*0.0005+i);
    rg.addColorStop(0, rgba(i%2?COLORS.guard:COLORS.mucosa,a));
    rg.addColorStop(1, rgba(COLORS.bruise,0));
    g.fillStyle=rg;
    g.beginPath(); g.arc(cx,cy,r,0,TAU); g.fill();
  }

  if(pressure>0.01){
    g.fillStyle=rgba(COLORS.spore, 0.03 + pressure*0.04);
    g.fillRect(0,0,W,H);
  }
}

function drawPore(p,t){
  const ap=clamp(p.aperture,0,1);
  const slitH=lerp(2,p.r*0.95,ap);
  const guardOffset=lerp(p.r*0.2,p.r*0.62,ap);
  const guardW=lerp(p.r*0.95,p.r*0.8,ap);
  const guardH=lerp(p.r*0.55,p.r*0.95,ap);
  const glow=(0.07 + ap*0.08 + p.flash*0.14)*(0.9+p.wet*0.25);

  /* Map the inner flesh color directly to the audio synthesis type */
  const throatColor = p.isFlute ? COLORS.bruise : COLORS.mucosa;

  const aura=g.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r*2.4);
  aura.addColorStop(0, rgba(COLORS.guard, glow));
  aura.addColorStop(0.45, rgba(throatColor, glow*0.7));
  aura.addColorStop(1, rgba(COLORS.bruise, 0));
  g.fillStyle=aura;
  g.beginPath(); g.arc(p.x,p.y,p.r*2.4,0,TAU); g.fill();

  g.save();
  g.translate(p.x,p.y);
  g.rotate(Math.sin(p.phase + t*0.00022)*0.12);

  g.fillStyle=rgba(COLORS.guard, 0.24 + ap*0.18 + p.flash*0.12);
  g.strokeStyle=rgba(COLORS.ink, 0.20 + ap*0.12);
  g.lineWidth=1.1;

  g.beginPath();
  g.ellipse(-guardOffset,0,guardW,guardH,0,0,TAU); g.fill(); g.stroke();
  g.beginPath();
  g.ellipse(guardOffset,0,guardW,guardH,0,0,TAU); g.fill(); g.stroke();

  /* Apply the sound-based variation to the mucosa layers */
  g.fillStyle=rgba(throatColor, 0.10 + ap*0.16);
  g.beginPath(); g.ellipse(-guardOffset*0.8,0,guardW*0.72,guardH*0.74,0,0,TAU); g.fill();
  g.beginPath(); g.ellipse( guardOffset*0.8,0,guardW*0.72,guardH*0.74,0,0,TAU); g.fill();

  const slitGrad=g.createLinearGradient(0,-slitH,0,slitH);
  slitGrad.addColorStop(0, rgba(COLORS.ink, 0.55+ap*0.16));
  slitGrad.addColorStop(0.4, rgba(COLORS.spore, 0.85));
  slitGrad.addColorStop(0.6, rgba(COLORS.spore, 0.85));
  slitGrad.addColorStop(1, rgba(COLORS.ink, 0.55+ap*0.16));
  g.fillStyle=slitGrad;
  const slitW=lerp(p.r*0.18,p.r*0.46,ap);
  g.beginPath();
  g.ellipse(0,0,slitW,slitH,0,0,TAU);
  g.fill();

  g.strokeStyle=rgba(COLORS.spore, 0.3 + ap*0.35 + p.flash*0.25);
  g.lineWidth=1;
  g.stroke();

  g.fillStyle=rgba(COLORS.ink,0.08+ap*0.08);
  for(let i=0;i<5;i++){
    const sx=(i<3?-1:1)*rnd(guardOffset*0.35, guardOffset*1.08) + rnd(-3,3);
    const sy=rnd(-guardH*0.45,guardH*0.45);
    g.beginPath(); g.arc(sx,sy,0.8+rnd(0,0.9),0,TAU); g.fill();
  }
  g.restore();

  if(p.flash>0.01){
    g.strokeStyle=rgba(COLORS.spore, p.flash*0.22);
    g.lineWidth=1.5;
    g.beginPath(); g.arc(p.x,p.y,p.r*(1.9+p.flash),0,TAU); g.stroke();
  }
}

function update(dt,t){
  idleClock+=dt; microClock+=dt; inhaleClock+=dt;
  if(pointer.down){
    holdTime+=dt;
    pressure=clamp(pressure + dt*0.24, 0, 1.2);
    pressurePeak=Math.max(pressurePeak,pressure);
    openAround(pointer.x,pointer.y, dt*0.55 + 0.03);
  }else{
    pressure=clamp(pressure - dt*0.42, 0, 1.2);
  }

  Sound.updateInhale(pressure, pointer.down);

  for(const p of pores){
    const auto=0.12 + 0.08*Math.sin(t*0.0005 + p.pulse) + 0.06*Math.sin(t*0.00018 + p.phase*2.1);
    if(!pointer.down && Math.random()<dt*0.3) p.target=clamp(auto + rnd(-0.1, 0.2), 0.02, 0.7);
    p.aperture=lerp(p.aperture,p.target,dt*2.6);
    p.flash=Math.max(0,p.flash-dt*0.9);
    p.phase += dt*(0.15 + p.bias*0.22);
  }

  /* main idle breath — interval shrinks with wind speed */
  if(!pointer.down && idleClock>nextIdleBreath){
    randomIdleBreath();
    idleClock=0;
    nextIdleBreath=rnd(0.6, 2.4)*Sound.idleIntervalMult;
  }

  /* micro-breath: frequent soft single-pore puffs that fill the silence */
  if(!pointer.down && pores.length>0 && microClock>nextMicroBreath){
    const p=pores[Math.floor(Math.random()*pores.length)];
    if(p.aperture>0.04){ Sound.exhale(p,rnd(0.05,0.18)); p.flash=Math.max(p.flash,0.05); }
    microClock=0;
    nextMicroBreath=rnd(0.22,0.65)*Sound.idleIntervalMult;
  }

  /* idle inhale: brief inhale sounds when left alone */
  if(!pointer.down && entered && inhaleClock>nextIdleInhale){
    Sound.triggerIdleInhale();
    inhaleClock=0;
    nextIdleInhale=rnd(2.8,7.5);
  }
}
function draw(t){
  bgField(t);

  for(const p of pores) drawPore(p,t);

  if(pointer.down){
    g.strokeStyle=rgba(COLORS.spore,0.20+pressure*0.18);
    g.lineWidth=1.25;
    g.beginPath(); g.arc(pointer.x,pointer.y,24+pressure*26,0,TAU); g.stroke();
    g.beginPath(); g.arc(pointer.x,pointer.y,46+pressure*38,0,TAU); g.stroke();
  }
}

function loop(ts){
  if(!lastT) lastT=ts;
  const dt=Math.min(0.033,(ts-lastT)/1000); lastT=ts;
  update(dt,ts);
  draw(ts);
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

function pt(e){
  const r=cv.getBoundingClientRect();
  if(e.touches && e.touches.length) return {x:e.touches[0].clientX-r.left, y:e.touches[0].clientY-r.top};
  return {x:e.clientX-r.left, y:e.clientY-r.top};
}

function begin(x,y){
  pointer.down=true; pointer.x=pointer.lastX=x; pointer.y=pointer.lastY=y; pointer.moved=false; holdTime=0; pressurePeak=0; idleClock=0;
  Sound.startInhale();
  const p=poreAt(x,y);
  if(!p){
    seedPore(x,y,rnd(18,40));
  }else{
    p.target=clamp(p.target+0.18,0.02,1);
    p.flash=Math.max(p.flash,0.25);
  }
}

function move(x,y){
  if(!pointer.down) return;
  const dx=x-pointer.lastX, dy=y-pointer.lastY;
  if(dx*dx+dy*dy>16) pointer.moved=true;
  pointer.x=x; pointer.y=y; pointer.lastX=x; pointer.lastY=y;
  openAround(x,y,0.055);
}

function end(){
  if(!pointer.down) return;
  const force=clamp(0.25 + pressurePeak*0.9 + Math.min(holdTime,1.2)*0.25, 0.2, 1.2);
  exhaleAll(force); 
  pointer.down=false; holdTime=0; pressurePeak=0; pressure=0;
}

cv.addEventListener('pointerdown', e=>{
  e.preventDefault();
  const pos = pt(e);
  const now = Date.now();
  
  if (e.button === 2 || e.shiftKey) {
    erasePoreAt(pos.x, pos.y);
    return;
  }

  if (now - lastTapTime < 300) {
    if (erasePoreAt(pos.x, pos.y)) {
      lastTapTime = 0; 
      pointer.down = false; 
      return; 
    }
  }
  lastTapTime = now;

  begin(pos.x, pos.y);
}, {passive:false});

cv.addEventListener('contextmenu', e => e.preventDefault());

window.addEventListener('pointermove', e=>{ if(pointer.down) move(pt(e).x, pt(e).y); }, {passive:true});
window.addEventListener('pointerup', end, {passive:true});
window.addEventListener('pointercancel', end, {passive:true});

const wet=document.getElementById('wet');
wet.addEventListener('input', ()=>Sound.setWet(wet.value/100));

const gate=document.getElementById('gate');
const hint=document.getElementById('hint');
const title=document.getElementById('title');
let entered=false;
function enter(){
  if(entered) return;
  entered=true;
  Sound.start();
  Sound.setWet(wet.value/100);
  Sound.applyWeatherProfile(Weather.profile);
  /* reset timers so nothing fires immediately on first frame */
  idleClock=0; microClock=0; inhaleClock=0;
  nextIdleBreath=rnd(1.0,2.2)*Sound.idleIntervalMult;
  nextMicroBreath=rnd(0.5,1.2);
  nextIdleInhale=rnd(4.0,9.0);
  gate.classList.add('gone');
  setTimeout(()=>hint.classList.add('gone'),3500); 
  setTimeout(()=>title.classList.add('dim'),2000);
}
gate.addEventListener('pointerdown', e=>{ e.preventDefault(); enter(); }, {passive:false});
window.addEventListener('keydown', e=>{ if(e.key===' '||e.key==='Enter') enter(); });

window.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT') return;
  if (e.key.toLowerCase() === 'h') document.body.classList.toggle('hide-ui');
});
</script>
</body>
