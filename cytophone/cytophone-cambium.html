<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>cytophone: cambium</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@1,9..144,300..500&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
:root {
    /* medium, clinical-industrial layer */
    --ground-0: #8c9296; /* mid-tone steel */
    --ground-1: #7d8489;
    --ink: #1a2226;      /* dark contrast for text */
    --faint: #525a5e;    /* deeper medium */
    --sap: #cf9b68;
    --lichen: #7aab79;
    --bruise: #826eab;
    --vein: #b86e8a;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;overflow:hidden;background:var(--ground-0)}
  body{
    font-family:"DM Mono",monospace;
    color:var(--ink);
    -webkit-tap-highlight-color:transparent;
    touch-action:none;
    cursor:crosshair;
  }
  #stage{display:block;width:100vw;height:100vh}

  body.hide-ui #title,
  body.hide-ui #hint,
  body.hide-ui #fx {
    opacity: 0 !important;
    pointer-events: none !important;
  }

  #title{
    position:fixed;top:max(20px,env(safe-area-inset-top));left:22px;
    font-family:"Fraunces",serif;font-style:italic;font-weight:300;
    font-size:17px;letter-spacing:.01em;color:var(--faint);
    pointer-events:none;user-select:none;transition:opacity 2s ease;
  }
  #title.dim{opacity:.35}

  #hint{
    position:fixed;left:0;right:0;bottom:max(64px,calc(env(safe-area-inset-bottom) + 44px));
    text-align:center;pointer-events:none;
    font-size:13px;letter-spacing:.02em;color:var(--faint);
    transition:opacity 1.6s ease;opacity:1;
    text-shadow:0 1px 14px rgba(20,7,10,.75);
  }
  #hint em{font-family:"Fraunces",serif;font-style:italic;color:var(--ink);font-weight:400}
  #hint.gone{opacity:0}

  #fx{
    position:fixed;left:50%;bottom:max(22px,env(safe-area-inset-bottom));transform:translateX(-50%);
    display:flex;align-items:center;gap:11px;opacity:.34;transition:opacity .5s ease;z-index:5;user-select:none;
  }
  #fx:hover{opacity:.95}
  #fx .lbl{font-size:9.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--faint)}
  #wet{-webkit-appearance:none;appearance:none;width:168px;height:2px;background:#3d2727;border-radius:2px;outline:none;cursor:pointer}
  #wet::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;border-radius:50%;background:#e6b16d;box-shadow:0 0 10px rgba(230,170,100,.55);cursor:pointer}
  #wet::-moz-range-thumb{width:13px;height:13px;border:none;border-radius:50%;background:#e6b16d;box-shadow:0 0 10px rgba(230,170,100,.55);cursor:pointer}

#gate {
    position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    background:
      radial-gradient(80% 80% at 48% 42%, rgba(207, 155, 104, 0.16) 0%, transparent 55%),
      radial-gradient(120% 120% at 50% 40%, #7d8489 0%, #8c9296 72%);
    z-index: 10; transition: opacity .9s ease;
  }
  #gate.gone{opacity:0;pointer-events:none}
  #gate .g-inner{text-align:center;max-width:360px;padding:0 24px;animation:rise 1.4s cubic-bezier(.2,.8,.2,1) both}
  #gate h1{font-family:"Fraunces",serif;font-style:italic;font-weight:300;font-size:34px;color:var(--ink);margin-bottom:14px}
  #gate p{font-size:13px;line-height:1.7;color:var(--faint)}
  #gate .pulse{
    margin:30px auto 0;width:68px;height:68px;border-radius:42% 58% 47% 53% / 54% 42% 58% 46%;
    background:
      radial-gradient(circle at 38% 34%, #ffe1a0 0%, #cf7f54 33%, #9367b8 62%, #26442e 83%, #160b0e 100%);
    box-shadow:
      0 0 34px rgba(209,123,80,.38),
      0 0 72px rgba(137,93,190,.18),
      inset 0 0 18px rgba(255,238,174,.18);
    animation:breathe 3.2s ease-in-out infinite;
  }
  @keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
  @keyframes breathe{0%,100%{transform:scale(.92) rotate(-3deg);opacity:.78}50%{transform:scale(1.08) rotate(4deg);opacity:1}}
</style>
</head>
<body>
<canvas id="stage"></canvas>
<div id="title">cytophone: cambium</div>
<div id="hint"><em>tap</em> to seed a node · <em>drag</em> to grow fibers · <em>tap a node</em> to pluck the network · <em>right-click / double-tap</em> to erase</div>
<div id="fx"><span class="lbl">dry</span><input id="wet" type="range" min="0" max="100" value="26"><span class="lbl">wet</span></div>

<div id="gate">
  <div class="g-inner">
    <h1>cytophone: cambium</h1>
    <p>a living layer of tensioned fibers.</p>
    <div class="pulse"></div>
    <p style="margin-top:24px;font-size:11px;letter-spacing:.06em;opacity:.7">TOUCH TO ENTER · SOUND ON</p>
  </div>
</div>

<script>
"use strict";

const rnd=(a,b)=>a+Math.random()*(b-a);
const clamp=(v,a,b)=>v<a?a:v>b?b:v;
const lerp=(a,b,t)=>a+(b-a)*t;
const TAU=Math.PI*2;
const pick=a=>a[(Math.random()*a.length)|0];

/* ============================================================
   AUDIO: friction / comb / reed synthesis (STABILIZED)
   ============================================================ */
const Audio_={
  ctx:null, master:null, dry:null, wet:null, bus:null, comp:null, out:null,
  wetAmt:0.26, activeScrapes:0, MAX_SCRAPES:4,
  start(){
    if(this.ctx) return;
    const AC=window.AudioContext||window.webkitAudioContext;
    const ctx=new AC(); this.ctx=ctx;

    // INCREASED VOLUME: Bumped this up from 0.35 to 0.85
    const bus=ctx.createGain(); bus.gain.value=1; 
    const dry=ctx.createGain();
    const wet=ctx.createGain();
    const conv=ctx.createConvolver(); conv.buffer=this._thicketIR(3.8,2.4);

    const comp=ctx.createDynamicsCompressor();
    comp.threshold.value=-24; 
    comp.knee.value=12; 
    comp.ratio.value=12;
    comp.attack.value=0.003; 
    comp.release.value=0.15;

    const out=ctx.createGain(); out.gain.value=0;
    
    bus.connect(dry).connect(comp);
    bus.connect(conv).connect(wet).connect(comp);
    comp.connect(out).connect(ctx.destination);

    this.bus=bus; this.dry=dry; this.wet=wet; this.comp=comp; this.out=out;
    this.setWet(this.wetAmt);
    
    // INCREASED VOLUME: Ramps up to 1.5 instead of 0.85
    out.gain.linearRampToValueAtTime(5, ctx.currentTime+1.2); 
  },
  setWet(w){
    this.wetAmt=w;
    if(!this.ctx) return;
    this.dry.gain.value=lerp(1.0,0.50,w);
    this.wet.gain.value=w*0.55;
  },
  _thicketIR(dur,decay){
    const ctx=this.ctx,n=Math.floor(ctx.sampleRate*dur),b=ctx.createBuffer(2,n,ctx.sampleRate);
    for(let c=0;c<2;c++){
      const d=b.getChannelData(c); let prev=0, prev2=0;
      for(let i=0;i<n;i++){
        const t=i/n;
        const burst=(Math.random()*2-1)*Math.pow(1-t,decay);
        prev=prev*0.70+burst*0.30;
        prev2=prev2*0.42+prev*0.58;
        d[i]=prev2*(0.75+0.25*Math.sin(i*0.00021+c));
      }
    }
    return b;
  },
  _noiseBuffer(dur=0.35){
    const ctx=this.ctx,n=Math.floor(ctx.sampleRate*dur),b=ctx.createBuffer(1,n,ctx.sampleRate),d=b.getChannelData(0);
    for(let i=0;i<n;i++) d[i]=Math.random()*2-1;
    return b;
  },
  pluckFiber(fiber, amount=0.8){
    const ctx=this.ctx; if(!ctx) return;
    const now=ctx.currentTime+0.002;
    const f=fiber.freq();
    const age=fiber.ageN();
    const tension=fiber.tension();
    const woody=fiber.woody;
    const dur=lerp(0.2,1.1,age)*lerp(0.85,1.25,1-tension);
    const amp=(0.06+0.12*amount)*lerp(0.7,1.0,tension);

    const src=ctx.createBufferSource(); src.buffer=this._noiseBuffer(0.06);
    const env=ctx.createGain();
    env.gain.setValueAtTime(0,now);
    env.gain.linearRampToValueAtTime(amp,now+0.002);
    env.gain.exponentialRampToValueAtTime(0.0001,now+dur);

    const bp=ctx.createBiquadFilter(); bp.type='bandpass';
    bp.frequency.value=clamp(f*lerp(1.5,2.8,woody),120,3800);
    bp.Q.value=lerp(1.5,6.5,tension);

    const delay=ctx.createDelay(0.05); delay.delayTime.value=1/clamp(f,70,1200);
    
    const fb=ctx.createGain(); fb.gain.value=clamp(lerp(0.68,0.86,age)-tension*0.12,0.45,0.88);
    
    const tone=ctx.createBiquadFilter(); tone.type='lowpass';
    tone.frequency.value=lerp(700,3200,1-woody)*lerp(0.75,1.15,tension);
    tone.Q.value=0.2;

    src.connect(bp).connect(env).connect(delay).connect(tone).connect(this.bus);
    tone.connect(fb).connect(delay);
    
    src.start(now); src.stop(now+0.08);

    const o=ctx.createOscillator(); o.type=woody>0.55?'triangle':'sine';
    const og=ctx.createGain();
    o.frequency.setValueAtTime(f*(1+0.01*rnd(-1,1)),now);
    o.frequency.exponentialRampToValueAtTime(f*lerp(0.985,0.955,tension),now+0.08);
    og.gain.setValueAtTime(0,now);
    og.gain.linearRampToValueAtTime(amp*0.12,now+0.005);
    og.gain.exponentialRampToValueAtTime(0.0001,now+dur*0.7);
    o.connect(og).connect(this.bus); o.start(now); o.stop(now+dur+0.04);
  },
  scrapeFiber(fiber, amount=0.35){
    const ctx=this.ctx; if(!ctx||this.activeScrapes>=this.MAX_SCRAPES) return;
    const now=ctx.currentTime+0.002;
    const f=fiber.freq();
    const tension=fiber.tension();
    const rough=fiber.rough;
    const dur=0.10+0.18*rough;
    const src=ctx.createBufferSource(); src.buffer=this._noiseBuffer(dur+0.02);
    
    const hp=ctx.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=100+f*0.4;
    const bp=ctx.createBiquadFilter(); bp.type='bandpass';
    bp.frequency.value=clamp(f*lerp(1.2,4.0,rough),160,4500);
    bp.Q.value=lerp(0.8,5.5,tension);
    
    const trem=ctx.createOscillator(); trem.type='sine'; trem.frequency.value=lerp(11,38,rough)*lerp(0.7,1.4,tension);
    const tremG=ctx.createGain(); tremG.gain.value=(0.012+0.025*amount)*lerp(0.6,1.2,rough);
    
    const base=ctx.createGain(); base.gain.value=0.012+0.03*amount;
    const env=ctx.createGain();
    env.gain.setValueAtTime(0,now);
    env.gain.linearRampToValueAtTime(1,now+0.01);
    env.gain.exponentialRampToValueAtTime(0.001,now+dur);
    
    src.connect(hp).connect(bp).connect(base).connect(env).connect(this.bus);
    trem.connect(tremG).connect(env.gain);
    
    this.activeScrapes++;
    src.start(now); trem.start(now);
    src.stop(now+dur+0.03); trem.stop(now+dur+0.03);
    setTimeout(()=>{this.activeScrapes=Math.max(0,this.activeScrapes-1);},(dur+0.06)*1000);
  },
  nodePulse(node, amount=0.7){
    const ctx=this.ctx; if(!ctx) return;
    const now=ctx.currentTime+0.002;
    const f=lerp(110,440,node.pitchN);
    const dur=lerp(0.15,0.45,node.sap);
    const o=ctx.createOscillator(); o.type='triangle';
    const filt=ctx.createBiquadFilter(); filt.type='lowpass'; filt.frequency.value=lerp(500,2000,node.sap); filt.Q.value=0.7;
    const g=ctx.createGain();
    o.frequency.setValueAtTime(f*1.04,now);
    o.frequency.exponentialRampToValueAtTime(f,now+0.04);
    g.gain.setValueAtTime(0,now);
    g.gain.linearRampToValueAtTime(0.02+0.05*amount,now+0.006);
    g.gain.exponentialRampToValueAtTime(0.0001,now+dur);
    o.connect(filt).connect(g).connect(this.bus);
    o.start(now); o.stop(now+dur+0.03);
  }
};

/* ============================================================
   FIELD
   ============================================================ */
const cv=document.getElementById('stage');
const g=cv.getContext('2d',{alpha:false});
let W=0,H=0,DPR=1;
function resize(){
  DPR=Math.min(2,window.devicePixelRatio||1);
  W=innerWidth; H=innerHeight;
  cv.width=W*DPR; cv.height=H*DPR;
  cv.style.width=W+'px'; cv.style.height=H+'px';
  g.setTransform(DPR,0,0,DPR,0,0);
}
addEventListener('resize',resize); resize();

const nodes=[];
const fibers=[];
const motes=[];
const MAX_NODES=18;
const MAX_FIBERS=34;

function chromaHue(){
  const bands=[
    [24,48,0.34],
    [72,112,0.16],
    [128,166,0.14],
    [286,322,0.18],
    [332,358,0.18]
  ];
  let total=bands.reduce((s,b)=>s+b[2],0),r=Math.random()*total;
  for(const [a,b,w] of bands){ if((r-=w)<=0) return rnd(a,b); }
  return rnd(24,48);
}

class Node{
  constructor(x,y){
    this.x=x; this.y=y;
    this.vx=rnd(-8,8); this.vy=rnd(-8,8);
    this.r=rnd(8,18);
    this.hue=chromaHue();
    this.hue2=(this.hue+pick([42,86,146,214,284])+rnd(-10,10)+360)%360;
    this.pitchN=rnd(0,1);
    this.sap=rnd(0.25,1);
    this.breath=rnd(0,TAU);
    this.exc=0;
    this.born=0;
    this.age=0;
    this.cool=0;
    this.root=rnd(0.5,1.4);
  }
  step(dt,t){
    this.age+=dt; this.born=Math.min(1,this.born+dt*1.7);
    this.cool=Math.max(0,this.cool-dt);
    this.exc*=Math.pow(0.04,dt);
    this.breath+=dt*lerp(0.5,1.4,this.sap);
    const fx=Math.sin(this.y*0.005+t*0.12)+Math.sin(this.x*0.004-t*0.08);
    const fy=Math.cos(this.x*0.004-t*0.10)+Math.sin(this.y*0.003+t*0.09);
    this.vx+=fx*3.8*dt; this.vy+=fy*3.8*dt;
    this.vx*=Math.pow(0.42,dt); this.vy*=Math.pow(0.42,dt);
    this.x+=this.vx*dt; this.y+=this.vy*dt;
  }
  pulse(a=0.5){
    if(this.cool>0) return;
    this.cool=0.07;
    this.exc=Math.min(1.3,this.exc+0.35+a*0.8);
    Audio_.nodePulse(this,a);
  }
  draw(){
    const R=this.r*this.born*(1+0.08*Math.sin(this.breath)+this.exc*0.10);
    const ex=this.exc;
    g.save(); g.translate(this.x,this.y);

    const steps=24;
    g.beginPath();
    for(let i=0;i<=steps;i++){
      const a=i/steps*TAU;
      const wob=1+0.13*Math.sin(3*a+this.breath)+0.08*Math.sin(5*a-this.breath*0.7);
      const px=Math.cos(a)*R*wob, py=Math.sin(a)*R*wob;
      i?g.lineTo(px,py):g.moveTo(px,py);
    }
    g.closePath();
    const core=g.createRadialGradient(-R*.34,-R*.38,0,0,0,R*1.25);
    core.addColorStop(0,`hsl(${this.hue},82%,${72+ex*10}%)`);
    core.addColorStop(.45,`hsl(${this.hue},58%,${38+ex*18}%)`);
    core.addColorStop(1,`hsl(${this.hue2},48%,${18+ex*10}%)`);
    g.fillStyle=core; g.fill();
    g.lineWidth=1.1;
    g.strokeStyle=`hsla(${this.hue2},76%,${60+ex*16}%,.72)`;
    g.stroke();

    g.globalAlpha=0.25+ex*0.55;
    g.fillStyle=`hsla(${(this.hue+38)%360},88%,78%,1)`;
    g.beginPath(); g.arc(-R*.15,-R*.12,R*.22,0,TAU); g.fill();
    g.restore();
    g.globalCompositeOperation='source-over'; g.globalAlpha=1;
  }
}

class Fiber{
  constructor(a,b,manual=false){
    this.a=a; this.b=b;
    this.manual=manual;
    this.rest=this.length()*rnd(0.78,1.12);
    this.age=0; this.born=0;
    this.phase=rnd(0,TAU);
    this.phase2=rnd(0,TAU);
    this.hue=(lerp(a.hue,b.hue,0.5)+rnd(-18,18)+360)%360;
    this.hue2=(lerp(a.hue2,b.hue2,0.5)+rnd(-24,24)+360)%360;
    this.width=rnd(0.8,2.8)*(manual?1.25:0.9);
    this.rough=rnd(0,1);
    this.woody=rnd(0,1);
    this.exc=0;
    this.lastScrape=0;
    this.cool=0;
    this.memory=[];
  }
  length(){return Math.hypot(this.b.x-this.a.x,this.b.y-this.a.y)||1}
  ageN(){return clamp(this.age/10,0,1)}
  tension(){return clamp((this.length()/this.rest-0.72)/0.72,0,1)}
  freq(){
    const L=this.length();
    const t=this.tension();
    const base=lerp(520,110,clamp((L-30)/360,0,1));
    return clamp(base*lerp(0.78,1.8,t)*lerp(0.92,1.08,this.woody),85,720);
  }
  pluck(amount=0.8){
    if(this.cool>0) return;
    this.cool=0.08; 
    this.exc=Math.min(1.5,this.exc+0.45+amount*0.8);
    this.a.exc=Math.min(1.2,this.a.exc+amount*0.35);
    this.b.exc=Math.min(1.2,this.b.exc+amount*0.35);
    Audio_.pluckFiber(this,amount);
    this.spawnMotes(amount);
  }
  scrape(amount=0.35){
    const now=performance.now();
    if(now-this.lastScrape<140) return; 
    this.lastScrape=now;
    this.exc=Math.min(1.2,this.exc+0.12+amount*0.25);
    Audio_.scrapeFiber(this,amount);
  }
  spawnMotes(amount){
    const n=1+(amount*4|0);
    for(let i=0;i<n;i++){
      const p=rnd(0.15,0.85);
      const pt=this.point(p,0);
      motes.push({x:pt.x,y:pt.y,vx:rnd(-18,18),vy:rnd(-18,18),life:rnd(0.35,0.85),age:0,h:this.hue2,r:rnd(1,3)});
    }
  }
  point(p,t){
    const ax=this.a.x,ay=this.a.y,bx=this.b.x,by=this.b.y;
    const dx=bx-ax,dy=by-ay,L=Math.hypot(dx,dy)||1;
    const nx=-dy/L,ny=dx/L;
    const sag=Math.sin(p*Math.PI)*(12+36*(1-this.tension()))*(0.5+0.5*this.rough);
    const trem=Math.sin(p*Math.PI*2+this.phase+t*lerp(1.5,4.5,this.rough))*3.0*this.exc;
    const crawl=Math.sin(p*Math.PI*5+this.phase2+t*1.7)*lerp(0.6,2.2,this.rough)*this.born;
    return {x:lerp(ax,bx,p)+nx*(sag*0.18+trem+crawl), y:lerp(ay,by,p)+ny*(sag*0.18+trem+crawl)};
  }
  step(dt,t){
    this.age+=dt; this.born=Math.min(1,this.born+dt*1.8);
    this.cool=Math.max(0,this.cool-dt);
    this.exc*=Math.pow(0.08,dt);
    this.phase+=dt*lerp(0.4,1.4,this.rough);
    this.phase2+=dt*lerp(-0.8,0.8,this.woody);

    const dx=this.b.x-this.a.x,dy=this.b.y-this.a.y,L=Math.hypot(dx,dy)||1;
    const nx=dx/L,ny=dy/L;
    const aliveRest=this.rest*(1+0.035*Math.sin(this.age*0.6+this.phase));
    const stretch=L-aliveRest;
    const force=clamp(stretch*0.018,-0.55,0.55);
    this.a.vx+=nx*force; this.a.vy+=ny*force;
    this.b.vx-=nx*force; this.b.vy-=ny*force;

    const strain=Math.abs(stretch)/Math.max(20,aliveRest);
    const rel=((this.b.vx-this.a.vx)*nx+(this.b.vy-this.a.vy)*ny);
    if(strain>0.16 && Math.abs(rel)>2.2 && Math.random()<0.06){
      this.scrape(clamp(strain+Math.abs(rel)/90,0,1));
    }

    // Connect fibers randomly pluck themselves occasionally
    if(Math.random()<0.002){
      this.pluck(0.2 + Math.random()*0.3);
    }
  }
  draw(t){
    const pts=[]; const steps=18;
    for(let i=0;i<=steps;i++) pts.push(this.point(i/steps,t));
    const tension=this.tension(), ex=this.exc;

    g.save();
    g.globalCompositeOperation='lighter';

    g.globalAlpha=(0.13+0.18*tension+0.25*ex)*this.born;
    g.lineWidth=this.width*4.2;
    g.strokeStyle=`hsla(${this.hue},68%,38%,1)`;
    g.beginPath(); pts.forEach((p,i)=>i?g.lineTo(p.x,p.y):g.moveTo(p.x,p.y)); g.stroke();

    g.globalAlpha=(0.42+0.25*tension+0.32*ex)*this.born;
    g.lineWidth=this.width*(1.1+1.2*ex);
    g.strokeStyle=`hsla(${this.hue2},76%,${48+20*tension+10*ex}%,1)`;
    g.beginPath(); pts.forEach((p,i)=>i?g.lineTo(p.x,p.y):g.moveTo(p.x,p.y)); g.stroke();

    g.globalAlpha=(0.22+0.35*ex)*this.born;
    g.lineWidth=Math.max(0.65,this.width*0.38);
    g.setLineDash([rnd(5,12),rnd(10,22)]);
    g.lineDashOffset=-(this.age*20)%40;
    g.strokeStyle=`hsla(${(this.hue+42)%360},90%,74%,1)`;
    g.beginPath(); pts.forEach((p,i)=>i?g.lineTo(p.x,p.y):g.moveTo(p.x,p.y)); g.stroke();
    g.setLineDash([]);

    if(this.rough>0.38){
      g.globalAlpha=(0.08+0.16*ex+0.10*tension)*this.born;
      g.lineWidth=0.7;
      g.strokeStyle=`hsla(${this.hue},80%,68%,1)`;
      for(let k=2;k<steps;k+=2){
        const p=pts[k], p0=pts[k-1], p1=pts[k+1];
        const dx=p1.x-p0.x,dy=p1.y-p0.y,L=Math.hypot(dx,dy)||1;
        const nx=-dy/L,ny=dx/L;
        const len=lerp(3,12,this.rough)*(0.6+0.6*Math.sin(this.age*2+k));
        g.beginPath();
        g.moveTo(p.x,p.y);
        g.lineTo(p.x+nx*len,p.y+ny*len);
        g.stroke();
      }
    }
    g.restore();
    g.globalAlpha=1; g.globalCompositeOperation='source-over';
  }
}

function seedNode(x,y){
  if(nodes.length>=MAX_NODES){
    const old=nodes.shift();
    for(let i=fibers.length-1;i>=0;i--) {
      if(fibers[i].a===old||fibers[i].b===old) {
        fibers[i].pluck(0.7); // Sound triggered when connection breaks
        fibers.splice(i,1);
      }
    }
  }
  const n=new Node(x,y);
  nodes.push(n);
  let nearest=null, nd=Infinity;
  for(const other of nodes){
    if(other===n) continue;
    const d=Math.hypot(other.x-x,other.y-y);
    if(d<nd){nd=d;nearest=other;}
  }
  if(nearest && nd<230) makeFiber(nearest,n,false);
  n.pulse(0.35);
  return n;
}
function makeFiber(a,b,manual=false){
  if(!a||!b||a===b) return null;
  for(const f of fibers) if((f.a===a&&f.b===b)||(f.a===b&&f.b===a)) return f;
  if(fibers.length>=MAX_FIBERS) {
    fibers[0].pluck(0.7); // Sound triggered when connection breaks due to limit
    fibers.shift();
  }
  const f=new Fiber(a,b,manual); fibers.push(f); f.pluck(manual?0.45:0.3); return f; // Sound triggered when connection made
}
function hitNode(x,y){
  for(let i=nodes.length-1;i>=0;i--){
    const n=nodes[i];
    if(Math.hypot(x-n.x,y-n.y)<Math.max(24,n.r*1.8)) return n;
  }
  return null;
}
function hitFiber(x,y){
  let best=null, bd=18;
  for(const f of fibers){
    const steps=14;
    let prev=f.point(0,performance.now()/1000);
    for(let i=1;i<=steps;i++){
      const cur=f.point(i/steps,performance.now()/1000);
      const d=distToSeg(x,y,prev.x,prev.y,cur.x,cur.y);
      if(d<bd){bd=d;best=f;}
      prev=cur;
    }
  }
  return best;
}
function distToSeg(px,py,x1,y1,x2,y2){
  const dx=x2-x1,dy=y2-y1,l2=dx*dx+dy*dy||1;
  const t=clamp(((px-x1)*dx+(py-y1)*dy)/l2,0,1);
  return Math.hypot(px-(x1+dx*t),py-(y1+dy*t));
}

/* ============================================================
   INTERACTION
   ============================================================ */
let lastInteract=performance.now();
let lastTapTime=0;
let drag={active:false,start:null,last:null,ghost:null,moved:false,lastSeed:0,lastX:0,lastY:0};

function eraseNodeAt(x,y){
  const n=hitNode(x,y);
  if(!n) return false;
  const idx=nodes.indexOf(n);
  if(idx===-1) return false;
  for(let i=fibers.length-1;i>=0;i--){
    if(fibers[i].a===n||fibers[i].b===n){
      fibers[i].pluck(0.7);
      fibers.splice(i,1);
    }
  }
  nodes.splice(idx,1);
  if(drag.start===n||drag.last===n){
    drag.active=false; drag.start=null; drag.last=null; drag.ghost=null;
  }
  return true;
}

function startPointer(x,y){
  lastInteract=performance.now();
  let n=hitNode(x,y);
  if(!n){
    const f=hitFiber(x,y);
    if(f){ f.pluck(0.7); return; }
    n=seedNode(x,y);
  } else {
    n.pulse(0.5);
    for(const f of fibers) if(f.a===n||f.b===n) f.pluck(0.4);
  }
  drag.active=true; drag.start=n; drag.last=n; drag.ghost={x,y}; drag.moved=false; drag.lastSeed=performance.now(); drag.lastX=x; drag.lastY=y;
}
function movePointer(x,y){
  if(!drag.active) return;
  lastInteract=performance.now();
  const d=Math.hypot(x-drag.lastX,y-drag.lastY);
  drag.ghost={x,y};
  if(d>5) drag.moved=true;
  const now=performance.now();
  if((Math.hypot(x-drag.last.x,y-drag.last.y)>72 && now-drag.lastSeed>110) || Math.hypot(x-drag.last.x,y-drag.last.y)>130){
    const n=seedNode(x,y);
    makeFiber(drag.last,n,true);
    drag.last=n; drag.lastSeed=now;
  } else {
    const f=hitFiber(x,y);
    if(f) f.scrape(clamp(d/40,0,1));
  }
  drag.lastX=x; drag.lastY=y;
}
function endPointer(x,y){
  if(!drag.active) return;
  const n=hitNode(x,y);
  if(n && n!==drag.last) makeFiber(drag.last,n,true);
  if(drag.moved && drag.last){
    for(const f of fibers) if(f.a===drag.last||f.b===drag.last) f.pluck(0.35);
  }
  drag.active=false; drag.start=null; drag.last=null; drag.ghost=null;
}

cv.addEventListener('pointerdown',e=>{
  e.preventDefault();
  const x=e.clientX, y=e.clientY;
  const now=Date.now();
  if(e.button===2||e.shiftKey){
    eraseNodeAt(x,y);
    return;
  }
  if(now-lastTapTime<300){
    if(eraseNodeAt(x,y)){
      lastTapTime=0;
      drag.active=false;
      return;
    }
  }
  lastTapTime=now;
  cv.setPointerCapture(e.pointerId);
  startPointer(x,y);
},{passive:false});
cv.addEventListener('contextmenu',e=>e.preventDefault());
cv.addEventListener('pointermove',e=>{e.preventDefault();movePointer(e.clientX,e.clientY);},{passive:false});
cv.addEventListener('pointerup',e=>{e.preventDefault();endPointer(e.clientX,e.clientY);},{passive:false});
cv.addEventListener('pointercancel',e=>{e.preventDefault();drag.active=false;},{passive:false});

/* ============================================================
   GATE / UI
   ============================================================ */
const gate=document.getElementById('gate');
const hint=document.getElementById('hint');
const titleEl=document.getElementById('title');
const wetEl=document.getElementById('wet');
wetEl.addEventListener('input',()=>Audio_.setWet(wetEl.value/100));

let started=false;
function begin(){
  if(started) return; started=true;
  Audio_.start();
  gate.classList.add('gone');
  const a=seedNode(rnd(W*.30,W*.44),rnd(H*.42,H*.58));
  const b=seedNode(rnd(W*.52,W*.68),rnd(H*.36,H*.52));
  const c=seedNode(rnd(W*.43,W*.57),rnd(H*.58,H*.72));
  makeFiber(a,b,true); makeFiber(b,c,true); makeFiber(c,a,false);
  setTimeout(()=>hint.classList.add('gone'),7600);
  setTimeout(()=>titleEl.classList.add('dim'),4200);
}
gate.addEventListener('pointerdown',e=>{e.preventDefault();begin();},{passive:false});
window.addEventListener('keydown',(e)=>{
  if(e.key.toLowerCase()==='h') document.body.classList.toggle('hide-ui');
});

/* ============================================================
   COLLISIONS / NEAR CONTACT
   ============================================================ */
function nodeCollide(){
  for(let i=0;i<nodes.length;i++){
    for(let j=i+1;j<nodes.length;j++){
      const a=nodes[i],b=nodes[j];
      const dx=b.x-a.x,dy=b.y-a.y,d=Math.hypot(dx,dy)||1,min=a.r+b.r+6;
      if(d<min){
        const nx=dx/d,ny=dy/d,ov=min-d;
        a.x-=nx*ov*.5; a.y-=ny*ov*.5; b.x+=nx*ov*.5; b.y+=ny*ov*.5;
        const vn=(b.vx-a.vx)*nx+(b.vy-a.vy)*ny;
        if(vn<0){
          const imp=-vn*.55;
          a.vx-=nx*imp; a.vy-=ny*imp; b.vx+=nx*imp; b.vy+=ny*imp;
          // Only create connections on impact; disabled general node bounce sounds here
          makeFiber(a,b,false); 
        }
      }
    }
  }
}
function autoWeave(){
  if(nodes.length<2 || fibers.length>MAX_FIBERS-3) return;
  if(Math.random()>0.012) return;
  const a=pick(nodes); let best=null,bd=Infinity;
  for(const b of nodes){
    if(a===b) continue;
    const d=Math.hypot(a.x-b.x,a.y-b.y);
    if(d<bd && d>42 && d<180){bd=d;best=b;}
  }
  if(best) makeFiber(a,best,false);
}

function drawBackground(t){
  g.globalCompositeOperation='source-over';
  // Matches the new --ground-0 (#8c9296)
  g.fillStyle='rgba(140, 146, 150, 0.28)'; 
  g.fillRect(0,0,W,H);

  const vg=g.createRadialGradient(W*.48,H*.44,Math.min(W,H)*.08,W*.5,H*.5,Math.max(W,H)*.78);
  vg.addColorStop(0,'rgba(207, 155, 104, 0.055)');   // sap
  vg.addColorStop(.52,'rgba(130, 110, 171, 0.045)'); // bruise
  vg.addColorStop(1,'rgba(140, 146, 150, 0.18)');    // ground-0
  g.fillStyle=vg; g.fillRect(0,0,W,H);
}
function drawGhost(t){
  if(!drag.active || !drag.last || !drag.ghost) return;
  const temp={a:drag.last,b:{x:drag.ghost.x,y:drag.ghost.y},rest:80,age:1,born:1,phase:t,phase2:t*.7,hue:drag.last.hue,hue2:drag.last.hue2,width:1.1,rough:.8,woody:.4,exc:.35,
    length(){return Math.hypot(this.b.x-this.a.x,this.b.y-this.a.y)||1},
    tension(){return clamp((this.length()/this.rest-0.72)/0.72,0,1)},
    point: Fiber.prototype.point
  };
  g.save(); g.globalCompositeOperation='lighter';
  const pts=[]; for(let i=0;i<=12;i++) pts.push(temp.point(i/12,t));
  g.globalAlpha=.30; g.lineWidth=1.2; g.setLineDash([5,9]);
  g.strokeStyle=`hsla(${drag.last.hue2},85%,72%,1)`;
  g.beginPath(); pts.forEach((p,i)=>i?g.lineTo(p.x,p.y):g.moveTo(p.x,p.y)); g.stroke();
  g.setLineDash([]); g.restore(); g.globalAlpha=1; g.globalCompositeOperation='source-over';
}
function updateMotes(dt){
  for(const m of motes){
    m.age+=dt; m.x+=m.vx*dt; m.y+=m.vy*dt; m.vy-=6*dt; m.vx*=Math.pow(.5,dt); m.vy*=Math.pow(.5,dt);
  }
  for(let i=motes.length-1;i>=0;i--) if(motes[i].age>motes[i].life) motes.splice(i,1);
}
function drawMotes(){
  g.save(); g.globalCompositeOperation='lighter';
  for(const m of motes){
    const a=1-m.age/m.life;
    g.globalAlpha=a*.55; g.fillStyle=`hsla(${m.h},86%,70%,1)`;
    g.beginPath(); g.arc(m.x,m.y,m.r*a,0,TAU); g.fill();
  }
  g.restore(); g.globalAlpha=1; g.globalCompositeOperation='source-over';
}

/* ============================================================
   LOOP
   ============================================================ */
let last=performance.now();
function frame(now){
  const dt=Math.min((now-last)/1000,0.05); last=now;
  const t=now/1000;
  drawBackground(t);
  if(started){
    for(const f of fibers) f.step(dt,t);
    for(const n of nodes) n.step(dt,t);
    nodeCollide();
    autoWeave();
    updateMotes(dt);

    for(let i=fibers.length-1;i>=0;i--){
      const f=fibers[i];
      if(!f.manual && f.age>18 && f.exc<0.05 && Math.random()<0.006) {
        f.pluck(0.6); // Sound triggered when connection breaks via decay
        fibers.splice(i,1);
      }
    }

    for(const f of fibers) f.draw(t);
    drawGhost(t);
    drawMotes();
    for(const n of nodes) n.draw();

    if(now-lastInteract>15000) hint.classList.remove('gone');
  }
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
