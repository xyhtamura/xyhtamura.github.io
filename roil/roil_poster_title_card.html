<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;400;600;700&family=UnifrakturCook:wght@700&display=swap" rel="stylesheet">
  <title>Roil — Poster Title Card</title>
  <style>
    :root {
      --bg:           #070605;
      --section-bg:   #0e0b09;
      --panel:        #120c09;
      --panel-hi:     #1c110b;
      --border:       #2a1c14;
      --border-hot:   #5a2b12;
      --slider-track: #1c1410;

      --accent:       #c84000;
      --accent-hover: #f05010;
      --accent-glow:  rgba(200, 64, 0, 0.28);
      --ember:        rgba(255, 104, 16, 0.55);

      --handle:       #c08820;
      --handle-hi:    #e8b840;
      --handle-glow:  rgba(192, 136, 32, 0.38);

      --value:        #94c890;
      --value-dim:    rgba(148, 200, 144, 0.22);

      --text:         #ddd0bc;
      --text-dim:     #6a5040;
      --title:        #de4206;

      --poster-ratio: 16 / 9;
      --magma: url("magma.png");
    }

    *, *::before, *::after { box-sizing: border-box; }

    html, body { min-height: 100%; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      overflow: hidden;
      background:
        radial-gradient(ellipse 90% 65% at 50% 5%, #230d04 0%, transparent 62%),
        radial-gradient(circle at 8% 84%, rgba(192, 136, 32, 0.16), transparent 30%),
        radial-gradient(circle at 94% 78%, rgba(200, 64, 0, 0.18), transparent 32%),
        #070605;
      color: var(--text);
      font-family: "Chakra Petch", sans-serif;
      letter-spacing: 0.03em;
    }

    .poster {
      position: relative;
      width: min(94vw, 1280px);
      aspect-ratio: var(--poster-ratio);
      overflow: hidden;
      isolation: isolate;
      border: 1px solid var(--border);
      border-radius: 6px;
      background:
        linear-gradient(180deg, rgba(255, 150, 40, 0.04), transparent 28%, rgba(0,0,0,0.26)),
        radial-gradient(ellipse 60% 68% at 52% 43%, rgba(200, 64, 0, 0.19), transparent 59%),
        radial-gradient(ellipse 40% 36% at 48% 53%, rgba(232, 184, 64, 0.10), transparent 70%),
        var(--bg);
      box-shadow:
        0 24px 90px rgba(0, 0, 0, 0.72),
        0 0 0 1px rgba(255, 172, 64, 0.03) inset,
        0 0 90px rgba(200, 64, 0, 0.13);
    }

    .poster::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 5;
      pointer-events: none;
      background:
        repeating-linear-gradient(0deg, transparent 0 3px, rgba(0,0,0,0.10) 3px 4px),
        repeating-linear-gradient(90deg, rgba(255,255,255,0.018) 0 1px, transparent 1px 42px),
        radial-gradient(ellipse 95% 55% at 50% 50%, transparent 44%, rgba(0,0,0,0.54) 100%);
      mix-blend-mode: normal;
    }

    .poster::after {
      content: "";
      position: absolute;
      inset: 14px;
      z-index: 6;
      pointer-events: none;
      border: 1px solid rgba(90, 43, 18, 0.72);
      border-radius: 4px;
      box-shadow:
        0 0 0 1px rgba(0,0,0,0.7),
        0 0 42px rgba(200, 64, 0, 0.12) inset;
      opacity: 0.85;
    }

    .magma-field {
      position: absolute;
      inset: -18%;
      z-index: 0;
      background-image:
        radial-gradient(circle at 50% 50%, rgba(255, 144, 34, 0.13), transparent 18%),
        var(--magma),
        radial-gradient(circle at 50% 48%, #331105 0%, transparent 58%);
      background-size: 100% 100%, 420px 420px, 100% 100%;
      background-position: center, 50% 64%, center;
      opacity: 0.18;
      filter: saturate(1.25) contrast(1.18) blur(0.15px);
      transform: rotate(-8deg) scale(1.08);
      animation: magmaDrift 18s ease-in-out infinite alternate;
    }

    @keyframes magmaDrift {
      from { background-position: center, 45% 58%, center; transform: rotate(-8deg) scale(1.08); }
      to   { background-position: center, 57% 68%, center; transform: rotate(-5deg) scale(1.14); }
    }

    .noise {
      position: absolute;
      inset: 0;
      z-index: 4;
      pointer-events: none;
      opacity: 0.18;
      background-image:
        radial-gradient(circle at 10% 20%, rgba(255,255,255,.10) 0 1px, transparent 1.4px),
        radial-gradient(circle at 70% 60%, rgba(255,255,255,.08) 0 1px, transparent 1.5px);
      background-size: 23px 19px, 31px 29px;
      mix-blend-mode: overlay;
    }

    #signalCanvas {
      position: absolute;
      inset: 0;
      z-index: 2;
      width: 100%;
      height: 100%;
      opacity: 0.95;
    }

    .grid-plate {
      position: absolute;
      inset: 8.5% 6.5%;
      z-index: 1;
      background:
        linear-gradient(to right, rgba(42,28,20,0.34) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(42,28,20,0.25) 1px, transparent 1px);
      background-size: 72px 72px;
      mask-image: radial-gradient(ellipse 68% 63% at center, #000 0 64%, transparent 85%);
      opacity: 0.55;
    }

    .sigil-ring {
      position: absolute;
      inset: 10.5% 20%;
      z-index: 1;
      border: 1px solid rgba(192, 136, 32, 0.26);
      border-radius: 50%;
      background:
        radial-gradient(circle, transparent 0 37%, rgba(200,64,0,0.05) 37.2% 38%, transparent 38.5% 100%),
        conic-gradient(from 20deg,
          transparent 0 10deg,
          rgba(192,136,32,0.22) 10deg 11deg,
          transparent 11deg 44deg,
          rgba(200,64,0,0.28) 44deg 45deg,
          transparent 45deg 94deg,
          rgba(148,200,144,0.18) 94deg 95deg,
          transparent 95deg 170deg,
          rgba(192,136,32,0.18) 170deg 172deg,
          transparent 172deg 360deg);
      box-shadow:
        0 0 90px rgba(200, 64, 0, 0.10),
        0 0 0 22px rgba(14, 11, 9, 0.28) inset,
        0 0 0 23px rgba(42,28,20,0.45) inset;
      transform: rotate(-8deg);
      animation: ringBreath 7s ease-in-out infinite;
    }

    .sigil-ring::before,
    .sigil-ring::after {
      content: "";
      position: absolute;
      inset: 11%;
      border-radius: 50%;
      border: 1px dashed rgba(106,80,64,0.52);
    }

    .sigil-ring::after {
      inset: 31%;
      border-style: solid;
      border-color: rgba(200,64,0,0.32);
      box-shadow: 0 0 24px rgba(200,64,0,0.14);
    }

    @keyframes ringBreath {
      0%, 100% { opacity: .68; filter: saturate(1); }
      45% { opacity: .95; filter: saturate(1.4); }
    }

    .micro-label {
      position: absolute;
      z-index: 7;
      color: var(--text-dim);
      font-size: clamp(7px, 0.75vw, 10px);
      line-height: 1;
      text-transform: uppercase;
      letter-spacing: 0.22em;
      font-weight: 600;
      opacity: 0.72;
      white-space: nowrap;
    }

    .micro-label strong { color: var(--value); font-weight: 700; }
    .micro-label b { color: var(--handle); font-weight: 700; }

    .micro-label.tl { top: 4.5%; left: 4.5%; }
    .micro-label.tr { top: 4.5%; right: 4.5%; text-align: right; }
    .micro-label.bl { bottom: 4.5%; left: 4.5%; }
    .micro-label.br { bottom: 4.5%; right: 4.5%; text-align: right; }

    .title-block {
      position: absolute;
      inset: 0;
      z-index: 8;
      display: grid;
      place-items: center;
      text-align: center;
      pointer-events: none;
    }

    .title-inner {
      position: relative;
      width: 78%;
      max-width: 980px;
      transform: translateY(-1.5%);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 0.75em;
      margin-bottom: 0.9rem;
      color: var(--text-dim);
      font-size: clamp(0.48rem, 1vw, 0.7rem);
      letter-spacing: 0.42em;
      text-transform: uppercase;
      font-weight: 700;
    }

    .eyebrow::before,
    .eyebrow::after {
      content: "";
      display: inline-block;
      width: clamp(36px, 6vw, 78px);
      height: 1px;
      background: linear-gradient(to right, transparent, var(--border-hot), transparent);
      box-shadow: 0 0 10px rgba(200,64,0,0.25);
    }

    h1 {
      margin: 0;
      font-family: "UnifrakturCook", serif;
      font-size: clamp(5.8rem, 19vw, 16rem);
      line-height: 0.72;
      letter-spacing: clamp(0.06em, 0.9vw, 0.12em);
      color: transparent;
      background-image:
        linear-gradient(rgba(255, 225, 190, 0.46), rgba(255, 95, 15, 0.13)),
        var(--magma),
        linear-gradient(115deg, #571702, #f05010 38%, #e8b840 52%, #8b2804 76%, #260c03);
      background-size: 100% 100%, 360px 360px, 100% 100%;
      background-position: center, 50% 70%, center;
      background-repeat: no-repeat, repeat, no-repeat;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 3px 1px rgba(20,8,0,0.96));
      text-shadow:
        1px 1px 0 rgba(60, 20, 0, 0.85),
        0 0 18px rgba(255, 180, 60, 0.30),
        0 0 58px rgba(255, 90, 0, 0.35),
        0 7px 12px rgba(0,0,0,0.92);
      animation: titleFlicker 5.5s ease-in-out infinite;
    }

    @keyframes titleFlicker {
      0%,100% { text-shadow: 1px 1px 0 rgba(60,20,0,.85), 0 0 18px rgba(255,180,60,.25), 0 0 58px rgba(255,90,0,.30), 0 7px 12px rgba(0,0,0,.92); }
      24% { text-shadow: 1px 1px 0 rgba(60,20,0,.85), 0 0 34px rgba(255,184,70,.43), 0 0 92px rgba(255,90,0,.42), 0 7px 12px rgba(0,0,0,.92); }
      48% { text-shadow: 1px 1px 0 rgba(60,20,0,.85), 0 0 12px rgba(255,180,60,.18), 0 0 34px rgba(255,90,0,.18), 0 7px 12px rgba(0,0,0,.92); }
      72% { text-shadow: 1px 1px 0 rgba(60,20,0,.85), 0 0 24px rgba(255,184,70,.32), 0 0 75px rgba(255,90,0,.36), 0 7px 12px rgba(0,0,0,.92); }
    }

    .subtitle {
      margin: 1rem 0 0;
      color: var(--text-dim);
      font-size: clamp(0.58rem, 1.35vw, 1.05rem);
      text-transform: uppercase;
      letter-spacing: clamp(0.22em, 0.65vw, 0.52em);
      font-weight: 300;
      text-shadow: 0 0 18px rgba(0,0,0,0.85);
    }

    .subtitle span {
      color: rgba(221,208,188,0.84);
      font-weight: 600;
    }

    .ornament-row {
      position: relative;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 1rem;
      align-items: center;
      margin: 1.35rem auto 0;
      width: min(66vw, 620px);
      opacity: 0.88;
    }

    .ornament-row::before,
    .ornament-row::after {
      content: "";
      height: 5px;
      border-radius: 99px;
      background:
        linear-gradient(to right,
          transparent,
          var(--slider-track) 12%,
          var(--handle) 49%,
          var(--accent) 52%,
          var(--slider-track) 86%,
          transparent);
      box-shadow: 0 0 18px rgba(192,136,32,0.18);
    }

    .ornament-dot {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: radial-gradient(circle at 38% 35%, var(--handle-hi), var(--handle) 58%, #4b2607 100%);
      box-shadow:
        0 0 0 3px var(--bg),
        0 0 18px var(--handle-glow),
        0 0 46px rgba(200,64,0,.22);
    }

    .panel-strip {
      position: absolute;
      z-index: 3;
      left: 5.4%;
      right: 5.4%;
      bottom: 10.5%;
      height: 17.5%;
      display: grid;
      grid-template-columns: 1fr 1.1fr 1fr 0.95fr;
      gap: 0.7rem;
      opacity: 0.86;
    }

    .poster-panel {
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(42,28,20,0.92);
      border-radius: 3px;
      background:
        linear-gradient(180deg, rgba(255, 164, 55, 0.035), transparent 45%),
        rgba(14, 11, 9, 0.78);
      box-shadow:
        0 0 24px rgba(0,0,0,0.38) inset,
        0 0 20px rgba(200,64,0,0.04);
      padding: 0.75rem;
    }

    .poster-panel::before {
      content: attr(data-label);
      position: absolute;
      top: 0.62rem;
      left: 0.72rem;
      color: var(--text-dim);
      font-size: clamp(0.42rem, 0.7vw, 0.58rem);
      letter-spacing: 0.26em;
      text-transform: uppercase;
      font-weight: 700;
    }

    .poster-panel::after {
      content: "";
      position: absolute;
      left: 0.75rem;
      right: 0.75rem;
      top: 1.7rem;
      height: 1px;
      background: linear-gradient(to right, rgba(200,64,0,0.72), rgba(42,28,20,0.45), transparent);
    }

    .panel-dots {
      position: absolute;
      right: 0.65rem;
      top: 0.58rem;
      display: flex;
      gap: 0.28rem;
    }

    .panel-dots i {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--accent);
      opacity: 0.68;
      box-shadow: 0 0 9px rgba(200,64,0,.35);
    }

    .mini-sliders {
      position: absolute;
      left: 0.8rem;
      right: 0.8rem;
      top: 2.45rem;
      bottom: 0.72rem;
      display: grid;
      align-content: space-evenly;
      gap: 0.55rem;
    }

    .rail {
      position: relative;
      height: 5px;
      border-radius: 999px;
      background: var(--slider-track);
      overflow: visible;
    }

    .rail::before {
      content: "";
      position: absolute;
      inset: 0;
      width: var(--fill, 55%);
      border-radius: inherit;
      background: linear-gradient(to right, #6e4810, var(--handle), var(--accent));
      box-shadow: 0 0 10px rgba(192,136,32,0.18);
    }

    .rail::after {
      content: "";
      position: absolute;
      left: var(--fill, 55%);
      top: 50%;
      width: 15px;
      height: 15px;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, var(--handle-hi), var(--handle));
      box-shadow: 0 0 0 2px var(--bg), 0 0 14px var(--handle-glow);
    }

    .numeric-swarm {
      position: absolute;
      inset: 2.38rem 0.7rem 0.55rem;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.32rem;
    }

    .num {
      display: grid;
      place-items: center;
      color: var(--value);
      font-family: "Courier New", monospace;
      font-size: clamp(0.45rem, 0.86vw, 0.76rem);
      border-bottom: 1px solid var(--value-dim);
      background: rgba(7,6,5,0.42);
      opacity: 0.82;
    }

    .preset-ornaments {
      position: absolute;
      inset: 2.35rem 0.75rem 0.72rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.55rem;
    }

    .roman {
      width: clamp(30px, 4vw, 48px);
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      border: 1px solid rgba(90,43,18,0.88);
      color: var(--handle);
      font-family: "UnifrakturCook", serif;
      font-size: clamp(1rem, 2vw, 1.55rem);
      background:
        radial-gradient(circle at 50% 0%, rgba(200,64,0,0.12), transparent 62%),
        rgba(20,16,16,0.7);
      box-shadow: 0 0 16px rgba(192,136,32,0.08);
    }

    .wave-loader-card {
      position: absolute;
      z-index: 3;
      top: 11%;
      left: 6.4%;
      width: 24%;
      height: 18%;
      border: 1px solid rgba(42,28,20,0.85);
      border-radius: 3px;
      background: rgba(6,4,4,0.58);
      box-shadow: 0 0 28px rgba(0,0,0,0.38) inset;
      overflow: hidden;
      opacity: 0.86;
    }

    .wave-loader-card::before {
      content: "waveform loader";
      position: absolute;
      top: 0.62rem;
      left: 0.75rem;
      z-index: 2;
      color: var(--text-dim);
      font-size: clamp(0.38rem, 0.65vw, 0.55rem);
      text-transform: uppercase;
      letter-spacing: 0.25em;
      font-weight: 700;
    }

    .wave-loader-card svg {
      position: absolute;
      inset: 25% 5% 10%;
      width: 90%;
      height: 65%;
      overflow: visible;
    }

    .wave-loader-card path {
      fill: none;
      stroke: var(--accent);
      stroke-width: 1.8;
      filter: drop-shadow(0 0 6px rgba(200,64,0,0.55));
      stroke-dasharray: 420;
      animation: waveDash 7s ease-in-out infinite;
    }

    @keyframes waveDash {
      0%, 100% { stroke-dashoffset: 0; opacity: .78; }
      50% { stroke-dashoffset: -150; opacity: 1; }
    }

    .side-glyphs {
      position: absolute;
      z-index: 3;
      top: 11%;
      right: 7%;
      height: 42%;
      width: 14%;
      display: grid;
      grid-template-rows: repeat(6, 1fr);
      gap: 0.42rem;
      opacity: 0.75;
    }

    .glyph-row {
      display: grid;
      grid-template-columns: 18px 1fr 38px;
      align-items: center;
      gap: 0.45rem;
      color: var(--text-dim);
      font-family: "Courier New", monospace;
      font-size: clamp(0.46rem, 0.76vw, 0.68rem);
    }

    .glyph-row i {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 12px rgba(200,64,0,.35);
      justify-self: center;
    }

    .glyph-row span {
      height: 1px;
      background: linear-gradient(to right, rgba(90,43,18,0.86), transparent);
    }

    .glyph-row b {
      color: var(--value);
      font-weight: 400;
      text-align: right;
    }

    .corner-knobs {
      position: absolute;
      inset: 0;
      z-index: 7;
      pointer-events: none;
    }

    .knob {
      position: absolute;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 38% 34%, var(--handle-hi), var(--handle) 46%, #43240a 72%, #090604 100%);
      box-shadow:
        0 0 0 2px #050403,
        0 0 12px var(--handle-glow),
        0 0 0 1px rgba(232,184,64,0.23) inset;
      opacity: 0.8;
    }

    .knob::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 3px;
      width: 1px;
      height: 7px;
      background: #fff0ba;
      opacity: 0.45;
      transform-origin: 50% 9px;
      transform: rotate(var(--a, 18deg));
    }

    .knob.k1 { left: 24px; top: 24px; --a: 22deg; }
    .knob.k2 { right: 24px; top: 24px; --a: 132deg; }
    .knob.k3 { left: 24px; bottom: 24px; --a: -44deg; }
    .knob.k4 { right: 24px; bottom: 24px; --a: 77deg; }

    .hot-slash {
      position: absolute;
      z-index: 2;
      inset: 20% 16%;
      background:
        linear-gradient(108deg,
          transparent 0 38%,
          rgba(200,64,0,0.00) 39%,
          rgba(200,64,0,0.38) 49.2%,
          rgba(232,184,64,0.19) 50.2%,
          rgba(200,64,0,0.28) 51%,
          transparent 62% 100%);
      filter: blur(0.5px);
      opacity: .54;
      transform: skew(-8deg);
    }

    .pythia-echo {
      position: absolute;
      z-index: 1;
      left: 50%;
      top: 48%;
      transform: translate(-50%, -50%);
      font-family: "UnifrakturCook", serif;
      font-size: clamp(10rem, 30vw, 25rem);
      line-height: 1;
      color: transparent;
      -webkit-text-stroke: 1px rgba(90,43,18,0.32);
      opacity: 0.23;
      filter: blur(0.2px);
      letter-spacing: 0.08em;
      pointer-events: none;
    }

    @media (max-width: 760px) {
      .poster { width: 100vw; border-radius: 0; }
      .panel-strip { grid-template-columns: 1fr 1fr; height: 24%; bottom: 7%; }
      .poster-panel:nth-child(n+3) { display: none; }
      .wave-loader-card { width: 34%; }
      .side-glyphs { display: none; }
      .subtitle { margin-top: .7rem; }
      .ornament-row { margin-top: .8rem; width: 72vw; }
    }
  </style>
</head>
<body>
  <main class="poster" aria-label="Roil poster title card">
    <div class="magma-field" aria-hidden="true"></div>
    <div class="grid-plate" aria-hidden="true"></div>
    <div class="sigil-ring" aria-hidden="true"></div>
    <div class="hot-slash" aria-hidden="true"></div>
    <canvas id="signalCanvas" aria-hidden="true"></canvas>
    <div class="pythia-echo" aria-hidden="true">Roil</div>

    <div class="wave-loader-card" aria-hidden="true">
      <svg viewBox="0 0 320 90" preserveAspectRatio="none">
        <path d="M0,48 C18,18 31,82 47,42 C68,-8 82,103 102,47 C124,-15 140,103 160,45 C182,-5 195,86 213,46 C232,13 249,76 267,46 C286,21 303,63 320,41" />
      </svg>
    </div>

    <div class="side-glyphs" aria-hidden="true">
      <div class="glyph-row"><i></i><span></span><b>20</b></div>
      <div class="glyph-row"><i></i><span></span><b>93</b></div>
      <div class="glyph-row"><i></i><span></span><b>1279</b></div>
      <div class="glyph-row"><i></i><span></span><b>7.3</b></div>
      <div class="glyph-row"><i></i><span></span><b>34.833</b></div>
      <div class="glyph-row"><i></i><span></span><b>0.18</b></div>
    </div>

    <div class="title-block">
      <div class="title-inner">
        <div class="eyebrow">aperiodic signal instrument</div>
        <h1>Roil</h1>
        <p class="subtitle"><span>Eosforos</span> Oscillator</p>
        <div class="ornament-row"><i class="ornament-dot"></i></div>
      </div>
    </div>

    <section class="panel-strip" aria-hidden="true">
      <div class="poster-panel" data-label="oscillator">
        <div class="panel-dots"><i></i><i></i><i></i></div>
        <div class="mini-sliders">
          <div class="rail" style="--fill: 18%"></div>
          <div class="rail" style="--fill: 54%"></div>
          <div class="rail" style="--fill: 90%"></div>
        </div>
      </div>
      <div class="poster-panel" data-label="filter">
        <div class="panel-dots"><i></i><i></i><i></i></div>
        <div class="numeric-swarm">
          <div class="num">20</div><div class="num">1279</div><div class="num">15000</div>
          <div class="num">0.1</div><div class="num">7.3</div><div class="num">30</div>
          <div class="num">0</div><div class="num">50.000</div><div class="num">50</div>
        </div>
      </div>
      <div class="poster-panel" data-label="presets">
        <div class="panel-dots"><i></i><i></i><i></i></div>
        <div class="preset-ornaments">
          <div class="roman">I</div>
          <div class="roman">II</div>
          <div class="roman">III</div>
          <div class="roman">IV</div>
        </div>
      </div>
      <div class="poster-panel" data-label="echo">
        <div class="panel-dots"><i></i><i></i><i></i></div>
        <div class="mini-sliders">
          <div class="rail" style="--fill: 9%"></div>
          <div class="rail" style="--fill: 37%"></div>
          <div class="rail" style="--fill: 4%"></div>
        </div>
      </div>
    </section>

    <p class="micro-label tl">activate / <b>randomize</b> / stop</p>
    <p class="micro-label tr">cutoff <strong>noise depth</strong> / q drift</p>
    <p class="micro-label bl">drop .wav → custom waveform</p>
    <p class="micro-label br">spc · r · 1–4 · ⇧ save</p>

    <div class="corner-knobs" aria-hidden="true">
      <i class="knob k1"></i>
      <i class="knob k2"></i>
      <i class="knob k3"></i>
      <i class="knob k4"></i>
    </div>
    <div class="noise" aria-hidden="true"></div>
  </main>

  <script>
    const canvas = document.getElementById('signalCanvas');
    const ctx = canvas.getContext('2d');
    let w = 0, h = 0, t = 0;

    function resize() {
      const rect = canvas.getBoundingClientRect();
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      w = rect.width;
      h = rect.height;
      canvas.width = Math.floor(w * dpr);
      canvas.height = Math.floor(h * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    function drawWave(yBase, amp, speed, phase, color, alpha, width) {
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.strokeStyle = color;
      ctx.lineWidth = width;
      ctx.beginPath();
      const start = w * 0.13;
      const end = w * 0.87;
      for (let i = 0; i <= 240; i++) {
        const p = i / 240;
        const x = start + p * (end - start);
        const envelope = Math.sin(Math.PI * p);
        const y = yBase
          + Math.sin(p * Math.PI * 6.0 + t * speed + phase) * amp * envelope
          + Math.sin(p * Math.PI * 21.0 - t * speed * 1.7 + phase * 2.1) * amp * 0.24 * envelope;
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.stroke();
      ctx.restore();
    }

    function drawParticles() {
      ctx.save();
      for (let i = 0; i < 75; i++) {
        const seed = i * 999;
        const x = (Math.sin(seed * 12.989 + t * 0.12) * 0.5 + 0.5) * w;
        const y = (Math.cos(seed * 78.233 + t * 0.09) * 0.5 + 0.5) * h;
        const r = 0.75 + (Math.sin(seed + t) * 0.5 + 0.5) * 1.4;
        const hot = Math.sin(seed * 3.1) > 0.2;
        ctx.globalAlpha = hot ? 0.22 : 0.12;
        ctx.fillStyle = hot ? 'rgba(240,80,16,1)' : 'rgba(232,184,64,1)';
        ctx.shadowColor = hot ? 'rgba(240,80,16,.7)' : 'rgba(232,184,64,.6)';
        ctx.shadowBlur = 8;
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }

    function draw() {
      t += 0.012;
      ctx.clearRect(0, 0, w, h);

      const cx = w * 0.5;
      const cy = h * 0.49;
      ctx.save();
      ctx.globalAlpha = 0.2;
      ctx.strokeStyle = 'rgba(192,136,32,.52)';
      ctx.lineWidth = 1;
      for (let i = 0; i < 9; i++) {
        const rx = w * (0.16 + i * 0.018) + Math.sin(t + i) * 6;
        const ry = h * (0.10 + i * 0.014) + Math.cos(t * 0.8 + i) * 4;
        ctx.beginPath();
        ctx.ellipse(cx, cy, rx, ry, -0.12 + i * 0.015, 0, Math.PI * 2);
        ctx.stroke();
      }
      ctx.restore();

      drawWave(h * 0.47, h * 0.10, 1.0, 0.0, 'rgba(200,64,0,1)', 0.42, 1.6);
      drawWave(h * 0.50, h * 0.075, -0.72, 1.1, 'rgba(232,184,64,1)', 0.28, 1.1);
      drawWave(h * 0.53, h * 0.056, 1.45, 2.4, 'rgba(148,200,144,1)', 0.18, 1.0);
      drawParticles();

      requestAnimationFrame(draw);
    }

    window.addEventListener('resize', resize);
    resize();
    draw();
  </script>
</body>
</html>
