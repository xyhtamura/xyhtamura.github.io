<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Organic Text Renderer - Extreme Edition</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Averia+Sans+Libre:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #0b0710;
      --panel: #15111c;
      --ink: #e6f4d7;
      --muted: #9da88f;
      --line: #382c4d;
      --accent: #b8ff43;
      --accent-2: #53f6e6;
      --shadow: rgba(0, 0, 0, 0.35);
      --active-font: "Averia Sans Libre";
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, sans-serif;
      color: var(--ink);
      background: var(--bg);
    }

    .app {
      width: min(1280px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 28px 0 40px;
    }

    header { margin-bottom: 18px; }
    h1 { margin: 0; font-size: 2.5rem; color: #eaffd0; }

    .workspace {
      display: grid;
      grid-template-columns: 360px minmax(0, 1fr);
      gap: 18px;
      align-items: start;
    }

    .panel, .stage {
      border: 1px solid var(--line);
      border-radius: 20px;
      background: linear-gradient(145deg, rgba(21, 17, 28, 0.96), rgba(12, 10, 18, 0.92));
      padding: 18px;
    }

    .panel { position: sticky; top: 18px; max-height: 95vh; overflow-y: auto; }
    .stage { min-height: 700px; overflow: hidden; position: relative; padding: 0; }

    label { display: block; font-size: 0.72rem; text-transform: uppercase; color: var(--muted); margin-bottom: 5px; }
    
    textarea, select, input[type="number"], input[type="color"] {
      width: 100%; border: 1px solid rgba(184, 255, 67, 0.18); border-radius: 8px;
      color: var(--ink); background: rgba(6, 5, 10, 0.72); padding: 8px; font: inherit; margin-bottom: 12px;
    }
    textarea { min-height: 80px; resize: vertical; }
    input[type="color"] { height: 36px; padding: 2px; }

    .section-title { font-size: 0.9rem; border-bottom: 1px solid var(--line); padding-bottom: 8px; margin: 16px 0 12px; color: var(--accent-2); }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    .slider-row { display: grid; grid-template-columns: 1fr 40px; gap: 8px; align-items: center; margin-bottom: 12px; }
    input[type="range"] { width: 100%; accent-color: var(--accent); }
    .value { color: var(--accent); font-size: 0.8rem; text-align: right; }

    button {
      width: 100%; cursor: pointer; border: none; border-radius: 8px;
      color: #000; background: var(--accent); padding: 10px; font-weight: bold; margin-bottom: 8px;
    }

    .render-wrap {
      min-height: 700px; padding: 40px; display: flex; align-items: center; justify-content: center;
    }

    #renderedText {
      width: 100%; max-width: 900px;
      font-family: var(--active-font), system-ui, sans-serif;
      font-size: var(--base-size);
      line-height: var(--base-line-height);
      letter-spacing: var(--base-letter-spacing);
      word-spacing: var(--base-word-spacing);
      white-space: pre-wrap; overflow-wrap: anywhere;
    }

    .glyph {
      display: inline-block; position: relative;
      font-weight: var(--weight);
      transform: translate(var(--x), var(--y)) rotate(var(--rot)) scale(var(--scale-x), var(--scale-y));
      color: hsl(var(--hue), var(--sat), var(--light));
      opacity: var(--opacity); filter: blur(var(--blur));
      margin-right: var(--spacing);
      text-shadow: var(--ghost-x) var(--ghost-y) 0 hsla(calc(var(--hue) + 60), 100%, 60%, var(--ghost-alpha));
      animation: breathe var(--breath-speed) ease-in-out infinite alternate;
      animation-delay: var(--delay);
    }

    .space { width: var(--space-width); }
    .line-break { display: block; height: var(--line-gap); }

    @keyframes breathe {
      from { translate: 0 0; }
      to { translate: 0 var(--breath-y); }
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <h1>Organic Text Renderer</h1>
    </header>

    <section class="workspace">
      <aside class="panel">
        <label>Text</label>
        <textarea id="inputText">soft text refuses the grid.
breathing ink and noise.</textarea>

        <div class="section-title">Base Typography</div>
        <div class="grid-2">
          <div><label>Font</label>
            <select id="fontSelect">
              <option value="Averia Sans Libre">Averia Sans Libre</option>
              <option value="Courier New">Courier New</option>
              <option value="Georgia">Georgia</option>
              <option value="system-ui">System UI</option>
            </select>
          </div>
          <div><label>Ink Color</label><input type="color" id="baseColor" value="#e6f4d7" /></div>
          <div><label>Size (px)</label><input id="baseSize" type="number" value="68" /></div>
          <div><label>Weight</label><input id="baseWeight" type="number" value="400" step="100" min="100" max="900" /></div>
          <div><label>Line Height</label><input id="baseLineHeight" type="number" value="1.1" step="0.1" /></div>
          <div><label>Letter Spacing (em)</label><input id="baseLetterSpacing" type="number" value="0" step="0.01" /></div>
          <div><label>Word Spacing (em)</label><input id="baseWordSpacing" type="number" value="0" step="0.1" /></div>
          <div><label>Seed</label><input id="seed" type="number" value="42" /></div>
        </div>

        <div class="section-title">Extreme Jitter</div>
        
        <label>Master Irregularity</label>
        <div class="slider-row"><input id="irregularity" type="range" min="0" max="100" value="65" /><span class="value"></span></div>

        <label>Size Jitter</label>
        <div class="slider-row"><input id="sizeJitter" type="range" min="0" max="100" value="40" /><span class="value"></span></div>
        
        <label>Weight Jitter</label>
        <div class="slider-row"><input id="weightJitter" type="range" min="0" max="100" value="50" /><span class="value"></span></div>

        <label>Color Drift</label>
        <div class="slider-row"><input id="colorDrift" type="range" min="0" max="100" value="45" /><span class="value"></span></div>

        <label>Baseline Wobble</label>
        <div class="slider-row"><input id="baselineWobble" type="range" min="0" max="100" value="60" /><span class="value"></span></div>

        <label>Rotation Chaos</label>
        <div class="slider-row"><input id="rotation" type="range" min="0" max="100" value="40" /><span class="value"></span></div>

        <label>Overlap / Spacing Jitter</label>
        <div class="slider-row"><input id="overlap" type="range" min="0" max="100" value="35" /><span class="value"></span></div>

        <label>Ghosting</label>
        <div class="slider-row"><input id="ghosting" type="range" min="0" max="100" value="30" /><span class="value"></span></div>

        <label>Breathing Speed</label>
        <div class="slider-row"><input id="breathing" type="range" min="0" max="100" value="25" /><span class="value"></span></div>

        <button id="randomizeSeed">Reroll Noise</button>
      </aside>

      <section class="stage">
        <div class="render-wrap"><div id="renderedText"></div></div>
      </section>
    </section>
  </main>

  <script>
    const inputs = document.querySelectorAll("input, textarea, select");
    
    function hexToHSL(hex) {
      let r = parseInt(hex.slice(1,3),16)/255, g = parseInt(hex.slice(3,5),16)/255, b = parseInt(hex.slice(5,7),16)/255;
      let max = Math.max(r,g,b), min = Math.min(r,g,b), d = max - min, h = 0, s = 0, l = (max + min) / 2;
      if(d !== 0) { h = max === r ? (g-b)/d % 6 : max === g ? (b-r)/d + 2 : (r-g)/d + 4; s = d / (1 - Math.abs(2*l - 1)); }
      return { h: Math.round(h*60), s: +(s*100).toFixed(1), l: +(l*100).toFixed(1) };
    }

    function hash(s, i, salt=0) { let x = Math.sin(s * 999 + i * 101.7 + salt * 17.13) * 10000; return x - Math.floor(x); }
    function noise(s, i, salt=0) { return hash(s, i, salt) * 2 - 1; }

    function render() {
      inputs.forEach(el => { if(el.type === 'range') el.nextElementSibling.textContent = el.value; });
      
      const v = id => Number(document.getElementById(id).value);
      const text = document.getElementById("inputText").value;
      const seed = v("seed");
      const baseHSL = hexToHSL(document.getElementById("baseColor").value);
      
      const irr = v("irregularity") / 50; // Doubled intensity for extreme mode
      const sizeJ = v("sizeJitter") / 100;
      const weightJ = v("weightJitter") / 100;
      const cDrift = v("colorDrift") / 100;
      const wobble = v("baselineWobble") / 100;
      const rotJ = v("rotation") / 100;
      const over = v("overlap") / 100;
      const ghost = v("ghosting") / 100;
      const breath = v("breathing") / 100;

      const rt = document.getElementById("renderedText");
      document.documentElement.style.setProperty("--active-font", `"${document.getElementById("fontSelect").value}"`);
      rt.style.setProperty("--base-size", `${v("baseSize")}px`);
      rt.style.setProperty("--base-line-height", v("baseLineHeight"));
      rt.style.setProperty("--base-letter-spacing", `${v("baseLetterSpacing")}em`);
      rt.style.setProperty("--base-word-spacing", `${v("baseWordSpacing")}em`);

      let html = ""; let idx = 0;
      const baseWeight = v("baseWeight");

      [...text].forEach((char, i) => {
        if (char === "\n") {
          // Jitter the line gap slightly based on irregularity
          const gap = (v("baseLineHeight") * 0.5) + noise(seed, i, 99) * irr * 0.5;
          html += `<span class="line-break" style="--line-gap:${gap}em"></span>`; return;
        }
        if (char === " ") {
          html += `<span class="glyph space" style="--space-width:0.25em">&nbsp;</span>`; idx++; return;
        }

        const scale = 1 + noise(seed, idx, 1) * sizeJ * irr;
        const scaleX = 1 + noise(seed, idx, 3) * irr * 0.1;
        const x = noise(seed, idx, 4) * irr * over * 0.5; // Extreme X overlap
        const y = noise(seed, idx, 2) * wobble * irr * 0.8; // Extreme Y baseline shift
        const rot = noise(seed, idx, 5) * rotJ * irr * 45; // Up to 45 deg rotation
        
        let charWeight = baseWeight + noise(seed, idx, 17) * weightJ * 500;
        charWeight = Math.max(100, Math.min(900, charWeight)); // Clamp 100-900

        const hue = baseHSL.h + noise(seed, idx, 6) * cDrift * 90;
        const sat = baseHSL.s + hash(seed, idx, 7) * cDrift * 50;
        const light = baseHSL.l + noise(seed, idx, 8) * cDrift * 30;
        
        const opacity = Math.max(0.2, 0.95 - hash(seed, idx, 9) * irr * 0.4);
        const blur = Math.max(0, noise(seed, idx, 10) * irr * 0.05 + ghost * 0.03);
        const spacing = noise(seed, idx, 11) * over * irr * -0.3; // Aggressive negative spacing
        
        const gx = ghost * irr * (0.02 + hash(seed, idx, 12) * 0.1);
        const gAlpha = ghost * (0.1 + irr * 0.4);
        
        const bSpeed = 1.5 + hash(seed, idx, 13) * 3;
        const bY = noise(seed, idx, 14) * breath * irr * 0.3;
        const delay = -hash(seed, idx, 15) * 5;

        html += `<span class="glyph" style="
          --weight:${charWeight}; --x:${x}em; --y:${y}em; --rot:${rot}deg;
          --scale-x:${scaleX}; --scale-y:${scale};
          --hue:${hue}; --sat:${sat}%; --light:${light}%;
          --opacity:${opacity}; --blur:${blur}em; --spacing:${spacing}em;
          --ghost-x:${gx}em; --ghost-y:${gx * noise(seed, idx, 16)}em; --ghost-alpha:${gAlpha};
          --breath-speed:${bSpeed}s; --breath-y:${bY}em; --delay:${delay}s;
        ">${char === '<' ? '&lt;' : char === '>' ? '&gt;' : char}</span>`;
        idx++;
      });
      rt.innerHTML = html;
    }

    inputs.forEach(el => el.addEventListener("input", render));
    document.getElementById("randomizeSeed").addEventListener("click", () => {
      document.getElementById("seed").value = Math.floor(Math.random() * 9999); render();
    });
    render();
  </script>
</body>
</html>
