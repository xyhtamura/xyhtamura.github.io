<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FrameSmear — Poster Title Card</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Averia+Sans+Libre:ital,wght@0,300;0,400;0,700;1,400;1,700&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #092229;
      --bg-deep: #041a23;
      --ink: #e9ffff;
      --muted: rgba(190, 232, 235, 0.56);
      --muted-hi: rgba(226, 255, 252, 0.78);

      --aqua: #31f7ff;
      --pool: #0fc4d8;
      --mint: #9affcf;
      --petal: #ffb4dd;
      --petal-hi: #ffe2f1;
      --sodium: #ffb229;
      --lime: #dfff6a;
      --violet: #8a79ff;

      --line: rgba(154, 255, 237, 0.20);
      --line-hi: rgba(255, 226, 241, 0.36);
      --glass: rgba(255, 245, 234, 0.065);
      --amber-glow: rgba(255, 178, 41, 0.28);
      --petal-glow: rgba(255, 180, 221, 0.34);
      --aqua-glow: rgba(49, 247, 255, 0.20);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { min-height: 100%; }

    body {
      display: grid;
      place-items: center;
      padding: 22px;
      overflow: hidden;
      font-family: 'DM Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      color: var(--ink);
      background:
        radial-gradient(ellipse 80% 54% at 18% 4%, rgba(255, 211, 150, 0.40) 0%, transparent 55%),
        radial-gradient(ellipse 54% 44% at 87% 12%, rgba(255, 180, 221, 0.25) 0%, transparent 58%),
        radial-gradient(ellipse 58% 48% at 92% 88%, rgba(49, 247, 255, 0.18) 0%, transparent 62%),
        linear-gradient(125deg, #170a03 0%, #41200f 32%, #6f3913 57%, #2f1627 100%);
    }

    body::before,
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    body::before {
      inset: -12% -8%;
      background:
        linear-gradient(103deg, transparent 0 18%, rgba(255,247,235,0.20) 19%, transparent 22% 100%),
        linear-gradient(96deg, transparent 0 36%, rgba(255,178,41,0.18) 37%, transparent 41% 100%),
        linear-gradient(84deg, transparent 0 67%, rgba(255,180,221,0.14) 68%, transparent 72% 100%),
        repeating-linear-gradient(0deg, rgba(255,245,232,0.026) 0 1px, transparent 1px 8px);
      filter: blur(13px) saturate(135%);
      opacity: 0.95;
      transform: skewY(-3deg);
      animation: lightLeak 14s ease-in-out infinite alternate;
    }

    body::after {
      background:
        radial-gradient(circle at 50% 50%, transparent 0 42%, rgba(20, 6, 1, 0.48) 100%),
        repeating-linear-gradient(90deg, rgba(255,248,241,0.026) 0 1px, transparent 1px 4px),
        repeating-linear-gradient(0deg, transparent 0 4px, rgba(20, 6, 1, 0.08) 4px 5px);
      mix-blend-mode: soft-light;
      opacity: 0.82;
    }

    @keyframes lightLeak {
      0% { transform: translateX(-1.2%) skewY(-3deg); filter: blur(12px) saturate(130%); }
      100% { transform: translateX(1.5%) skewY(-4deg); filter: blur(16px) saturate(150%); }
    }

    .poster {
      position: relative;
      width: min(1200px, calc(100vw - 28px));
      aspect-ratio: 1200 / 630;
      isolation: isolate;
      overflow: hidden;
      border: 1px solid var(--line-hi);
      border-radius: 34px;
      background:
        radial-gradient(ellipse 62% 70% at 34% 52%, rgba(255, 178, 41, 0.22) 0%, transparent 56%),
        radial-gradient(ellipse 42% 54% at 76% 43%, rgba(255, 180, 221, 0.16) 0%, transparent 64%),
        linear-gradient(116deg, rgba(255, 244, 230, 0.18), rgba(255, 178, 41, 0.12) 26%, rgba(255, 180, 221, 0.08) 56%, rgba(49, 247, 255, 0.06)),
        rgba(32, 14, 5, 0.58);
      box-shadow:
        0 28px 110px rgba(255, 178, 41, 0.22),
        0 18px 80px rgba(255, 180, 221, 0.12),
        0 0 0 1px rgba(255,255,255,0.045) inset;
      backdrop-filter: blur(22px) saturate(155%);
    }

    .poster::before,
    .poster::after {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 6;
    }

    .poster::before {
      background:
        linear-gradient(105deg, transparent 0 12%, rgba(255, 248, 237, 0.22) 16%, transparent 20% 100%),
        linear-gradient(96deg, transparent 0 56%, rgba(255, 180, 221, 0.13) 60%, transparent 66% 100%),
        repeating-linear-gradient(to right, rgba(255,255,255,0.028) 0 1px, transparent 1px 8px);
      mix-blend-mode: screen;
      opacity: 0.68;
    }

    .poster::after {
      border-radius: inherit;
      box-shadow:
        0 0 0 1px rgba(255, 245, 234, 0.08) inset,
        0 0 90px rgba(4, 26, 35, 0.45) inset;
    }

    .ghost-field {
      position: absolute;
      inset: -7% -6%;
      z-index: 1;
      background:
        linear-gradient(90deg, transparent 0 8%, rgba(255, 178, 41, 0.13) 9% 13%, transparent 15% 100%),
        repeating-linear-gradient(96deg, transparent 0 28px, rgba(255, 180, 221, 0.055) 29px 32px, transparent 34px 64px),
        repeating-linear-gradient(0deg, rgba(154,255,237,0.035) 0 1px, transparent 1px 7px);
      filter: blur(5px) saturate(160%);
      transform: skewX(-10deg);
      opacity: 0.82;
      animation: smearDrift 18s linear infinite alternate;
    }

    @keyframes smearDrift {
      from { transform: translateX(-2.5%) skewX(-10deg); }
      to { transform: translateX(2.5%) skewX(-13deg); }
    }

    .frame-stack {
      position: absolute;
      inset: 54px 54px 48px;
      z-index: 2;
      border: 1px solid rgba(255, 224, 188, 0.22);
      border-radius: 26px;
      background:
        linear-gradient(130deg, rgba(255,255,255,0.10), rgba(255,178,41,0.06), rgba(49,247,255,0.025)),
        rgba(32, 14, 5, 0.24);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.035) inset,
        0 0 52px rgba(49,247,255,0.08),
        0 0 88px rgba(255,178,41,0.09);
    }

    .frame-stack::before,
    .frame-stack::after {
      content: '';
      position: absolute;
      border: 1px solid rgba(154,255,237,0.18);
      border-radius: 24px;
      inset: 22px;
      transform: translate(18px, -12px);
      opacity: 0.58;
    }

    .frame-stack::after {
      inset: 42px;
      transform: translate(-22px, 18px);
      border-color: rgba(255,180,221,0.22);
      opacity: 0.46;
    }

    .smear-ribbons {
      position: absolute;
      inset: 0;
      z-index: 3;
      filter: blur(0.2px);
      pointer-events: none;
    }

    .ribbon {
      position: absolute;
      left: -8%;
      right: -5%;
      height: 16px;
      border-radius: 999px;
      opacity: 0.75;
      transform: skewX(-18deg);
      mix-blend-mode: screen;
      filter: blur(0.7px);
    }

    .r1 { top: 28%; background: linear-gradient(90deg, transparent, var(--sodium), var(--petal), transparent); box-shadow: 0 0 22px var(--amber-glow); }
    .r2 { top: 39%; height: 8px; background: linear-gradient(90deg, transparent, var(--petal), var(--aqua), transparent); box-shadow: 0 0 18px var(--petal-glow); opacity: 0.56; }
    .r3 { top: 56%; height: 22px; background: linear-gradient(90deg, transparent, rgba(255,244,230,0.92), var(--sodium), transparent); box-shadow: 0 0 26px rgba(255,245,234,0.18); opacity: 0.34; }
    .r4 { top: 71%; height: 10px; background: linear-gradient(90deg, transparent, var(--aqua), var(--lime), transparent); box-shadow: 0 0 22px var(--aqua-glow); opacity: 0.38; }

    .identity {
      position: absolute;
      left: clamp(28px, 5vw, 70px);
      right: clamp(28px, 5vw, 70px);
      top: 50%;
      z-index: 4;
      transform: translateY(-48%);
    }

    h1 {
      position: relative;
      display: inline-block;
      font-family: 'Averia Sans Libre', sans-serif;
      font-size: clamp(4.2rem, 12.6vw, 10.6rem);
      font-weight: 500;
      font-style: italic;
      letter-spacing: -0.09em;
      line-height: 0.78;
      text-transform: lowercase;
      color: #fff4ea;
      transform: skewX(-8deg);
      text-shadow:
        -8px 0 22px rgba(255, 180, 221, 0.44),
        10px 0 36px rgba(255, 178, 41, 0.52),
        0 0 7px rgba(255, 255, 255, 0.44),
        0 18px 52px rgba(20, 6, 1, 0.42);
    }

    h1::before,
    h1::after {
      content: 'frame/smear';
      position: absolute;
      left: 0;
      top: 0;
      pointer-events: none;
      mix-blend-mode: screen;
      z-index: -1;
    }

    h1::before {
      color: rgba(255, 178, 41, 0.54);
      transform: translate(0.08em, 0.065em);
      filter: blur(0.5px);
    }

    h1::after {
      color: rgba(49, 247, 255, 0.36);
      transform: translate(-0.045em, -0.035em);
      filter: blur(0.7px);
    }

    .underline {
      width: min(710px, 80%);
      height: 0.95rem;
      margin: 0.1rem 0 0 0.4rem;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--sodium), var(--petal), var(--pool), transparent);
      filter: blur(0.5px);
      opacity: 0.84;
      transform: skewX(-18deg);
      box-shadow: 0 0 28px var(--amber-glow);
    }

    .tagline {
      margin: 1.2rem 0 0 0.4rem;
      width: min(620px, 80%);
      color: var(--mint);
      font-size: clamp(0.67rem, 1.2vw, 0.86rem);
      letter-spacing: 0.18em;
      text-transform: lowercase;
      line-height: 1.8;
      text-shadow: 0 0 16px rgba(255, 178, 41, 0.20);
    }

    .interface-strip {
      position: absolute;
      left: 54px;
      right: 54px;
      bottom: 44px;
      z-index: 5;
      display: grid;
      grid-template-columns: 1.2fr 1fr 0.85fr;
      gap: 10px;
      align-items: end;
    }

    .panel {
      min-height: 68px;
      padding: 12px 14px;
      border: 1px solid rgba(154, 255, 237, 0.18);
      border-radius: 18px;
      background:
        linear-gradient(100deg, rgba(255,178,41,0.15), rgba(255,180,221,0.09), rgba(49,247,255,0.04)),
        rgba(32, 14, 5, 0.42);
      box-shadow: 0 0 0 1px rgba(255,255,255,0.035) inset, 0 0 28px rgba(255,178,41,0.08);
      backdrop-filter: blur(14px) saturate(150%);
    }

    .micro-label {
      display: inline-block;
      margin-bottom: 10px;
      padding: 3px 9px;
      border-radius: 999px;
      color: var(--petal-hi);
      font-size: 0.56rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      background: linear-gradient(90deg, rgba(255,178,41,0.28), rgba(255,180,221,0.16), rgba(49,247,255,0.08));
    }

    .hud-line {
      display: flex;
      gap: 7px;
      flex-wrap: wrap;
    }

    .pill {
      display: inline-block;
      padding: 4px 9px;
      border: 1px solid rgba(154, 255, 237, 0.22);
      border-radius: 999px;
      background: rgba(33, 14, 5, 0.50);
      color: var(--muted-hi);
      font-size: 0.62rem;
      letter-spacing: 0.10em;
      text-transform: lowercase;
      box-shadow: 0 0 14px rgba(255,178,41,0.10) inset;
    }

    .pill.fx {
      color: var(--sodium);
      border-color: rgba(255,178,41,0.42);
      background: rgba(255,178,41,0.10);
      text-shadow: 0 0 13px var(--amber-glow);
    }

    .slider {
      height: 4px;
      margin: 6px 0 12px;
      border-radius: 999px;
      background: linear-gradient(90deg, rgba(255,178,41,0.72), rgba(255,180,221,0.58), rgba(49,247,255,0.38));
      box-shadow: 0 0 14px rgba(255,178,41,0.16);
      position: relative;
    }

    .slider::before,
    .slider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      background: radial-gradient(circle at 30% 30%, #fff6ee, var(--sodium) 52%, var(--petal) 78%, var(--pool));
      border: 1px solid rgba(233,255,255,0.72);
      box-shadow: 0 0 12px rgba(49,247,255,0.8), 0 0 22px rgba(255,180,221,0.35);
    }

    .slider::before { left: 22%; }
    .slider::after { left: 74%; }

    .tiny-readouts {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      color: var(--lime);
      font-size: 0.62rem;
      letter-spacing: 0.08em;
      font-variant-numeric: tabular-nums;
      text-shadow: 0 0 10px rgba(223,255,106,0.28);
    }

    .frame-index {
      position: absolute;
      right: 58px;
      top: 42px;
      z-index: 5;
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--petal-hi);
      font-size: 0.64rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      opacity: 0.9;
    }

    .badge {
      padding: 5px 12px;
      border: 1px solid rgba(255, 223, 192, 0.52);
      border-radius: 999px;
      background: rgba(255, 178, 41, 0.14);
      box-shadow: 0 0 20px rgba(255, 178, 41, 0.15) inset, 0 0 18px rgba(255, 180, 221, 0.12);
    }

    .corner-note {
      position: absolute;
      left: 58px;
      top: 44px;
      z-index: 5;
      color: rgba(226, 255, 252, 0.72);
      font-size: 0.62rem;
      letter-spacing: 0.14em;
      line-height: 1.7;
      text-transform: lowercase;
    }

    .corner-note strong {
      color: var(--sodium);
      font-weight: 400;
      text-shadow: 0 0 12px var(--amber-glow);
    }


    .frame-strip {
      position: absolute;
      top: 42px;
      right: 58px;
      z-index: 7;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px;
      border-radius: 999px;
      background: rgba(32, 14, 5, 0.18);
      border: 1px solid rgba(255, 240, 224, 0.08);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.025) inset,
        0 0 24px rgba(255, 178, 41, 0.08);
      backdrop-filter: blur(10px) saturate(150%);
    }

    .frame-strip span {
      display: block;
      width: 26px;
      height: 9px;
      border-radius: 999px;
      border: 1px solid rgba(255, 240, 224, 0.22);
      background: rgba(255,255,255,0.045);
      box-shadow: 0 0 10px rgba(255, 178, 41, 0.05) inset;
    }

    .frame-strip span:nth-child(2) { background: rgba(255, 178, 41, 0.18); }
    .frame-strip span:nth-child(3) { background: rgba(255, 180, 221, 0.15); }
    .frame-strip span:nth-child(4) { background: rgba(49, 247, 255, 0.13); }

    @media (max-width: 720px) {
      body { padding: 12px; }
      .poster { border-radius: 22px; }
      .frame-stack { inset: 34px 24px 40px; border-radius: 20px; }
      .corner-note { left: 28px; top: 26px; font-size: 0.52rem; }
      .frame-index { right: 28px; top: 26px; font-size: 0.52rem; }

      .frame-strip { right: 28px; top: 26px; gap: 5px; }
      .frame-strip span { width: 21px; height: 8px; }

      .identity { left: 28px; right: 28px; }
      .interface-strip { left: 24px; right: 24px; bottom: 22px; grid-template-columns: 1fr; gap: 6px; }
      .panel { min-height: 42px; padding: 8px 10px; }
      .panel:nth-child(2), .panel:nth-child(3) { display: none; }
      .tagline { margin-top: 0.8rem; width: 90%; }
    }
	
	    .frame-strip span {
      width: 24px;
      height: 8px;
      border-radius: 999px;
      border: 1px solid rgba(255, 240, 224, 0.20);
      background: rgba(255,255,255,0.04);
      box-shadow: 0 0 10px rgba(255, 178, 41, 0.05) inset;
    }

    .frame-strip span:nth-child(2) { background: rgba(255, 178, 41, 0.16); }
    .frame-strip span:nth-child(3) { background: rgba(255, 180, 221, 0.14); }
    .frame-strip span:nth-child(4) { background: rgba(49, 247, 255, 0.12); }
  </style>
</head>
<body>
  <main class="poster" aria-label="FrameSmear poster title card">
    <div class="ghost-field"></div>
    <div class="frame-stack"></div>
    <div class="smear-ribbons" aria-hidden="true">
      <i class="ribbon r1"></i>
      <i class="ribbon r2"></i>
      <i class="ribbon r3"></i>
      <i class="ribbon r4"></i>
    </div>

    <div class="frame-strip" aria-hidden="true">
      <span></span><span></span><span></span><span></span>
    </div>


    <section class="identity">
      <h1>FrameSmear</h1>
      <div class="underline"></div>

    </section>

  
  </main>
</body>
</html>
