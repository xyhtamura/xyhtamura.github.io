<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tabota Roll — microtonal piano roll</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@tonejs/midi"></script>
<!-- shared interpreter: exposes window.TabotaResolve.resolve() (same module index.html imports) -->
<script type="module" src="tabota-resolve.js"></script>
<style>
:root{
  /* Light, fully hued — no achromatic axis. Pale tide-pool ground. */
  --paper:        #eaf1ec;  /* app ground, high-L green-cyan */
  --note-bg:      #e3ebe6;  /* canvas area (set on canvas via JS too) */
  --panel:        #f1ecf4;  /* toolbars, low-chroma plum (different hue) */
  --panel-2:      #e7dfee;  /* raised */
  --edge:         #cdbcd6;  /* hued violet border */
  --edge-2:       #b9cfc7;  /* hued teal border */
  --ink:          #18302b;  /* text, dark teal (not black) */
  --ink-dim:      #5a6f68;  /* dim, hued */
  --ink-faint:    #8a9b93;
  --algae:        #5d8c00;  /* hold / point  (chartreuse, deepened for light) */
  --algae-soft:   #d6e8a8;
  --magenta:      #d1336b;  /* glide / line */
  --magenta-soft: #f3c9d8;
  --violet:       #6a47d8;  /* freehand / curve */
  --violet-soft:  #d8cef5;
  --tide:         #11897e;  /* structure / links / scale labels */
  --ember:        #dd6b12;  /* selection / playhead / warnings */
  --ember-soft:   #f7d9bf;
  --mono: "IBM Plex Mono","SFMono-Regular",Menlo,monospace;
  --display: "Fraunces",Georgia,serif;
}
*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0; font-family:var(--mono); color:var(--ink);
  background:
    radial-gradient(120% 80% at 0% 0%, #eef4ef 0%, var(--paper) 55%),
    var(--paper);
  display:flex; flex-direction:column; height:100vh; height:100dvh; overflow:hidden;
  -webkit-font-smoothing:antialiased;
}
header{
  display:flex; align-items:baseline; gap:14px; padding:9px 16px 8px;
  border-bottom:1px solid var(--edge);
  background:linear-gradient(180deg,var(--panel),var(--panel-2));
}
header .brand{font-family:var(--display); font-weight:600; font-size:20px; letter-spacing:.2px; font-optical-sizing:auto;}
header .brand em{font-style:italic; color:var(--tide)}
header .sub{font-size:11px; color:var(--ink-dim); letter-spacing:.04em}
header .spacer{flex:1}
header .pill{
  font-size:11px; padding:3px 9px; border-radius:999px; border:1px solid var(--edge-2);
  background:#fff8; color:var(--ink-dim);
}
header .pill b{color:var(--tide); font-weight:600}

/* toolbar */
.toolbar{
  display:flex; flex-wrap:wrap; align-items:center; gap:6px 10px;
  padding:7px 14px; border-bottom:1px solid var(--edge);
  background:var(--panel); font-size:12px;
}
.group{display:flex; align-items:center; gap:5px; padding:2px 8px 2px 0;}
.group + .group{border-left:1px solid var(--edge); padding-left:10px}
.group > label{color:var(--ink-dim); font-size:11px; letter-spacing:.02em}
button.tool, .seg button, .btn{
  font-family:var(--mono); font-size:12px; color:var(--ink);
  background:#fbfafe; border:1px solid var(--edge); border-radius:7px;
  padding:5px 9px; cursor:pointer; line-height:1; transition:.12s;
}
button.tool:hover,.btn:hover{background:#fff; border-color:var(--tide)}
button.tool.active{
  background:var(--ink); color:var(--paper); border-color:var(--ink);
}
.seg{display:inline-flex; border:1px solid var(--edge); border-radius:8px; overflow:hidden; background:#fbfafe}
.seg button{border:none; border-radius:0; border-right:1px solid var(--edge)}
.seg button:last-child{border-right:none}
.seg button.on{background:var(--tide); color:#fff}
.seg.regime button.on{background:var(--violet)}
input[type=number],select,input[type=text]{
  font-family:var(--mono); font-size:12px; color:var(--ink);
  background:#fff; border:1px solid var(--edge); border-radius:6px;
  padding:4px 6px; width:62px;
}
select{width:auto}
input[type=number].w48{width:48px}
.chk{display:inline-flex; align-items:center; gap:5px; cursor:pointer; user-select:none; color:var(--ink-dim)}
.chk input{accent-color:var(--tide)}
.legend{display:flex; gap:12px; align-items:center; font-size:11px; color:var(--ink-dim)}
.legend i{display:inline-block; width:18px; height:0; border-top-width:4px; border-top-style:solid; vertical-align:middle; margin-right:5px; border-radius:2px}
.legend .hold{border-top-color:var(--algae)}
.legend .glide{border-top-color:var(--magenta)}
.legend .free{border-top-color:var(--violet)}

/* stage */
.stage{position:relative; flex:1; min-height:0; overflow:hidden; background:var(--note-bg)}
#roll{display:block; width:100%; height:100%; cursor:crosshair; touch-action:none}
.stage.tool-select #roll{cursor:default}
.stage.tool-erase #roll{cursor:not-allowed}
.stage.tool-pan #roll{cursor:grab}

/* footer / status + io */
footer{
  display:flex; align-items:center; gap:14px; flex-wrap:wrap;
  padding:6px 14px; border-top:1px solid var(--edge);
  background:linear-gradient(0deg,var(--panel),var(--panel-2)); font-size:11.5px; color:var(--ink-dim);
}
footer .spacer{flex:1}
footer code{font-family:var(--mono); color:var(--ink)}
.warn{color:var(--ember)}
.transport button{font-size:13px; padding:6px 12px}
.transport .play.on{background:var(--algae); border-color:var(--algae); color:#13260a}

/* mobile / narrow screens: let the whole page scroll and give the canvas a fixed, usable height
   so toolbars and the footer are always reachable (they were being clipped by overflow:hidden). */
@media (max-width: 860px){
  body{ height:auto; min-height:100dvh; overflow-y:auto; -webkit-overflow-scrolling:touch; }
  .stage{ flex:0 0 auto; height:58vh; height:58dvh; min-height:340px; }
  .toolbar{ padding:6px 10px; gap:5px 8px; }
  .group{ padding:1px 6px 1px 0; }
  .group + .group{ padding-left:8px; }
  header{ padding:8px 12px 7px; }
  header .sub{ display:none; }
  footer{ padding:8px 12px 14px; }
}

/* drawer (report / io detail) */
.drawer{
  position:absolute; right:0; top:0; bottom:0; width:360px; max-width:86vw;
  background:linear-gradient(180deg,#fbf9fd,var(--panel));
  border-left:1px solid var(--edge); transform:translateX(100%); transition:transform .22s ease;
  display:flex; flex-direction:column; z-index:20; box-shadow:-12px 0 40px -28px #2a1a3a55;
}
.drawer.open{transform:none}
.drawer h3{font-family:var(--display); font-weight:600; margin:0; padding:12px 14px 8px; font-size:15px}
.drawer .close{position:absolute; top:10px; right:12px; cursor:pointer; color:var(--ink-dim); background:none; border:none; font-size:16px}
.drawer .body{overflow:auto; padding:0 14px 16px; font-size:11.5px}
.drawer table{border-collapse:collapse; width:100%; font-size:10.5px}
.drawer th,.drawer td{text-align:right; padding:3px 5px; border-bottom:1px solid var(--edge)}
.drawer th{color:var(--ink-dim); position:sticky; top:0; background:var(--panel); font-weight:500}
.drawer td.l,.drawer th.l{text-align:left}
.bendbar{display:inline-block; height:7px; background:var(--tide); border-radius:2px; vertical-align:middle}
.flag{color:var(--ember); font-weight:600}
.summary{background:#fff8; border:1px solid var(--edge-2); border-radius:8px; padding:9px 11px; margin:10px 0; line-height:1.5}
.hint{color:var(--ink-faint); font-size:10.5px; line-height:1.5; margin-top:10px}
.kbd{font-family:var(--mono); background:#fff; border:1px solid var(--edge); border-bottom-width:2px; border-radius:4px; padding:0 5px; font-size:10.5px}
::-webkit-scrollbar{width:11px;height:11px}
::-webkit-scrollbar-thumb{background:var(--edge); border-radius:6px; border:2px solid var(--panel)}
::-webkit-scrollbar-track{background:transparent}
</style>
</head>
<body>
<header>
  <div class="brand">Tabota <em>Roll</em></div>
  <div class="sub">microtonal piano roll · auto-voicing MIDI through pitch bend · *.scl powered</div>
  <div class="spacer"></div>
  <div class="pill">bend range <b id="pillRange">±2</b> st</div>
  <div class="pill" id="pillRegime">meter · scale</div>
</header>

<div class="toolbar">
  <div class="group seg" id="tools">
    <button data-tool="select" title="Select / move / resize / edit points (V)">▣ select</button>
    <button data-tool="hold" class="on" title="Hold note — point type (H)">━ hold</button>
    <button data-tool="glide" title="Glide — drag start→end (G)">╱ glide</button>
    <button data-tool="pen" title="Pen — click to place points, double-click/Enter to finish (P)">✎ pen</button>
    <button data-tool="free" title="Freehand contour (F)">∿ free</button>
    <button data-tool="erase" title="Erase (E)">⌫ erase</button>
    <button data-tool="pan" title="Pan (space-drag)">✋ pan</button>
  </div>
  <div class="group">
    <label>select</label>
    <div class="seg" id="selModeSeg">
      <button data-m="replace" class="on" title="Replace — a click or marquee starts a fresh selection">replace</button>
      <button data-m="include" title="Include — clicks &amp; marquees add to the selection (or hold Shift)">＋ incl</button>
      <button data-m="exclude" title="Exclude — clicks &amp; marquees remove from the selection (or hold Alt)">− excl</button>
    </div>
  </div>

  <div class="group">
    <label>curve</label>
    <select id="curveSel" title="glide curve shape — applies to new glides and any selected glide segment/note">
      <option value="linear">╱ linear</option>
      <option value="exp">⌒ exp (ease-in)</option>
      <option value="log">⌐ log (ease-out)</option>
      <option value="smooth">∫ smooth (S)</option>
    </select>
  </div>

  <div class="group" id="pointGroup">
    <label>point</label>
    <input type="number" id="ptHz" class="w48" step="0.01" min="1" title="exact frequency of the selected point (Hz)" disabled style="width:78px">
    <span style="color:var(--ink-dim)">Hz</span>
    <input type="text" id="ptNote" title="note name of the selected point, e.g. A4, C#5, Bb3, A4+12 (cents)" placeholder="–" disabled style="width:72px">
  </div>

  <div class="group">
    <label>time</label>
    <div class="seg regime" id="timeRegime">
      <button data-r="meter" class="on">meter</button>
      <button data-r="time">time</button>
    </div>
    <select id="cycleSel" title="active cycle — a tuning of time; defines the metric grid &amp; snap (not the stored beats). One cycle = one bar — set the sig to the cycle's natural span."></select>
    <input type="number" id="cycDepth" class="w48" value="3" min="1" max="7" title="subdivision depth — how deep grammar cycles generate their grid &amp; snap (ignored by flat cycles)">
    <button class="tool" id="loadCyc" title="load .cyc / .txt meter file(s)">⤓ .cyc</button>
    <input type="file" id="cycFile" accept=".cyc,.txt,text/plain" multiple style="display:none">
  </div>
  <div class="group">
    <label>pitch</label>
    <div class="seg regime" id="pitchRegime">
      <button data-r="scale" class="on">scale</button>
      <button data-r="freq">freq·Hz</button>
    </div>
    <select id="scaleSel" title="active scale — defines the pitch ruler & snap targets (not the stored pitch or MIDI export)"></select>
    <select id="scaleRoot" title="anchor the scale's 1/1 to this note"></select>
    <button class="tool" id="loadScl" title="load .scl file(s)">⤓ .scl</button>
    <input type="file" id="sclFile" accept=".scl" multiple style="display:none">
  </div>

  <div class="group">
    <label class="chk"><input type="checkbox" id="snapTime" checked> snap&nbsp;time</label>
    <select id="grid" title="grid resolution">
<option value="1">𝅝</option>
  <option value="2">𝅗𝅥</option>
  <option value="4" selected>♩</option>
  <option value="8">♪</option>
  <option value="16">𝅘𝅥𝅯</option>
  <option value="3">𝅗𝅥³</option>
  <option value="6">♩³</option>
    </select>
    <label class="chk"><input type="checkbox" id="snapPitch" checked> snap&nbsp;pitch</label>
  </div>

  <div class="group">
    <button class="tool" id="zxIn" title="zoom in time">↔＋</button>
    <button class="tool" id="zxOut">↔－</button>
    <button class="tool" id="zyIn" title="zoom in pitch">↕＋</button>
    <button class="tool" id="zyOut">↕－</button>
    <button class="tool" id="zFit" title="fit content">fit</button>
  </div>

  <div class="group" id="clipGroup">
    <label>clip</label>
    <button class="tool" id="cutBtn" title="cut selection (⌘/Ctrl+X)">✂</button>
    <button class="tool" id="copyBtn" title="copy selection (⌘/Ctrl+C)">⧉</button>
    <button class="tool" id="pasteBtn" title="paste at cursor (⌘/Ctrl+V)">⎘</button>
    <button class="tool" id="joinBtn" title="join selected notes into one glide (J)">⌒ join</button>
    <button class="tool" id="splitBtn" title="split note(s) at selected interior point(s); a whole multi-point note explodes into segments (K)">⌣ split</button>
  </div>

  <div class="group" id="voiceGroup">
    <label>voice</label>
    <button class="tool" id="voiceDn" title="lower voice of selection ( [ )">−</button>
    <span id="voiceVal" style="min-width:18px;text-align:center;display:inline-block;color:var(--ink);font-weight:600">–</span>
    <button class="tool" id="voiceUp" title="raise voice of selection ( ] )">＋</button>
  </div>

  <div class="group legend" style="gap:9px">
    <span style="color:var(--ink-faint)">color=voice · ▬hold ╱glide ∿free</span>
    <span id="voiceLegend" style="display:flex;gap:6px"></span>
  </div>
</div>

<div class="toolbar" style="border-top:none">
  <div class="group">
    <label>bpm</label><input type="number" id="bpm" value="120" min="20" max="400" step="1">
    <label>sig</label><input type="number" id="sigNum" class="w48" value="4" min="1" max="32"> / 
    <select id="sigDen"><option>1</option><option>2</option><option selected>4</option><option>8</option><option>16</option></select>
    <label>A4</label><input type="number" id="a4" value="440" min="380" max="500" step="0.1">
  </div>
  <div class="group">
    <label>bend ±</label><input type="number" id="bendRange" class="w48" value="2" min="1" max="48" step="1"><span style="color:var(--ink-dim)">st</span>
    <label title="voice 1 uses this channel, voice 2 the next, etc.">base ch</label><input type="number" id="channel" class="w48" value="1" min="1" max="16">
    <label>prog</label><input type="number" id="program" class="w48" value="0" min="0" max="127">
    <label>vel</label><input type="number" id="vel" class="w48" value="96" min="1" max="127">
    <label>PPQ</label><input type="number" id="ppq" value="480" min="24" max="1920" step="24">
  </div>
  <div class="group">
    <label>default len</label><select id="defLen">
      <option value="0.25">1/16</option><option value="0.5">1/8</option>
      <option value="1" selected>1/4</option><option value="2">1/2</option><option value="4">1/1</option>
    </select>
    <label>bars</label><input type="number" id="bars" class="w48" value="8" min="1" max="256">
  </div>
</div>

<div class="stage tool-hold" id="stage">
  <canvas id="roll"></canvas>
  <div class="drawer" id="drawer">
    <button class="close" id="drawerClose">✕</button>
    <h3 id="drawerTitle">Pitch-bend report</h3>
    <div class="body" id="drawerBody"></div>
  </div>
</div>

<footer>
  <div class="transport">
    <button class="btn play" id="play" title="Play / stop (space)">▶ play</button>
    <select id="wave" title="oscillator waveform">
      <option value="sine">sine</option><option value="triangle" selected>triangle</option>
      <option value="sawtooth">saw</option><option value="square">square</option>
    </select>
    <label class="chk"><input type="checkbox" id="loop"> loop</label>
  </div>
  <div class="group" style="gap:6px">
    <button class="btn" id="undoBtn" title="Undo (⌘/Ctrl+Z)" disabled>↶ undo</button>
    <button class="btn" id="redoBtn" title="Redo (⌘/Ctrl+Shift+Z)" disabled>↷ redo</button>
  </div>
  <div class="group" style="gap:6px">
    <button class="btn" id="impMidi">⬇ import MIDI</button>
    <input type="file" id="impFile" accept=".mid,.midi" style="display:none">
    <button class="btn" id="expMidi">⬆ export MIDI</button>
    <button class="btn" id="report">bend report</button>
    <button class="btn" id="impJson">⬇ import Tabota</button>
    <input type="file" id="impJsonFile" accept=".json,application/json" style="display:none">
    <button class="btn" id="expJson">⬆ export Tabota</button>
    <button class="btn" id="clearAll">clear</button>
  </div>
  <div class="spacer"></div>
  <div id="status">ready — <span style="color:var(--ink)">0 notes</span></div>
</footer>

<script>
/* ============================================================
   TABOTA MICROTONAL ENGINE  (validated against @tonejs/midi)
   pure functions — note/freq math, tuning, pitch bend, SMF writer
   ============================================================ */
const PITCH_CLASS={'C':0,'C#':1,'DB':1,'D':2,'D#':3,'EB':3,'E':4,'F':5,'F#':6,'GB':6,'G':7,'G#':8,'AB':8,'A':9,'A#':10,'BB':10,'B':11};
const NOTE_NAMES=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
function noteNameToMidi(name){
  const m=String(name).trim().match(/^([A-Ga-g])([#b]?)(-?\d+)$/);
  if(!m) return null;
  const pc=PITCH_CLASS[m[1].toUpperCase()+(m[2]==='b'?'B':m[2])];
  if(pc===undefined) return null;
  return (parseInt(m[3],10)+1)*12+pc;
}
function midiToName(midi){ return NOTE_NAMES[((midi%12)+12)%12]+(Math.floor(midi/12)-1); }
function midiToFreq(midi,a4=440){ return a4*Math.pow(2,(midi-69)/12); }
function freqToMidi(freq,a4=440){ return 69+12*Math.log2(freq/a4); }
function freqToBend(freq,range,a4=440){
  const mFloat=freqToMidi(freq,a4);
  const baseNote=Math.round(mFloat);
  const deltaSemis=mFloat-baseNote;
  let pb=Math.round(8192+(deltaSemis/range)*8192);
  pb=Math.max(0,Math.min(16383,pb));
  return {baseNote,deltaSemis,deltaCents:deltaSemis*100,pb14:pb};
}
function bendForTargetMidi(targetMidi,baseNote,range){
  const deltaSemis=targetMidi-baseNote;
  let pb=Math.round(8192+(deltaSemis/range)*8192);
  const clamped=Math.max(0,Math.min(16383,pb));
  return {pb14:clamped,deltaSemis,overflow:pb!==clamped};
}
class MidiWriter{
  constructor(ppq=480){ this.ppq=ppq; this.events=[]; this._seq=0; }
  _push(tick,bytes,order=0){ this.events.push({tick:Math.round(tick),order,seq:this._seq++,bytes}); }
  tempo(tick,bpm){ const m=Math.round(60000000/bpm); this._push(tick,[0xFF,0x51,0x03,(m>>16)&255,(m>>8)&255,m&255],-100); }
  timeSignature(tick,num,den){ this._push(tick,[0xFF,0x58,0x04,num,Math.round(Math.log2(den)),24,8],-99); }
  trackName(tick,name){ const b=[].slice.call(new TextEncoder().encode(name)); this._push(tick,[0xFF,0x03,b.length,...b],-98); }
  programChange(tick,ch,p){ this._push(tick,[0xC0|(ch&15),p&127],-50); }
  cc(tick,ch,c,v,order=-40){ this._push(tick,[0xB0|(ch&15),c&127,v&127],order); }
  setBendRange(tick,ch,semis,cents=0){
    this.cc(tick,ch,101,0,-60); this.cc(tick,ch,100,0,-59);
    this.cc(tick,ch,6,semis&127,-58); this.cc(tick,ch,38,cents&127,-57);
    this.cc(tick,ch,101,127,-56); this.cc(tick,ch,100,127,-55);
  }
  pitchBend(tick,ch,v14){ const v=Math.max(0,Math.min(16383,Math.round(v14))); this._push(tick,[0xE0|(ch&15),v&127,(v>>7)&127],-10); }
  noteOn(tick,ch,note,vel=100){ this._push(tick,[0x90|(ch&15),note&127,vel&127],0); }
  noteOff(tick,ch,note){ this._push(tick,[0x80|(ch&15),note&127,0],-5); }
  _vlq(value){ let buf=value&127; const out=[]; while(value>>=7){ buf<<=8; buf|=((value&127)|128); } while(true){ out.push(buf&255); if(buf&128) buf>>=8; else break; } return out; }
  build(){
    this.events.sort((a,b)=>a.tick-b.tick||a.order-b.order||a.seq-b.seq);
    const trk=[]; let last=0;
    for(const e of this.events){ trk.push(...this._vlq(e.tick-last),...e.bytes); last=e.tick; }
    trk.push(0x00,0xFF,0x2F,0x00);
    const ppq=this.ppq;
    const head=[0x4D,0x54,0x68,0x64,0,0,0,6,0,0,0,1,(ppq>>8)&255,ppq&255];
    const len=trk.length;
    const th=[0x4D,0x54,0x72,0x6B,(len>>24)&255,(len>>16)&255,(len>>8)&255,len&255];
    return new Uint8Array([...head,...th,...trk]);
  }
}

/* ============================================================
   NOTE MODEL  (canonical: time in BEATS, pitch in Hz)
   note = {id, start(beats), dur(beats), type, vel, pts:[{t(0..1), hz}]}
     hold  -> pts length 1  (flat)
     glide -> pts length 2  (linear start->end)
     free  -> pts length N  (contour)
   ============================================================ */
let NID=1;
function shapeK(k,curve){          // remap 0..1 interpolation parameter
  if(k<=0) return 0; if(k>=1) return 1;
  switch(curve){
    case 'exp':    return k*k;             // ease-in: slow start, fast finish
    case 'log':    return 1-(1-k)*(1-k);   // ease-out: fast start, slow finish

/* ---------- MIDI export (pure, testable) ----------
   Polyphony is carried by VOICES. Each voice maps to its own MIDI channel
   so it gets an independent pitch-bend stream (simultaneous microtonal voices

   Bends beyond the user's range hard-wall (clamp) — a translation formality. */
function buildMidi(notes, opts){
  const {ppq=480,bpm=120,sigNum=4,sigDen=4,a4=440,range=2,baseChannel=0,program=0,vel=96,bendSteps=24}=opts;

    }

      const startHz=pitchAt(n,0);
      const base=Math.round(freqToMidi(startHz,a4));      // nearest 12-TET key to onset
      const steps = n.pts.length<=1 ? 1 : Math.max(2, Math.ceil(durBeat*bendSteps));

      const bends=[];
      for(let s=0;s<=steps;s++){
        const frac=s/steps;
        const hz=pitchAt(n,frac);
        const delta=freqToMidi(hz,a4)-base;
        if(Math.abs(delta)>maxAbsDelta) maxAbsDelta=Math.abs(delta);
        let pb=Math.round(8192+(delta/range)*8192);
        const cl=Math.max(0,Math.min(16383,pb));
        if(pb!==cl) clipped=true;
        bends.push({tick:startTick+frac*(endTick-startTick), pb14:cl});
        if(n.pts.length<=1) break;
      }
      w.pitchBend(startTick,ch,bends[0].pb14);
      w.noteOn(startTick,ch,base,n.vel||vel);
      for(let s=1;s<bends.length;s++) w.pitchBend(bends[s].tick,ch,bends[s].pb14);
      w.noteOff(endTick,ch,base);
      const overflow = maxAbsDelta>range+1e-9;
      if(overflow) warnings.push(`voice ${v} note @${startBeat.toFixed(2)} reaches ±${maxAbsDelta.toFixed(2)}st — hard-walled at ±${range}st`);
      report.push({
        voice:v, ch:ch+1, start:startBeat, dur:durBeat, type:n.type,
        startHz, base, baseName:midiToName(base),
        cents:(freqToMidi(startHz,a4)-base)*100,
        pb0:bends[0].pb14, span:maxAbsDelta, overflow, clipped
      });
    }
  });
  if(voices.length>16) warnings.push(`${voices.length} voices exceed 16 MIDI channels — higher voices wrap and will share a channel`);
  report.sort((a,b)=>a.start-b.start||a.voice-b.voice);
  return {bytes:w.build(), report, warnings, count:notes.length, voices:voices.length, channelsUsed};
}

/* ---------- MIDI import (uses @tonejs/midi) ----------
   Each source track/channel becomes a voice. Bend is read per-track so
   simultaneous voices on different channels don't bleed into each other. */
function notesFromMidi(arrbuf, importRange, a4){
  const midi=new Midi(arrbuf);
  const a=a4||440;
  const bpm=(midi.header.tempos[0] && midi.header.tempos[0].bpm) || 120;
  const out=[]; let voiceCounter=0;

    if(!tr.notes || !tr.notes.length) return;     // skip empty/conductor tracks
    voiceCounter++; const voice=voiceCounter;
    const bends=(tr.pitchBends||[]).slice().sort((x,y)=>x.time-y.time);
    function bendAt(t){
      if(!bends.length) return 0;
      let v=bends[0].value;
      for(const b of bends){ if(b.time<=t+1e-6) v=b.value; else break; }
      return v;
    }
    tr.notes.slice().sort((x,y)=>x.time-y.time).forEach(nt=>{
      const startBeat=nt.time*bpm/60;
      const durBeat=Math.max(0.02, nt.duration*bpm/60);

      for(let s=0;s<=steps;s++){

        const semis=bendAt(tsec)*importRange;
        pts.push({t:frac, hz:midiToFreq(nt.midi+semis, a)});
      }
      const hzs=pts.map(p=>p.hz);
      const flat=hzs.every(h=>Math.abs(1200*Math.log2(h/hzs[0]))<1.0);

      if(flat){ type='hold'; P=[{t:0,hz:hzs[0]}]; }

        const m0=Math.log2(hzs[0]), m1=Math.log2(hzs[hzs.length-1]);

        for(let s=0;s<=steps;s++){ const exp=m0+(m1-m0)*(s/steps); if(Math.abs((Math.log2(hzs[s])-exp))*1200>4){lin=false;break;} }
        if(lin){ type='glide'; P=[{t:0,hz:hzs[0]},{t:1,hz:hzs[hzs.length-1]}]; }
        else { type='free'; P=pts.map(p=>({t:p.t,hz:p.hz})); }

}

  drawPlayhead(W,H);

  // gutters cover spill
  drawGutters(W,H);
}

function drawPitchGrid(W,H){
  ctx.save(); ctx.beginPath(); ctx.rect(GUT_L,GUT_T,W-GUT_L,H-GUT_T); ctx.clip();
  if(view.pitchRegime==='scale' && activeScale.is12){
    const top=Math.ceil(yToMidi(GUT_T)), bot=Math.floor(yToMidi(H));
    for(let m=bot;m<=top;m++){
      const y=midiToY(m); const pc=((m%12)+12)%12;
      const black=[1,3,6,8,10].includes(pc);
      if(black){ ctx.fillStyle='rgba(106,71,216,0.07)'; ctx.fillRect(GUT_L,y-view.pxPerSemi,W-GUT_L,view.pxPerSemi); }
      ctx.strokeStyle = pc===0 ? 'rgba(17,137,126,0.34)' : 'rgba(40,82,76,0.10)';
      ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(GUT_L,Math.round(y)+.5); ctx.lineTo(W,Math.round(y)+.5); ctx.stroke();
    }
  } else if(view.pitchRegime==='scale'){
    // generic scale: period-start lines strong, degree lines faint
    const lines=scaleDegreeLines();
    const showDeg = view.pxPerSemi*(activeScale.periodCents/100)/Math.max(1,activeScale.degreesCents.length) >= 5;
    for(const ln of lines){
      const y=hzToY(ln.hz);
      if(ln.isRoot){ ctx.strokeStyle='rgba(17,137,126,0.40)'; ctx.lineWidth=1.4; }
      else { if(!showDeg) continue; ctx.strokeStyle='rgba(40,82,76,0.12)'; ctx.lineWidth=1; }
      ctx.beginPath(); ctx.moveTo(GUT_L,Math.round(y)+.5); ctx.lineTo(W,Math.round(y)+.5); ctx.stroke();
    }
  } else {
    // frequency regime: octave lines strong, semitones faint (display is scale-independent)
    const top=Math.ceil(yToMidi(GUT_T)), bot=Math.floor(yToMidi(H));
    for(let m=bot;m<=top;m++){
      const y=midiToY(m); const pc=((m%12)+12)%12;
      ctx.strokeStyle = pc===0 ? 'rgba(17,137,126,0.30)' : 'rgba(40,82,76,0.07)';
      ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(GUT_L,Math.round(y)+.5); ctx.lineTo(W,Math.round(y)+.5); ctx.stroke();
    }
  }
  ctx.restore();
}

function drawTimeGrid(W,H){
  ctx.save(); ctx.beginPath(); ctx.rect(GUT_L,GUT_T,W-GUT_L,H-GUT_T); ctx.clip();
  const bpb=settings.sigNum; const tb=totalBeats();
  if(view.timeRegime==='meter' && activeCycle && !activeCycle.isEven){
    // cycle grid: boundaries repeated each bar, line weight by metric level (indispensability).
    const bnd=cycleBoundaries(activeCycle, cycDepthVal());                // [{phase, level}], includes phase 0 @ L0
    const firstBar=Math.max(0,Math.floor(xToBeat(GUT_L)/bpb)), lastBar=Math.min(settings.bars,Math.ceil(xToBeat(W)/bpb));
    const dense = view.pxPerBeat*bpb/Math.max(1,bnd.length) < 5;          // hide deep onsets when cramped
    for(let bar=firstBar; bar<settings.bars && bar<=lastBar; bar++){
      for(const o of bnd){
        if(o.phase<=0) continue;                                          // phase 0 drawn as a boundary below
        if(dense && o.level>1) continue;
        const x=beatToX((bar+o.phase)*bpb);
        const a = o.level===1 ? 0.20 : Math.max(0.07, 0.20 - (o.level-1)*0.05);
        ctx.strokeStyle=`rgba(40,82,76,${a})`; ctx.lineWidth=1;
        ctx.beginPath(); ctx.moveTo(Math.round(x)+.5,GUT_T); ctx.lineTo(Math.round(x)+.5,H); ctx.stroke();
      }
    }
    ctx.strokeStyle='rgba(17,137,126,0.40)'; ctx.lineWidth=1.4;           // L0 — cycle/bar boundaries
    for(let bar=firstBar; bar<=lastBar; bar++){ const x=beatToX(bar*bpb);
      ctx.beginPath(); ctx.moveTo(Math.round(x)+.5,GUT_T); ctx.lineTo(Math.round(x)+.5,H); ctx.stroke(); }
  } else if(view.timeRegime==='meter'){
    const sub=settings.grid;
    const firstB=Math.floor(xToBeat(GUT_L)), lastB=Math.ceil(xToBeat(W));
    // subdivisions
    if(view.pxPerBeat/sub>=6){
      ctx.strokeStyle='rgba(40,82,76,0.07)'; ctx.lineWidth=1;
      for(let b=Math.floor(firstB*sub)/sub; b<=lastB; b+=1/sub){
        const x=beatToX(b); ctx.beginPath(); ctx.moveTo(Math.round(x)+.5,GUT_T); ctx.lineTo(Math.round(x)+.5,H); ctx.stroke();
      }
    }
    for(let b=Math.max(0,firstB); b<=Math.min(tb,lastB); b++){
      const x=beatToX(b); const bar=(b%bpb===0);
      ctx.strokeStyle = bar?'rgba(17,137,126,0.40)':'rgba(40,82,76,0.16)';
      ctx.lineWidth = bar?1.4:1;
      ctx.beginPath(); ctx.moveTo(Math.round(x)+.5,GUT_T); ctx.lineTo(Math.round(x)+.5,H); ctx.stroke();
    }
  } else {
    const spb=60/settings.bpm; const totalSec=tb*spb;
    const firstS=Math.floor(xToBeat(GUT_L)*spb), lastS=Math.ceil(xToBeat(W)*spb);
    // choose nice second-grid
    let step=1; const pxPerSec=view.pxPerBeat/spb;
    if(pxPerSec<40) step=Math.pow(10,Math.ceil(Math.log10(40/pxPerSec)));
    const fine=step/ (pxPerSec*step>240?10:4);
    ctx.strokeStyle='rgba(40,82,76,0.07)'; ctx.lineWidth=1;
    if(pxPerSec*fine>=6) for(let s=Math.max(0,Math.floor(firstS/fine)*fine); s<=Math.min(totalSec,lastS); s+=fine){
      const x=beatToX(s/spb); ctx.beginPath(); ctx.moveTo(Math.round(x)+.5,GUT_T); ctx.lineTo(Math.round(x)+.5,H); ctx.stroke();
    }
    for(let s=Math.max(0,Math.floor(firstS/step)*step); s<=Math.min(totalSec,lastS); s+=step){
      const x=beatToX(s/spb);
      ctx.strokeStyle='rgba(17,137,126,0.34)'; ctx.lineWidth=1.2;
      ctx.beginPath(); ctx.moveTo(Math.round(x)+.5,GUT_T); ctx.lineTo(Math.round(x)+.5,H); ctx.stroke();
    }
  }
  ctx.restore();
}

function drawNotes(W,H){
  ctx.save(); ctx.beginPath(); ctx.rect(GUT_L,GUT_T,W-GUT_L,H-GUT_T); ctx.clip();
  ctx.lineCap='round'; ctx.lineJoin='round';
  for(const n of notes){
    const x0=beatToX(n.start), x1=beatToX(n.start+Math.max(n.dur,0.0001));
    if(x1<GUT_L||x0>W) continue;
    const sel=selection.has(n.id);
    const segOf=(segSel && segSel.note===n)? segSel.seg : -1;
    const part=ptSel.get(n);                              // Set<idx> of partially-selected points, or undefined
    const psel=(i)=> sel || (part&&part.has(i));
    const c=voiceColor(n.voice);
    // selection underlay (ember glow, reads regardless of voice hue)
    if(sel){ ctx.strokeStyle=col('--ember'); ctx.globalAlpha=.30; ctx.lineWidth=10; strokeContour(n,x0,x1); ctx.globalAlpha=1; }
    // soft halo (the "aura" — grabbing it moves the whole note)
    ctx.strokeStyle=c; ctx.globalAlpha=.20; ctx.lineWidth=9; strokeContour(n,x0,x1); ctx.globalAlpha=1;
    // main (thin) line — grabbing it selects a single segment
    ctx.strokeStyle=c; ctx.lineWidth=2.6; strokeContour(n,x0,x1);
    // selected segment overlay (clicked segment, or partial segments whose both ends are selected)
    if(segOf>=0){ ctx.strokeStyle=col('--ember'); ctx.lineWidth=3.6; strokeSegment(n,segOf); }
    if(part){ ctx.strokeStyle=col('--ember'); ctx.lineWidth=3.6;
      for(let i=0;i<n.pts.length-1;i++){ if(part.has(i)&&part.has(i+1)) strokeSegment(n,i); } }
    // endpoints + interior points + voice badge
    const yS=hzToY(pitchAt(n,0)), yE=hzToY(pitchAt(n,1)), lastSeg=n.pts.length-2;
    const startSel=sel||segOf===0||psel(0), endSel=sel||segOf===lastSeg||psel(n.pts.length-1);
    const showBadge = (sel||segOf>=0||part) || (n.dur*view.pxPerBeat>26 && view.pxPerSemi>8);
    if(showBadge) voiceBadge(x0,yS,n.voice,c,startSel); else handle(x0,yS,startSel);
    handle(x1,yE,endSel);
    if(n.pts.length>2){
      const showPts = sel || segOf>=0 || !!part;
      for(let i=1;i<n.pts.length-1;i++){
        const px=beatToX(n.start+n.pts[i].t*n.dur), py=hzToY(n.pts[i].hz);
        const hi = sel || segOf===i-1 || segOf===i || psel(i);
        if(showPts) handle(px,py,hi); else dot(px,py,c);
      }
    }
  }
  ctx.restore();
}
function strokeContour(n,x0,x1){
  ctx.beginPath();
  if(n.pts.length<=1){ const y=hzToY(pitchAt(n,0)); ctx.moveTo(x0,y); ctx.lineTo(x1,y); return ctx.stroke(); }  // hold = flat line
  const samples=Math.max(4,Math.ceil((x1-x0)/3));   // sample (handles curves, per-segment, multi-point, freehand)
  for(let s=0;s<=samples;s++){ const f=s/samples; const x=x0+(x1-x0)*f; const y=hzToY(pitchAt(n,f)); s?ctx.lineTo(x,y):ctx.moveTo(x,y); }
  ctx.stroke();
}
function strokeSegment(n,i){
  if(n.pts.length<2) return;
  const a=n.pts[i].t, b=n.pts[i+1].t;
  const steps=Math.max(2,Math.ceil((b-a)*n.dur*view.pxPerBeat/3));
  ctx.beginPath();
  for(let s=0;s<=steps;s++){ const f=a+(b-a)*(s/steps); const x=beatToX(n.start+f*n.dur); const y=hzToY(pitchAt(n,f)); s?ctx.lineTo(x,y):ctx.moveTo(x,y); }
  ctx.stroke();
}
function voiceBadge(x,y,v,c,sel){
  ctx.save();
  ctx.fillStyle=c; ctx.strokeStyle=sel?col('--ember'):'#fff'; ctx.lineWidth=sel?2:1.4;
  ctx.beginPath(); ctx.arc(x,y,7,0,7); ctx.fill(); ctx.stroke();
  ctx.fillStyle='#fff'; ctx.font='600 9px '+col('--mono'); ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(String(v),x,y+0.5);
  ctx.restore();
}
function roundRect(x,y,w,h,r){ r=Math.min(r,h/2,w/2); ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }
function handle(x,y,sel){ ctx.fillStyle=sel?col('--ember'):'#fff'; ctx.strokeStyle=sel?col('--ember'):col('--ink-dim');
  ctx.lineWidth=1.4; ctx.beginPath(); ctx.arc(x,y,sel?4.5:3.4,0,7); ctx.fill(); ctx.stroke(); }
function dot(x,y,c){ ctx.fillStyle=c; ctx.beginPath(); ctx.arc(x,y,2.6,0,7); ctx.fill(); }

function drawGutters(W,H){
  // corner
  ctx.fillStyle=col('--panel'); ctx.fillRect(0,0,GUT_L,H); ctx.fillRect(0,0,W,GUT_T);
  ctx.strokeStyle=col('--edge'); ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(GUT_L+.5,0); ctx.lineTo(GUT_L+.5,H); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0,GUT_T+.5); ctx.lineTo(W,GUT_T+.5); ctx.stroke();

  // pitch labels (left)
  ctx.save(); ctx.beginPath(); ctx.rect(0,GUT_T,GUT_L,H-GUT_T); ctx.clip();
  ctx.font='10px '+col('--mono'); ctx.textBaseline='middle';
  const top=Math.ceil(yToMidi(GUT_T)), bot=Math.floor(yToMidi(H));
  if(view.pitchRegime==='scale' && activeScale.is12){
    const everyC=view.pxPerSemi<9;
    for(let m=bot;m<=top;m++){ const pc=((m%12)+12)%12; if(everyC && pc!==0) continue; if(!everyC && view.pxPerSemi<13 && [1,3,6,8,10].includes(pc)) continue;
      const y=midiToY(m);
      ctx.fillStyle = pc===0?col('--tide'):col('--ink-dim');
      ctx.textAlign='right'; ctx.fillText(midiToName(m),GUT_L-7,y); }
  } else if(view.pitchRegime==='scale'){
    const lines=scaleDegreeLines();
    const showDeg = view.pxPerSemi*(activeScale.periodCents/100)/Math.max(1,activeScale.degreesCents.length) >= 11;
    ctx.textAlign='right';
    for(const ln of lines){ const y=hzToY(ln.hz);
      if(ln.isRoot){ ctx.fillStyle=col('--tide'); ctx.fillText(midiToName(scaleRootMidi+0).replace(/[0-9-]+$/,'')+'·'+(ln.hz>=1000?(ln.hz/1000).toFixed(2)+'k':ln.hz.toFixed(ln.hz<100?1:0)),GUT_L-7,y); }
      else if(showDeg){ ctx.fillStyle=col('--ink-faint'); ctx.fillText(ln.idx+'',GUT_L-7,y); }
    }
  } else {
    // frequency: label at octaves with Hz
    for(let m=bot;m<=top;m++){ const pc=((m%12)+12)%12; if(pc!==0 && view.pxPerSemi<22) continue;
      const y=midiToY(m); const hz=midiToFreq(m,settings.a4);
      ctx.fillStyle=pc===0?col('--tide'):col('--ink-dim'); ctx.textAlign='right';
      ctx.fillText((hz>=1000?(hz/1000).toFixed(2)+'k':hz.toFixed(hz<100?1:0)),GUT_L-7,y); }
  }
  ctx.restore();

  // time labels (top)
  ctx.save(); ctx.beginPath(); ctx.rect(GUT_L,0,W-GUT_L,GUT_T); ctx.clip();
  ctx.font='10px '+col('--mono'); ctx.textBaseline='middle'; ctx.textAlign='left';
  const bpb=settings.sigNum, tb=totalBeats();
  if(view.timeRegime==='meter'){
    const firstB=Math.floor(xToBeat(GUT_L)), lastB=Math.ceil(xToBeat(W));
    for(let b=Math.max(0,firstB-firstB%bpb); b<=Math.min(tb,lastB); b+=bpb){
      const x=beatToX(b); ctx.fillStyle=col('--ink'); ctx.fillText((b/bpb+1)+'',x+3,GUT_T/2);
    }
  } else {
    const spb=60/settings.bpm, totalSec=tb*spb;
    const pxPerSec=view.pxPerBeat/spb; let step=1; if(pxPerSec<46) step=Math.pow(10,Math.ceil(Math.log10(46/pxPerSec)));
    const firstS=Math.floor(xToBeat(GUT_L)*spb), lastS=Math.ceil(xToBeat(W)*spb);
    for(let s=Math.max(0,Math.floor(firstS/step)*step); s<=Math.min(totalSec,lastS); s+=step){
      const x=beatToX(s/spb); ctx.fillStyle=col('--ink');
      const lab = step>=1? s+'s' : s.toFixed(2)+'s';
      ctx.fillText(lab,x+3,GUT_T/2);
    }
  }
  ctx.restore();
}

let playhead=null; // beat or null
function drawPlayhead(W,H){
  if(playhead==null) return; const x=beatToX(playhead);
  if(x<GUT_L||x>W) return;
  ctx.strokeStyle=col('--ember'); ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(x,GUT_T); ctx.lineTo(x,H); ctx.stroke();
  ctx.fillStyle=col('--ember'); ctx.beginPath(); ctx.moveTo(x-4,GUT_T); ctx.lineTo(x+4,GUT_T); ctx.lineTo(x,GUT_T+5); ctx.fill();
}

/* ============================================================
   HIT TESTING
   ============================================================ */
function noteAt(px,py){
  for(let i=notes.length-1;i>=0;i--){ const n=notes[i];
    const x0=beatToX(n.start), x1=beatToX(n.start+n.dur);
    if(px<x0-6||px>x1+6) continue;
    if(n.type==='hold'){ const y=hzToY(pitchAt(n,0)); if(Math.abs(py-y)<=Math.max(6,view.pxPerSemi*0.5)) return n; }
    else { const f=Math.max(0,Math.min(1,(px-x0)/Math.max(1,x1-x0))); const y=hzToY(pitchAt(n,f)); if(Math.abs(py-y)<=7) return n; }
  }
  return null;
}
function pointHitIndex(n,px,py){      // index of the breakpoint under cursor, or -1
  for(let i=0;i<n.pts.length;i++){
    const x=beatToX(n.start+n.pts[i].t*n.dur), y=hzToY(n.pts[i].hz);
    if(Math.hypot(px-x,py-y)<8) return i;
  }
  return -1;
}
function distToSeg(px,py,ax,ay,bx,by){
  const dx=bx-ax, dy=by-ay; const L2=dx*dx+dy*dy||1e-9;
  let t=((px-ax)*dx+(py-ay)*dy)/L2; t=Math.max(0,Math.min(1,t));
  const cx=ax+t*dx, cy=ay+t*dy;
  return {dist:Math.hypot(px-cx,py-cy), t};
}
// nearest point on a note's rendered contour: {dist, seg, frac}
function curveHit(n,px,py){
  const x0=beatToX(n.start), x1=beatToX(n.start+Math.max(n.dur,1e-4));
  if(n.pts.length<=1){ const y=hzToY(pitchAt(n,0)); const cx=Math.max(x0,Math.min(x1,px));
    return {dist:Math.hypot(px-cx,py-y), seg:0, frac:0}; }
  const samples=Math.max(8,Math.ceil((x1-x0)/2));
  let best={dist:Infinity,frac:0}, prevx=null,prevy=null,prevf=0;
  for(let s=0;s<=samples;s++){ const f=s/samples; const x=x0+(x1-x0)*f; const y=hzToY(pitchAt(n,f));
    if(prevx!=null){ const dd=distToSeg(px,py,prevx,prevy,x,y); if(dd.dist<best.dist){ best.dist=dd.dist; best.frac=prevf+(f-prevf)*dd.t; } }
    prevx=x;prevy=y;prevf=f;
  }
  let seg=0; for(let i=0;i<n.pts.length-1;i++){ if(best.frac>=n.pts[i].t-1e-9 && best.frac<=n.pts[i+1].t+1e-9){ seg=i; break; } }
  return {dist:best.dist, seg:Math.max(0,Math.min(n.pts.length-2,seg)), frac:best.frac};
}
const HIT_THIN=3.5, HIT_AURA=11;   // crisp center line = segment · soft aura = whole note
function selectHit(px,py){
  for(let i=notes.length-1;i>=0;i--){ const n=notes[i];
    const x0=beatToX(n.start), x1=beatToX(n.start+Math.max(n.dur,1e-4));
    if(px<x0-HIT_AURA||px>x1+HIT_AURA) continue;
    if(n.type==='hold'){
      const y=hzToY(pitchAt(n,0));
      if(py<y-HIT_AURA||py>y+HIT_AURA) continue;
      const he=holdEdge(n,px);                       // x near start or end handle
      if(he) return {note:n,kind:'point',idx:(he==='start'?0:1),edge:he};
      const ch=curveHit(n,px,py); if(ch.dist<=HIT_AURA) return {note:n,kind:'note'};
      continue;
    }
    const pi=pointHitIndex(n,px,py); if(pi>=0) return {note:n,kind:'point',idx:pi};
    const ch=curveHit(n,px,py);
    if(ch.dist<=HIT_THIN) return {note:n,kind:'segment',seg:ch.seg};
    if(ch.dist<=HIT_AURA) return {note:n,kind:'note'};
  }
  return null;
}

/* ============================================================
   POINTER INTERACTION
   ============================================================ */
let drag=null;
function evtPos(e){ const r=cv.getBoundingClientRect(); return {x:e.clientX-r.left, y:e.clientY-r.top}; }

cv.addEventListener('pointerdown',e=>{
  cv.setPointerCapture(e.pointerId); dragHist=null;
  const p=evtPos(e); if(p.x<GUT_L||p.y<GUT_T){ // ruler drag = scroll
    drag={mode:'scrollGutter', sx:p.x, sy:p.y, ox:view.scrollX, oy:view.scrollY, axis:p.y<GUT_T?'x':'y'}; return;
  }
  const t=view.tool;
  if(t==='pan'||e.button===1||spaceDown){ drag={mode:'pan',sx:p.x,sy:p.y,ox:view.scrollX,oy:view.scrollY}; stage.classList.add('tool-pan'); return; }

  // PEN: click to place successive points (double-click / Enter / Esc to finish)
  if(t==='pen'){
    const hz=snapPitchHz(yToHz(p.y));
    let beat=clampBeatToContent(snapBeat(xToBeat(p.x)));
    if(!penNote){
      pushHistory();
      penRaw=[{beat,hz}];
      penNote={id:NID++, start:beat, dur:0.0001, type:'glide', curve:defaultCurve, vel:+vel.value||96, voice:1, pts:[{t:0,hz}]};
      notes.push(penNote); penNote.voice=autoVoice(penNote);
      selection.clear(); selection.add(penNote.id);
    } else {
      // clicking on/near the last point finishes the path (also handles the 2nd click of a double-click)
      const lp=penRaw[penRaw.length-1];
      const lx=beatToX(penNote.start+penNote.pts[penNote.pts.length-1].t*penNote.dur), ly=hzToY(lp.hz);
      if(Math.hypot(p.x-lx,p.y-ly)<9){ finalizePen(); return; }
      if(beat<=lp.beat) beat=lp.beat + 1/settings.grid;   // keep time monotonic
      beat=clampBeatToContent(beat);
      penRaw.push({beat,hz}); rebuildPoints(penNote,penRaw); penNote.voice=autoVoice(penNote);
    }
    changed(); return;
  }

  const hit=noteAt(p.x,p.y);
  if(t==='erase'){ if(hit){ pushHistory(); notes=notes.filter(n=>n!==hit); selection.delete(hit.id); changed(); } return; }

  if(t==='select'){
    dragHist=histSnapshot();                              // capture pre-state; committed on pointerup if notes change
    const h=selectHit(p.x,p.y);
    const mode = e.shiftKey ? 'include' : (e.altKey ? 'exclude' : selMode);
    if(h && (mode==='include'||mode==='exclude')){
      segSel=null; pointSel=null;
      mergeSel(h.note, new Set(entityIndices(h)), mode==='exclude'?'sub':'add');
      drag = (mode==='include' && (ptSel.size>0||selection.size>0)) ? startGroupMove(p) : null;
      changed(); return;
    }
    if(h){
      const multi = ptSel.size>0 || selection.size>1;
      const hitInSel = (h.kind==='point') ? (ptSelHas(h.note,h.idx)||selection.has(h.note.id))
                                          : (selection.has(h.note.id)||ptSel.has(h.note));
      if(multi && hitInSel){                              // grab and move the whole granular selection
        segSel=null; pointSel=null; drag=startGroupMove(p);
      } else {
        ptSel=new Map();                                  // single interaction resets partial selection
        if(h.kind==='point'){
          segSel=null;
          if(!selection.has(h.note.id)) selection.clear();
          selection.add(h.note.id);
          pointSel={note:h.note, idx:(h.note.type==='hold'?0:h.idx)};
          drag={mode:'resize', note:h.note, ptIdx:h.idx, ep:(h.note.type==='hold'?(h.edge||holdEdge(h.note,p.x)):null), sx:p.x, sy:p.y, o:snapshot(h.note)};
        } else if(h.kind==='segment'){
          selection.clear(); pointSel=null; segSel={note:h.note, seg:h.seg};
          drag={mode:'segMove', note:h.note, seg:h.seg, sx:p.x, sy:p.y,
                absPts:h.note.pts.map(q=>({beat:h.note.start+q.t*h.note.dur, hz:q.hz, curve:q.curve}))};
        } else { // whole note (aura)
          segSel=null;
          if(!selection.has(h.note.id)) selection.clear();
          selection.add(h.note.id);
          pointSel = (h.note.type==='hold') ? {note:h.note, idx:0} : null;
          drag={mode:'move', note:h.note, sx:p.x, sy:p.y, o:snapshot(h.note)};
        }
      }
    } else {
      const marqMode = (mode==='exclude') ? 'subtract' : (mode==='include' ? 'add' : 'replace');
      if(marqMode==='replace') clearGran();
      drag={mode:'marquee',sx:p.x,sy:p.y,x2:p.x,y2:p.y,marqMode};
    }
    changed(); return;
  }

  // creation tools
  dragHist=histSnapshot();
  const beat=clampBeatToContent(snapBeat(xToBeat(p.x)));
  const hz=snapPitchHz(yToHz(p.y));
  if(t==='hold'){
    const n={id:NID++, start:beat, dur:settings.defLen, type:'hold', vel:+vel.value||96, voice:1, pts:[{t:0,hz}]};
    notes.push(n); n.voice=autoVoice(n); selection.clear(); selection.add(n.id);
    drag={mode:'newHoldLen', note:n, sx:p.x, baseStart:beat};
  } else if(t==='glide'){
    const n={id:NID++, start:beat, dur:Math.max(0.0625,settings.defLen), type:'glide', curve:defaultCurve,
             vel:+vel.value||96, voice:1, pts:[{t:0,hz},{t:1,hz}]};
    notes.push(n); n.voice=autoVoice(n); selection.clear(); selection.add(n.id);
    drag={mode:'newGlide', note:n, sx:p.x, sy:p.y, baseStart:beat, startHz:hz};
  } else if(t==='free'){
    const n={id:NID++, start:beat, dur:0.0001, type:'free', vel:+vel.value||96, voice:1, pts:[{t:0,hz}]};
    notes.push(n); n.voice=autoVoice(n); selection.clear(); selection.add(n.id);
    drag={mode:'newFree', note:n, baseStart:beat, raw:[{beat,hz}]};
  }
  changed();
});

// pen helper: rebuild normalized pts from absolute [{beat,hz}] (no decimation — exact points)
function rebuildPoints(note,raw){
  const start=raw[0].beat; let end=raw[raw.length-1].beat;
  if(end<=start) end=start+0.0001;
  note.start=start; note.dur=end-start;
  note.pts = raw.length<2 ? [{t:0,hz:raw[0].hz}] : raw.map(q=>({t:(q.beat-start)/(end-start), hz:q.hz}));
}
function finalizePen(){
  if(!penNote) return;
  if(penNote.pts.length<2){ notes=notes.filter(n=>n!==penNote); selection.delete(penNote.id); }
  penNote=null; penRaw=null; changed();
}

function holdEdge(n,px){ const x1=beatToX(n.start+n.dur); if(Math.abs(px-x1)<7) return 'end'; const x0=beatToX(n.start); if(Math.abs(px-x0)<7) return 'start'; return null; }
function snapshot(n){ return JSON.parse(JSON.stringify(n)); }
function startGroupMove(p){
  const targets=new Map();
  for(const id of selection){ const n=notes.find(x=>x.id===id); if(n) targets.set(n, new Set(n.pts.map((_,i)=>i))); }
  for(const [n,set] of ptSel){ const ex=targets.get(n)||new Set(); for(const i of set) ex.add(i); targets.set(n,ex); }
  const snap=new Map();
  for(const [n,set] of targets){ snap.set(n,{sel:set, abs:n.pts.map(q=>({beat:n.start+q.t*n.dur, hz:q.hz, curve:q.curve}))}); }
  return {mode:'ptMove', sx:p.x, sy:p.y, targets:snap};
}
function removePoints(note,idxSet){     // returns false if the note should be removed entirely
  const abs=note.pts.map(q=>({beat:note.start+q.t*note.dur, hz:q.hz, curve:q.curve}));
  const kept=abs.filter((_,i)=>!idxSet.has(i));
  if(kept.length<1) return false;
  if(kept.length===1){ note.type='hold'; note.start=kept[0].beat; if(!(note.dur>0)) note.dur=settings.defLen; note.pts=[{t:0,hz:kept[0].hz}]; return true; }
  const start=Math.min(...kept.map(q=>q.beat)), end=Math.max(...kept.map(q=>q.beat)), dur=Math.max(1e-4,end-start);
  note.start=start; note.dur=dur;
  note.pts=kept.map(q=>{ const o={t:(q.beat-start)/dur, hz:q.hz}; if(q.curve) o.curve=q.curve; return o; });
  if(note.type==='hold') note.type='glide';
  return true;
}
function deleteSelection(){
  if(!selection.size && !ptSel.size) return;
  pushHistory();
  if(selection.size) notes=notes.filter(n=>!selection.has(n.id));
  for(const [n,set] of ptSel){ if(!notes.includes(n)) continue; if(!removePoints(n,set)) notes=notes.filter(x=>x!==n); }
  clearGran();
}
function clampBeatToContent(b){ return Math.max(0,Math.min(totalBeats(),b)); }
// voice = lowest positive integer whose notes don't overlap this one's time-span ("y-axis intersection")
function overlap(aS,aE,bS,bE){ return aS < bE-1e-9 && bS < aE-1e-9; }
function autoVoice(note){
  const s=note.start, e=note.start+Math.max(note.dur,1e-4);
  let v=1;
  while(v<=128){ let clash=false;
    for(const n of notes){ if(n===note) continue; if((n.voice||1)===v && overlap(s,e,n.start,n.start+Math.max(n.dur,1e-4))){ clash=true; break; } }
    if(!clash) return v; v++;
  }
  return v;
}

cv.addEventListener('pointermove',e=>{
  const p=evtPos(e);
  lastMouse.x=p.x; lastMouse.y=p.y; lastMouse.inside=(p.x>=GUT_L && p.y>=GUT_T);
  // hover cursor feedback for select endpoints
  if(!drag){ hoverFeedback(p); return; }
  const d=drag;
  if(d.mode==='pan'){ view.scrollX=d.ox-(p.x-d.sx); view.scrollY=d.oy-(p.y-d.sy); clampScroll(); draw(); return; }
  if(d.mode==='scrollGutter'){ if(d.axis==='x') view.scrollX=d.ox-(p.x-d.sx); else view.scrollY=d.oy-(p.y-d.sy); clampScroll(); draw(); return; }

  if(d.mode==='newHoldLen'){ const b=clampBeatToContent(snapBeat(xToBeat(p.x))); d.note.dur=Math.max(1/settings.grid, b-d.baseStart || settings.defLen); if(d.note.dur<=0) d.note.dur=settings.defLen; d.note.voice=autoVoice(d.note); draw(); updateStatus(); return; }
  if(d.mode==='newGlide'){
    const b=clampBeatToContent(snapBeat(xToBeat(p.x))); const hz=snapPitchHz(yToHz(p.y));
    d.note.dur=Math.max(1/settings.grid, Math.abs(b-d.baseStart)||settings.defLen);
    if(b<d.baseStart){ d.note.start=b; d.note.pts=[{t:0,hz},{t:1,hz:d.startHz}]; }
    else { d.note.start=d.baseStart; d.note.pts=[{t:0,hz:d.startHz},{t:1,hz}]; }
    d.note.voice=autoVoice(d.note); draw(); updateStatus(); return;
  }
  if(d.mode==='newFree'){
    const b=clampBeatToContent(xToBeat(p.x)); const hz=snapPitchHz(yToHz(p.y));
    if(b>d.baseStart){ d.raw.push({beat:b,hz}); rebuildFree(d.note,d.raw); d.note.voice=autoVoice(d.note); }
    draw(); updateStatus(); return;
  }
  if(d.mode==='ptMove'){
    const rawDb=(p.x-d.sx)/view.pxPerBeat, rawDm=-(p.y-d.sy)/view.pxPerSemi;
    let dB = settings.snapTime ? Math.round(rawDb*settings.grid)/settings.grid : rawDb;   // delta-snapped time keeps the group rigid
    const minStep=1/Math.max(settings.grid,8); let loB=-Infinity, hiB=Infinity;
    for(const t of d.targets.values()){ const abs=t.abs, sel=t.sel, last=abs.length-1;
      for(let i=0;i<abs.length;i++){ if(!sel.has(i)) continue;
        hiB=Math.min(hiB, totalBeats()-abs[i].beat); loB=Math.max(loB, -abs[i].beat);
        if(i<last && !sel.has(i+1)) hiB=Math.min(hiB,(abs[i+1].beat-abs[i].beat)-minStep);
        if(i>0   && !sel.has(i-1)) loB=Math.max(loB,-((abs[i].beat-abs[i-1].beat)-minStep));
      }
    }
    dB=Math.max(loB,Math.min(hiB,dB));
    for(const [n,t] of d.targets){ const abs=t.abs, sel=t.sel;
      const na=abs.map((a,i)=> sel.has(i)
        ? {beat:a.beat+dB, hz:settings.snapPitch?snapPitchHz(midiToFreq(freqToMidi(a.hz,settings.a4)+rawDm,settings.a4)):midiToFreq(freqToMidi(a.hz,settings.a4)+rawDm,settings.a4), curve:a.curve}
        : {beat:a.beat, hz:a.hz, curve:a.curve});
      const start=Math.min(...na.map(q=>q.beat)), end=Math.max(...na.map(q=>q.beat)), dur=Math.max(1e-4,end-start);
      n.start=start; n.dur=dur;
      n.pts=na.map(q=>{ const o={t:(q.beat-start)/dur, hz:q.hz}; if(q.curve) o.curve=q.curve; return o; });
    }
    draw(); updateStatus(); return;
  }
  if(d.mode==='move'){
    const db=(p.x-d.sx)/view.pxPerBeat, dm=-(p.y-d.sy)/view.pxPerSemi;
    let ns=d.o.start+db; if(settings.snapTime) ns=snapBeat(ns);
    d.note.start=clampBeatToContent(ns);
    const shift=settings.snapPitch?Math.round(dm):dm;
    d.note.pts=d.o.pts.map(q=>{ const o={t:q.t, hz:midiToFreq(freqToMidi(q.hz,settings.a4)+shift,settings.a4)}; if(q.curve) o.curve=q.curve; return o; });
    draw(); updateStatus(); return;
  }
  if(d.mode==='segMove'){
    const n=d.note, seg=d.seg, last=d.absPts.length-1;
    const rawDb=(p.x-d.sx)/view.pxPerBeat, rawDm=-(p.y-d.sy)/view.pxPerSemi;
    // proposed new absolute positions for the two endpoints
    const mk=(i)=>{
      let beat=clampBeatToContent(snapBeat(d.absPts[i].beat+rawDb));
      let hz=snapPitchHz(midiToFreq(freqToMidi(d.absPts[i].hz,settings.a4)+rawDm,settings.a4));
      return {beat,hz,curve:d.absPts[i].curve};
    };
    const a=d.absPts.map(q=>({beat:q.beat,hz:q.hz,curve:q.curve}));
    a[seg]=mk(seg); a[seg+1]=mk(seg+1);
    const minStep=1/Math.max(settings.grid,8);
    if(seg>0) a[seg].beat=Math.max(a[seg].beat, a[seg-1].beat+minStep);
    if(seg+1<last) a[seg+1].beat=Math.min(a[seg+1].beat, a[seg+2].beat-minStep);
    if(a[seg+1].beat<=a[seg].beat) a[seg+1].beat=a[seg].beat+minStep;   // keep time increasing
    const start=Math.min(...a.map(q=>q.beat)), end=Math.max(...a.map(q=>q.beat)), dur=Math.max(1e-4,end-start);
    n.start=start; n.dur=dur;
    n.pts=a.map(q=>{ const o={t:(q.beat-start)/dur, hz:q.hz}; if(q.curve) o.curve=q.curve; return o; });
    draw(); updateStatus(); return;
  }
  if(d.mode==='resize'){
    const n=d.note;
    if(n.type==='hold'){
      if(d.ep==='end'){ const b=clampBeatToContent(snapBeat(xToBeat(p.x))); n.dur=Math.max(1/settings.grid,b-n.start); }
      else { const b=clampBeatToContent(snapBeat(xToBeat(p.x))); const end=d.o.start+d.o.dur; n.start=Math.min(b,end-1/settings.grid); n.dur=end-n.start; }
    } else {
      const idx=d.ptIdx, last=n.pts.length-1;
      const hz=snapPitchHz(yToHz(p.y));
      const b=clampBeatToContent(snapBeat(xToBeat(p.x)));
      if(idx===0){ const end=d.o.start+d.o.dur; n.start=Math.min(b,end-1/settings.grid); n.dur=end-n.start; n.pts[0]={...n.pts[0],hz}; }
      else if(idx===last){ n.dur=Math.max(1/settings.grid,b-n.start); n.pts[last]={...n.pts[last],hz}; }
      else { // interior point — move in (t,hz) between its neighbors, note extent unchanged
        let nt=(b-n.start)/Math.max(1e-6,n.dur);
        nt=Math.max(n.pts[idx-1].t+1e-4, Math.min(n.pts[idx+1].t-1e-4, nt));
        n.pts[idx]={...n.pts[idx], t:nt, hz};
      }
    }
    draw(); updateStatus(); return;
  }
  if(d.mode==='marquee'){ d.x2=p.x; d.y2=p.y; draw(); drawMarquee(d); return; }
});
// pen rubber-band preview (no drag in progress)
cv.addEventListener('pointermove',e=>{
  if(!penNote || drag) return;
  draw();
  const p=evtPos(e);
  if(p.x<GUT_L||p.y<GUT_T) return;
  const lx=beatToX(penNote.start+penNote.pts[penNote.pts.length-1].t*penNote.dur);
  const ly=hzToY(penNote.pts[penNote.pts.length-1].hz);
  ctx.save(); ctx.setLineDash([4,4]); ctx.strokeStyle=col('--ember'); ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(lx,ly); ctx.lineTo(p.x,p.y); ctx.stroke(); ctx.restore();
});

function rebuildFree(note,raw){
  // raw: [{beat,hz}] increasing beat; decimate then normalize to t in 0..1
  const start=raw[0].beat; let end=raw[raw.length-1].beat;
  if(end<=start) end=start+0.0001; note.start=start; note.dur=end-start;
  // decimate by min beat spacing
  const minStep=(end-start)/120;
  const dec=[raw[0]]; for(let i=1;i<raw.length;i++){ if(raw[i].beat-dec[dec.length-1].beat>=minStep) dec.push(raw[i]); }
  if(dec[dec.length-1]!==raw[raw.length-1]) dec.push(raw[raw.length-1]);
  note.pts=dec.map(q=>({t:(q.beat-start)/(end-start), hz:q.hz}));
  if(note.pts.length<2) note.pts=[{t:0,hz:raw[0].hz},{t:1,hz:raw[0].hz}];
}

function hoverFeedback(p){
  if(view.tool!=='select'){ return; }
  const h=selectHit(p.x,p.y);
  cv.style.cursor = !h ? 'default' : (h.kind==='note' ? 'move' : 'pointer');

cv.addEventListener('pointerup',e=>{

    if((drag.mode==='newGlide'||drag.mode==='newFree'||drag.mode==='newHoldLen')){
      // discard zero-length frees
      if(drag.note.type==='free' && drag.note.pts.length<2){ notes=notes.filter(n=>n!==drag.note); }
    }

// double-click: finish the pen, or insert/delete a breakpoint on a glide/free note
cv.addEventListener('dblclick',e=>{
  if(penNote){ finalizePen(); return; }
  if(view.tool!=='select') return;
  const p=evtPos(e); if(p.x<GUT_L||p.y<GUT_T) return;
  const hit=noteAt(p.x,p.y); if(!hit || hit.type==='hold') return;
  const idx=pointHitIndex(hit,p.x,p.y);
  if(idx>0 && idx<hit.pts.length-1){          // delete interior point
    pushHistory();
    hit.pts.splice(idx,1); if(hit.type==='free' && hit.pts.length===2) hit.type='glide';
    changed(); return;
  }
  // insert a point on the body at the cursor
  pushHistory();
  const t=Math.max(0.0001,Math.min(0.9999,(xToBeat(p.x)-hit.start)/Math.max(1e-6,hit.dur)));
  const hz=snapPitchHz(yToHz(p.y));
  let i=0; while(i<hit.pts.length && hit.pts[i].t<t) i++;
  hit.pts.splice(i,0,{t,hz});
  selection.clear(); selection.add(hit.id);
  changed();
});

function drawMarquee(d){
  const x=Math.min(d.sx,d.x2), y=Math.min(d.sy,d.y2), w=Math.abs(d.x2-d.sx), h=Math.abs(d.y2-d.sy);
  ctx.save(); ctx.strokeStyle=col('--tide'); ctx.fillStyle='rgba(17,137,126,0.08)'; ctx.lineWidth=1;
  ctx.fillRect(x,y,w,h); ctx.strokeRect(x+.5,y+.5,w,h); ctx.restore();
}
function commitMarquee(d){
  const x=Math.min(d.sx,d.x2), y=Math.min(d.sy,d.y2), w=Math.abs(d.x2-d.sx), h=Math.abs(d.y2-d.sy);
  if(w<3&&h<3) return;
  const mode=d.marqMode||'replace';
  if(mode==='replace'){ selection.clear(); ptSel=new Map(); }
  segSel=null; pointSel=null;
  const op = (mode==='subtract') ? 'sub' : 'add';          // replace + add both union (replace pre-cleared)
  // collect point indices hit by an intersected segment (curve), then merge
  for(const n of notes){
    const nx0=beatToX(n.start), nx1=beatToX(n.start+Math.max(n.dur,1e-4));
    if(nx1<x-2||nx0>x+w+2) continue;
    let hit=new Set();
    if(n.type==='hold'){ const yy=hzToY(pitchAt(n,0)); if(lineVsRect(nx0,yy,nx1,yy,x,y,w,h)) hit.add(0); }
    else { for(let i=0;i<n.pts.length-1;i++) if(segHitsRect(n,i,x,y,w,h)){ hit.add(i); hit.add(i+1); } }
    if(!hit.size) continue;
    mergeSel(n, hit, op);
  }
}

/* ---- wheel: scroll / zoom ---- */
cv.addEventListener('wheel',e=>{
  e.preventDefault();
  if(e.ctrlKey||e.metaKey){
    const p=evtPos(e); const f=e.deltaY<0?1.12:1/1.12;
    // zoom both, keep cursor anchored
    const beatAt=xToBeat(p.x), midiAt=yToMidi(p.y);
    view.pxPerBeat=clamp(view.pxPerBeat*f,8,400);
    view.pxPerSemi=clamp(view.pxPerSemi*f,3,60);
    view.scrollX = (beatAt*view.pxPerBeat) - (p.x-GUT_L);
    view.scrollY = (view.midiMax-midiAt)*view.pxPerSemi - (p.y-GUT_T);
    clampScroll(); draw();
  } else if(e.shiftKey){ view.scrollX+=e.deltaY; clampScroll(); draw(); }
  else { view.scrollY+=e.deltaY; view.scrollX+=e.deltaX; clampScroll(); draw(); }
},{passive:false});
function clamp(v,a,b){return Math.max(a,Math.min(b,v));}

/* ---- scales: populate, select, .scl parsing, manifest ---- */
const scaleSel=document.getElementById('scaleSel'), scaleRootEl=document.getElementById('scaleRoot'),
      sclFile=document.getElementById('sclFile');
function populateRoot(){
  scaleRootEl.innerHTML='';
  for(let m=36;m<=84;m++){ const o=document.createElement('option'); o.value=m; o.textContent=midiToName(m); if(m===scaleRootMidi)o.selected=true; scaleRootEl.appendChild(o); }
}
function optgroup(label){ const g=document.createElement('optgroup'); g.label=label; return g; }
function populateScaleSelect(){
  scaleSel.innerHTML='';
  const gb=optgroup('built-in');
  for(const id of Object.keys(BUILTIN_SCALES)){ const o=document.createElement('option'); o.value=id; o.textContent=BUILTIN_SCALES[id].name; gb.appendChild(o); }
  scaleSel.appendChild(gb);
  if(libraryManifest && libraryManifest.categories){
    for(const cat of libraryManifest.categories){
      const g=optgroup('lib · '+cat.name);
      for(const f of (cat.files||[])){ const path=typeof f==='string'?f:f.path; const nm=typeof f==='string'?prettyName(f):(f.name||prettyName(f.path));
        const o=document.createElement('option'); o.value='lib:'+path; o.textContent=nm; g.appendChild(o); }
      scaleSel.appendChild(g);
    }
  }
  const ups=Object.keys(SCALES).filter(id=>id.startsWith('up:'));
  if(ups.length){ const g=optgroup('uploaded'); for(const id of ups){ const o=document.createElement('option'); o.value=id; o.textContent=SCALES[id].name; g.appendChild(o); } scaleSel.appendChild(g); }
  scaleSel.value=activeScaleId;

function prettyName(path){ return path.split('/').pop().replace(/\.scl$/i,'').replace(/[_-]+/g,' '); }
function setActiveScale(id){ if(!SCALES[id]) return; activeScaleId=id; activeScale=SCALES[id]; scaleSel.value=id; regimePill(); changed(); }
scaleSel.addEventListener('change',async()=>{
  const v=scaleSel.value;
  if(v.startsWith('lib:')){

/* A .cyc is FLAT (description, count, onset list) or a GRAMMAR (any line starting with @).
   parseCyc auto-detects and returns the matching cycle object. */
function parseCyc(text){
  const isGrammar = text.split(/\r?\n/).some(l=>{ const t=l.trim(); return t && !t.startsWith('!') && t[0]==='@'; });
  if(isGrammar){ const g=parseCyc2(text); return { name:(g.description&&g.description.length?g.description:null), kind:'grammar', grammar:g, src:text }; }
  const lines=text.split(/\r?\n/); let state='desc', desc=null, count=null; const data=[];
  for(const raw of lines){ const line=raw.trim();
    if(line.startsWith('!')) continue;
    if(state==='desc'){ desc=raw.trim(); state='count'; continue; }
    if(line==='') continue;
    if(state==='count'){ count=parseInt(line,10); state='onset'; continue; }
    const tok=line.split(/\s+/)[0]; let frac;
    if(tok.includes('.')) frac=parseFloat(tok);                                  // measured / microtiming
    else if(tok.includes('/')){ const [a,b]=tok.split('/').map(Number); frac=a/b; }  // structural / additive
    else frac=parseFloat(tok);                                                   // bare int (e.g. 1 = the period)
    if(isFinite(frac)) data.push(frac);
  }
  if(data.length<1) throw new Error('no onsets');
  const period=data[data.length-1]||1;                 // last entry closes the cycle
  const onsets=[0].concat(data.slice(0,-1));            // implicit downbeat + listed onsets
  const phasesNorm=onsets.map(p=>p/period);             // normalize to [0,1)
  return { name:(desc&&desc.length?desc:null), phasesNorm, period };
}
/* ---- recursive subdivision grammar (the time-domain analog of recursion in tunings) ----
   Rule:  @name: SPEC > CONT   — SPEC = int N (even) | weights | measured points;
   > CONT = one rule for all children | one per child (_=leaf) | omitted (leaves). A rule may self-refer. */
function parseCyc2(text){
  const lines=text.split(/\r?\n/); let desc=null, sawDesc=false; const rules={}; let start=null;
  for(const raw of lines){ const line=raw.trim();
    if(line.startsWith('!')||line==='') continue;
    if(line[0]==='@'){
      const m=line.match(/^@\s*([A-Za-z0-9_-]+)\s*:\s*(.*)$/); if(!m) throw new Error('malformed rule: '+line);
      const name=m[1]; let rhs=m[2]; let cont=null; const gt=rhs.indexOf('>');
      if(gt>=0){ cont=rhs.slice(gt+1).trim().split(/\s+/).filter(Boolean); rhs=rhs.slice(0,gt).trim(); }
      const nums=rhs.split(/\s+/).filter(Boolean).map(Number);
      if(!nums.length||nums.some(n=>!isFinite(n))) throw new Error('bad cut spec in @'+name);
      let weights;
      if(nums.length===1){ const N=nums[0]; if(!Number.isInteger(N)||N<2) throw new Error('@'+name+': single value must be integer ≥2'); weights=Array(N).fill(1/N); }
      else { const s=nums.reduce((a,b)=>a+b,0); if(s<=0) throw new Error('@'+name+': weights sum to 0'); weights=nums.map(n=>n/s); }
      let conts;
      if(!cont) conts=weights.map(()=>null);
      else if(cont.length===1){ const c=cont[0]; conts=weights.map(()=>(c==='_'||c==='.')?null:c); }
      else if(cont.length===weights.length) conts=cont.map(c=>(c==='_'||c==='.')?null:c);
      else throw new Error('@'+name+': '+cont.length+' continuations for '+weights.length+' children');
      rules[name]={weights,conts}; if(start===null) start=name; continue;
    }
    if(!sawDesc){ desc=raw.trim(); sawDesc=true; }
  }
  if(!start) throw new Error('no @rules defined');
  if(rules['root']) start='root';
  for(const [n,r] of Object.entries(rules)) for(const c of r.conts) if(c!==null && !rules[c]) throw new Error('@'+n+' references unknown rule "'+c+'"');
  return {description:desc, rules, start};
}
function cyc2Boundaries(g, maxDepth, cap=40000){
  const acc=new Map(); const put=(p,l)=>{ p=+p.toFixed(9); if(!acc.has(p)||l<acc.get(p)) acc.set(p,l); };
  put(0,0); let count=0;
  (function rec(a,b,rn,depth){ if(rn==null||depth>maxDepth) return; const r=g.rules[rn]; if(!r) return; let x=a;
    for(let i=0;i<r.weights.length;i++){ const w=(b-a)*r.weights[i], cA=x, cB=x+w;
      if(i>0) put(cA,depth); if(++count>cap) return; rec(cA,cB,r.conts[i],depth+1); x=cB; } })(0,1,g.start,1);
  return [...acc.entries()].map(([phase,level])=>({phase,level})).sort((u,v)=>u.phase-v.phase);
}
/* unified: boundaries (phase in [0,1), with metric level) for any active cycle */
function cycleBoundaries(c, depth){
  if(!c || c.isEven) return [{phase:0,level:0}];
  if(c.kind==='grammar' && c.grammar) return cyc2Boundaries(c.grammar, depth);
  const out=[{phase:0,level:0}];
  for(const p of (c.phasesNorm||[])) if(p>0) out.push({phase:p, level:1});   // flat onsets are all level 1
  return out;
}

/* join selected notes into one glide (connect events end-to-start in time order) */
function joinSelection(){
  const sel=selectedNotes().slice().sort((a,b)=>a.start-b.start);
  if(sel.length<2){ flash('select 2+ notes to join'); return; }
  const start=sel[0].start, end=Math.max(...sel.map(n=>n.start+n.dur)); const dur=Math.max(1e-4,end-start);
  const raw=[];
  for(const n of sel){ const k=n.pts.length<=1?[0]:n.pts.map(p=>p.t);
    for(const tt of k){ const beat=n.start+tt*n.dur; const hz=pitchAt(n, n.pts.length<=1?0:tt); const last=raw[raw.length-1];
      if(last && beat<=last.beat){ if(Math.abs(hz-last.hz)>1e-6) last.hz=hz; continue; } raw.push({beat,hz}); } }
  const joined={id:NID++, type:'glide', curve:sel[0].curve||defaultCurve, vel:sel[0].vel, voice:sel[0].voice||1, start, dur,
    pts: raw.map(q=>({t:(q.beat-start)/dur, hz:q.hz}))};
  if(joined.pts.length<2){ flash('cannot join'); return; }
  pushHistory();
  notes=notes.filter(n=>!selection.has(n.id)); notes.push(joined);

/* split — inverse of join: break a note at selected interior point(s);
   a wholly-selected multi-point note explodes into one note per segment. */
function splitNoteAt(note, idxs){
  const cut=[0, ...idxs, note.pts.length-1];
  const abs=note.pts.map(q=>({beat:note.start+q.t*note.dur, hz:q.hz, curve:q.curve}));
  const pieces=[];
  for(let k=0;k<cut.length-1;k++){
    const a=cut[k], b=cut[k+1], slice=abs.slice(a,b+1);
    if(slice.length<2) continue;
    const start=slice[0].beat, end=slice[slice.length-1].beat, dur=Math.max(1e-4,end-start);
    const pts=slice.map((q,j)=>{ const o={t:(q.beat-start)/dur, hz:q.hz}; if(q.curve && j<slice.length-1) o.curve=q.curve; return o; });
    pieces.push({id:NID++, start, dur, type:(note.type==='free'?'free':'glide'), curve:note.curve, vel:note.vel, voice:note.voice||1, pts});
  }
  return pieces;
}
function splitSelection(){
  const map=new Map();   // note -> Set(interior split idx)
  for(const id of selection){ const n=notes.find(x=>x.id===id); if(n && n.pts.length>2){ const s=new Set(); for(let i=1;i<n.pts.length-1;i++) s.add(i); map.set(n,s); } }
  for(const [n,set] of ptSel){ const s=map.get(n)||new Set(); for(const i of set) if(i>0 && i<n.pts.length-1) s.add(i); if(s.size) map.set(n,s); }
  if(pointSel && pointSel.idx>0 && pointSel.idx<pointSel.note.pts.length-1){ const n=pointSel.note; const s=map.get(n)||new Set(); s.add(pointSel.idx); map.set(n,s); }
  if(!map.size){ flash('select an interior point (or a whole multi-point note) to split'); return; }
  const newNotes=[]; const remove=new Set();
  for(const [n,set] of map){ const pieces=splitNoteAt(n,[...set].sort((a,b)=>a-b)); if(pieces.length>1){ remove.add(n); newNotes.push(...pieces); } }
  if(!newNotes.length){ flash('nothing to split'); return; }
  pushHistory();
  notes=notes.filter(n=>!remove.has(n)).concat(newNotes);
  clearGran(); selection=new Set(newNotes.map(n=>n.id));
  changed(); flash(`split into ${newNotes.length} notes`);
}

  const nv=new Set(notes.map(x=>x.voice||1)).size;
  let extra='';
  if(segSel){ const sc=segCurve(segSel.note,segSel.seg);
    extra=` · segment ${segSel.seg+1}/${segSel.note.pts.length-1} of v${segSel.note.voice||1} · ${sc}`; }
  else if(selection.size===1){ const s=[...selection][0]; const note=notes.find(x=>x.id===s);
    if(note){ const hz=pitchAt(note,0); const mf=freqToMidi(hz,settings.a4); const base=Math.round(mf);
      extra=` · sel v${note.voice||1} ${note.type} @ beat ${note.start.toFixed(2)} · ${hz.toFixed(2)}Hz (${midiToName(base)} ${((mf-base)*100>=0?'+':'')}${((mf-base)*100).toFixed(0)}¢)`; } }
  else if(selection.size>1) extra=` · ${selection.size} selected`;
  status.innerHTML=`ready — <span style="color:var(--ink)">${n} note${n!==1?'s':''}</span> · ${nv} voice${nv!==1?'s':''}${extra}`;
}

/* keyboard */
let spaceDown=false;
window.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='SELECT') return;
  if(penNote && (e.code==='Enter'||e.code==='Escape')){ e.preventDefault(); finalizePen(); return; }
  if(e.code==='Space'){ e.preventDefault(); togglePlay(); return; }
  const map={KeyV:'select',KeyH:'hold',KeyG:'glide',KeyP:'pen',KeyF:'free',KeyE:'erase'};
  if(map[e.code] && !e.ctrlKey && !e.metaKey && !e.altKey) setTool(map[e.code]);
  if((e.ctrlKey||e.metaKey)&&e.code==='KeyZ'){ e.preventDefault(); if(e.shiftKey) redo(); else undo(); return; }
  if((e.ctrlKey||e.metaKey)&&e.code==='KeyY'){ e.preventDefault(); redo(); return; }
  if(e.code==='Delete'||e.code==='Backspace'){ if(penNote) finalizePen(); else if(selection.size||ptSel.size){ deleteSelection(); changed(); } }
  if((e.ctrlKey||e.metaKey)&&e.code==='KeyA'){ e.preventDefault(); segSel=null; pointSel=null; ptSel=new Map(); selection=new Set(notes.map(n=>n.id)); changed(); }
  if((e.ctrlKey||e.metaKey)&&e.code==='KeyC'){ e.preventDefault(); doCopy(); }
  if((e.ctrlKey||e.metaKey)&&e.code==='KeyX'){ e.preventDefault(); doCut(); }
  if((e.ctrlKey||e.metaKey)&&e.code==='KeyV'){ e.preventDefault(); doPaste(); }
  if((e.ctrlKey||e.metaKey)&&e.code==='KeyD'){ e.preventDefault(); doDuplicate(); }
  if(e.code==='KeyJ' && !e.ctrlKey && !e.metaKey) joinSelection();
  if(e.code==='KeyK' && !e.ctrlKey && !e.metaKey) splitSelection();
  if(e.code==='BracketLeft') changeVoice(-1);
  if(e.code==='BracketRight') changeVoice(1);
  if(/^Digit[1-9]$/.test(e.code) && selection.size) setVoice(+e.code.slice(5));
});

/* ============================================================
   PLAYBACK — one oscillator per voice (mono within a voice)
   ============================================================ */
let actx=null, oscs=[], rafId=null, playT0=0, stopAt=0, playing=false;
const playBtn=document.getElementById('play'), waveSel=document.getElementById('wave'), loopChk=document.getElementById('loop');
playBtn.onclick=togglePlay;
function togglePlay(){ playing?stopPlay():startPlay(); }
function startPlay(){
  if(!notes.length) return;
  actx=actx||new (window.AudioContext||window.webkitAudioContext)();
  if(actx.state==='suspended') actx.resume();
  const spb=60/settings.bpm;
  const t0=actx.currentTime+0.06; playT0=t0;
  // group by voice
  const byVoice=new Map();
  for(const n of notes){ const v=n.voice||1; if(!byVoice.has(v)) byVoice.set(v,[]); byVoice.get(v).push(n); }
  const nVoices=byVoice.size;
  const master=actx.createGain(); master.gain.value=Math.min(0.28, 0.5/Math.max(1,Math.sqrt(nVoices))); master.connect(actx.destination);
  oscs=[]; let endMax=0;
  for(const [v,arr] of byVoice){
    const ns=arr.slice().sort((a,b)=>a.start-b.start);
    for(let i=0;i<ns.length;i++){ ns[i]._end=(i<ns.length-1)?Math.min(ns[i].start+ns[i].dur,ns[i+1].start):ns[i].start+ns[i].dur; }
    const osc=actx.createOscillator(); osc.type=waveSel.value;
    const gain=actx.createGain(); gain.gain.setValueAtTime(0.0001,t0);
    osc.connect(gain); gain.connect(master);
    osc.frequency.setValueAtTime(Math.max(20,pitchAt(ns[0],0)),t0);
    let last=0;
    for(const n of ns){
      const st=t0+n.start*spb, en=t0+Math.max(n.start+0.02,n._end)*spb;
      osc.frequency.setValueAtTime(Math.max(20,pitchAt(n,0)),st);
      const fsteps=n.pts.length<=1?1:Math.max(2,Math.ceil((en-st)/0.02));
      for(let s=1;s<=fsteps;s++){ const f=s/fsteps; osc.frequency.linearRampToValueAtTime(Math.max(20,pitchAt(n,f)), st+(en-st)*f); }
      gain.gain.setValueAtTime(0.0001, Math.max(last, st-0.004));
      gain.gain.linearRampToValueAtTime(0.9, st+0.006);
      gain.gain.setValueAtTime(0.9, Math.max(st+0.007,en-0.02));
      gain.gain.linearRampToValueAtTime(0.0001, en);
      last=en;
    }
    if(last>endMax) endMax=last;
    osc.start(t0); oscs.push(osc);
  }
  stopAt=endMax;
  for(const o of oscs) o.stop(stopAt+0.05);
  playing=true; playBtn.textContent='■ stop'; playBtn.classList.add('on');
  if(oscs.length) oscs[0].onended=()=>{ if(loopChk.checked && playing){ stopPlayInternal(); startPlay(); } else stopPlay(); };
  tickPlayhead();
}
function tickPlayhead(){
  if(!playing) return;
  const spb=60/settings.bpm; const el=actx.currentTime-playT0;
  playhead=el/spb; draw();
  rafId=requestAnimationFrame(tickPlayhead);
}
function stopPlayInternal(){ for(const o of oscs){ try{o.onended=null; o.stop();}catch(e){} } oscs=[]; if(rafId)cancelAnimationFrame(rafId); }
function stopPlay(){ playing=false; stopPlayInternal(); playhead=null; playBtn.textContent='▶ play'; playBtn.classList.remove('on'); draw(); }
waveSel.onchange=()=>{ if(playing){ stopPlay(); startPlay(); } };

/* ============================================================
   IMPORT / EXPORT
   ============================================================ */
const impBtn=document.getElementById('impMidi'), impFile=document.getElementById('impFile');
impBtn.onclick=()=>impFile.click();
impFile.onchange=async()=>{
  const f=impFile.files[0]; if(!f) return;
  if(typeof Midi==='undefined'){ alert('MIDI import library not loaded (offline?). Export still works.'); return; }
  const buf=await f.arrayBuffer();
  let imp;
  try{ imp=notesFromMidi(buf, settings.range, settings.a4); }
  catch(err){ alert('Could not parse MIDI: '+err.message); return; }
  pushHistory();
  notes=imp.notes; clearGran();
  if(imp.bpm) bpm.value=Math.round(imp.bpm);
  NID=Math.max(NID,0,...notes.map(n=>n.id))+1;
  // expand bars to fit
  const maxB=Math.max(0,...notes.map(n=>n.start+n.dur));
  bars.value=Math.max(settings.bars, Math.ceil((maxB+1)/settings.sigNum));
  fitContent(); changed();
  flash(`imported ${notes.length} notes · ${imp.voices} voice${imp.voices!==1?'s':''} @ ${Math.round(imp.bpm)} bpm · bend read as ±${settings.range}st`);
  impFile.value='';
};
