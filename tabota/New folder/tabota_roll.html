/* bend report drawer */
const drawer=document.getElementById('drawer'), drawerBody=document.getElementById('drawerBody'),
 drawerTitle=document.getElementById('drawerTitle');
document.getElementById('drawerClose').onclick=()=>drawer.classList.remove('open');
document.getElementById('report').onclick=()=>{
  if(!notes.length){ flash('nothing to report'); return; }
  const {report,warnings,voices,channelsUsed}=buildMidi(notes,exportOpts());
  drawerTitle.textContent='Pitch-bend report';
  const maxSpan=Math.max(0.001,...report.map(r=>r.span));
  const chmap=channelsUsed.map(c=>`v${c.voice}→ch${c.ch}`).join(' · ');
  let html=`<div class="summary"><b>${report.length}</b> notes · <b>${voices}</b> voice${voices!==1?'s':''} · bend ±<b>${settings.range}</b>st<br>
    <span style="color:var(--ink-dim)">${chmap}</span><br>
    Each voice is its own MIDI channel with an independent pitch-bend stream; within a voice the line is monophonic (overlaps steal). Each note rides its nearest 12-TET key at onset — exact-12-TET onsets read pb 8192 (center). Bends past ±${settings.range}st hard-wall.</div>`;
  if(warnings.length) html+=`<div class="summary" style="border-color:var(--ember);color:var(--ember)"><b>${warnings.length} hard-walled:</b><br>${warnings.map(w=>'· '+w).join('<br>')}</div>`;
  html+=`<table><thead><tr><th class="l">beat</th><th>v</th><th>ch</th><th class="l">type</th><th>onset Hz</th><th>key</th><th>¢</th><th>pb14</th><th class="l">span</th></tr></thead><tbody>`;
  for(const r of report){
    const w=Math.round((r.span/maxSpan)*60);
    html+=`<tr><td class="l">${r.start.toFixed(2)}</td><td style="color:${voiceColor(r.voice)};font-weight:600">${r.voice}</td><td>${r.ch}</td><td class="l">${r.type}</td><td>${r.startHz.toFixed(2)}</td>
      <td>${r.baseName}</td><td>${r.cents>=0?'+':''}${r.cents.toFixed(0)}</td>
      <td${r.clipped?' class="flag"':''}>${r.pb0}${r.clipped?'⚠':''}</td>
      <td class="l"><span class="bendbar" style="width:${w}px;background:${r.overflow?'var(--ember)':'var(--tide)'}"></span> ${r.span.toFixed(2)}st</td></tr>`;
  }
  html+=`</tbody></table><div class="hint">pb14 = 14-bit bend written at onset (0–16383, 8192=center). “span” = max semitone deviation the note asks of its key; <span style="color:var(--ember)">amber</span> bars exceeded ±${settings.range}st and were hard-walled — widen bend range or split the note. Voice→channel lets simultaneous microtonal voices bend independently.</div>`;
  drawerBody.innerHTML=html; drawer.classList.add('open');
};

/* Tabota v2 JSON export (ecosystem bonus) — the determinate fragment.
   Every drawn note is value + position.at + extent.duration in one metered
   frequency frame; voice/velocity ride in payload. A piano roll is, ontologically,
   overdetermination-through-regime: every onset is an absolute coordinate in the
   mother frame, never a note-to-note relation — so the export never needs
   relations, landmarks, ranges, or the recursion. */
document.getElementById('expJson').onclick=()=>{
  if(!notes.length){ flash('nothing to export'); return; }
  const ns=notes.slice().sort((a,b)=>(a.voice||1)-(b.voice||1)||a.start-b.start);
  const events=ns.map(n=>{
    const ev={ position:{ at:+n.start.toFixed(4) }, extent:{ duration:+n.dur.toFixed(4) },
               payload:{ voice:n.voice||1, velocity:n.vel } };
    if(n.type==='hold'){ ev.value={ pitch:{ hz:+pitchAt(n,0).toFixed(3) } }; }
    else if(n.type==='glide' && n.pts.length===2){
      ev.value={ pitch:{ from:+pitchAt(n,0).toFixed(3), to:+pitchAt(n,1).toFixed(3) } };
      const c=segCurve(n,0); if(c && c!=='linear') ev.payload.curve=c;
    } else { // multi-point / freehand: determinate envelope in value, full contour in payload
      ev.value={ pitch:{ from:+pitchAt(n,0).toFixed(3), to:+pitchAt(n,1).toFixed(3) } };
      ev.payload.contour = n.pts.map((p,i)=>{ const o={pos:+p.t.toFixed(4), hz:+p.hz.toFixed(3)}; if(n.type==='glide' && i<n.pts.length-1) o.curve=segCurve(n,i); return o; });
    }
    return ev;
  });
  const voices=[...new Set(ns.map(n=>n.voice||1))].sort((a,b)=>a-b);
  const doc={
    projectName:'TabotaRoll',
    languageVersion:'2.0',
    metadata:{ profile:'determinate' },
    score:[{
      id:'TabotaRoll', role:'regime',
      frame:{
        temporal:'metered',
        temporalSettings:{ beats:totalBeats(), bpm:settings.bpm, timeSignature:settings.sigNum+'/'+settings.sigDen },
        axis:'frequency', axisSettings:{ a4:settings.a4 }
      },
      payload:{ voices, midiExport:{ rule:'monophonic-per-voice', voiceToChannel:'voice N → base channel + (N-1)', bendRange:settings.range } },
      events
    }]
  };
  download(new Blob([JSON.stringify(doc,null,2)],{type:'application/json'}),'tabota-roll.json');
  flash('exported Tabota v2 JSON ('+voices.length+' voice'+(voices.length!==1?'s':'')+')');
};

/* Tabota JSON import — reconstruct notes/voices/curves. Reads v2 (the format the
   export above now writes) and still reads legacy v1.5 for old files. Only the
   determinate fragment becomes notes; relational / ranged / referenced events are
   valid Tabota but cannot be drawn on a roll, so they are counted as skipped. */
function tabotaToHz(v, axis, a4){
  if(v==null) return null;
  if(typeof v==='number') return axis==='symbolic' ? midiToFreq(v,a4) : v;   // symbolic number = MIDI; else Hz
  const m=noteNameToMidi(String(v).trim());
  return m!=null ? midiToFreq(m,a4) : null;
}
function _notesFromV1(doc){
  const a4=(doc.modeSettings && +doc.modeSettings.a4) || settings.a4;
  const rs=doc.regimeSettings||{};
  const bpm=(+rs.bpm)||settings.bpm;
  const tr=doc.temporalRegime||'metered';
  const axis=doc.axisMode||'frequency';
  const sig=rs.timeSignature||[settings.sigNum,settings.sigDen];
  const toBeats=(t)=> tr==='chronological' ? (t*bpm/60) : (+t||0);   // metered: already beats
  const evs=doc.events||[]; const out=[]; let seqBeat=0, skipped=0;
  for(const e of evs){
    if(!e || (e.type && e.type!=='line' && e.type!=='point')){ skipped++; continue; }
    let start, dur;
    if(tr==='achronous'){ start=seqBeat; dur=(e.duration!=null?toBeats(e.duration):settings.defLen); if(dur<=0)dur=settings.defLen; seqBeat+=dur; }
    else {
      const st=e.startTime!=null?e.startTime:(e.time!=null?e.time:0); start=toBeats(st);
      if(e.duration!=null) dur=toBeats(e.duration);
      else if(e.endTime!=null) dur=toBeats(e.endTime)-start;
      else dur=settings.defLen;
      if(dur<=0) dur=settings.defLen;
    }
    const voice=Math.max(1, e.voice||1);
    const velo=e.velocity!=null?e.velocity:(+vel.value||96);
    let type, pts, ncurve;
    if(Array.isArray(e.contour) && e.contour.length){
      const cs=e.contour.map(c=>({t:(c.pos!=null?c.pos:c.t)||0, hz:tabotaToHz(c.hz!=null?c.hz:(c.yValue!=null?c.yValue:c.note),axis,a4), curve:c.curve}))
                        .filter(c=>c.hz!=null).sort((x,y)=>x.t-y.t);
      if(cs.length<2){ skipped++; continue; }
      type = cs.some(c=>c.curve) ? 'glide' : 'free';
      pts = cs.map(c=>{ const o={t:Math.max(0,Math.min(1,c.t)), hz:c.hz}; if(c.curve) o.curve=c.curve; return o; });
    } else {
      const sy=tabotaToHz(e.startYValue!=null?e.startYValue:(e.yValue!=null?e.yValue:e.note),axis,a4);
      let ey=tabotaToHz(e.endYValue,axis,a4); if(ey==null) ey=sy;
      if(sy==null){ skipped++; continue; }
      if(Math.abs(1200*Math.log2(ey/sy))<0.5){ type='hold'; pts=[{t:0,hz:sy}]; }
      else { type='glide'; pts=[{t:0,hz:sy},{t:1,hz:ey}]; ncurve=e.curve||'linear'; }
    }
    const n={id:NID++, start, dur, type, vel:velo, voice, pts};
    if(type==='glide' && ncurve) n.curve=ncurve;
    out.push(n);
  }
  const bend=(doc.midiExport && +doc.midiExport.bendRange)||null;
  return {notes:out, bpm, sig, a4, skipped, bend};
}
/* ---- v2 reader: an ADAPTER over the shared interpreter (tabota-resolve.js).
   The Roll no longer interprets Tabota itself — it asks resolve() where everything
   is, then keeps only its receptor's slice (pitched material placed in seconds) and
   converts that to its beat-based note model. Points, achronous/ordinal, bands,
   relational cycles and indeterminate things are dropped (counted as skipped);
   index.html, with the same resolve(), draws them. ---- */
function _notesFromV2(doc){
  const TR = (typeof window!=='undefined') && window.TabotaResolve;
  if(!TR || !TR.resolve){
    flash('resolver (tabota-resolve.js) not loaded — open via a local server');
    return {notes:[], bpm:settings.bpm, sig:[settings.sigNum,settings.sigDen], a4:settings.a4, skipped:0, bend:null};
  }
  const R = TR.resolve(doc);

  // master tempo / time-sig / tuning / bend — from the first metered + pitched frame in the doc
  let mBpm=null,mNum=null,mDen=null,mA4=null,bend=null;
  (function scan(list){ (list||[]).forEach(e=>{ if(!e||typeof e!=='object') return;
    const f=e.frame||{}, ts=f.temporalSettings||{}, as=f.axisSettings||{};
    if(f.temporal==='metered' && ts.bpm!=null && mBpm==null) mBpm=+ts.bpm;
    if(f.temporal==='metered' && ts.timeSignature && mNum==null){ const p=String(ts.timeSignature).split('/'); mNum=+p[0]||4; mDen=+p[1]||4; }
    if((f.axis==='frequency'||f.axis==='symbolic') && as.a4!=null && mA4==null) mA4=+as.a4;
    if(e.payload && e.payload.midiExport && e.payload.midiExport.bendRange) bend=+e.payload.midiExport.bendRange;
    if(e.events) scan(e.events);
  }); })(doc.score);
  const masterBpm=mBpm||settings.bpm, sigNum_=mNum||settings.sigNum, sigDen_=mDen||settings.sigDen, masterA4=mA4||settings.a4;
  const SPB = masterBpm/60;                         // seconds -> beats of the Roll's single tempo

  const out=[]; let skipped=0;
  for(const n of R.nodes){
    if(n.kind==='point'){ skipped++; continue; }    // points: valid Tabota, invisible on the Roll
    if(n.kind!=='pitch'){ continue; }               // ignore frames, tempo markers, lanes, text
    if(n.start.sec==null || n.tags.includes('ordinal') || !n.pitch){ skipped++; continue; }
    const m=n.pitch.mode;
    if(m!=='hz' && m!=='named' && m!=='glide'){ skipped++; continue; }   // band / relative: not drawable here
    const start=n.start.sec*SPB;
    const end=(n.end && n.end.sec!=null)?n.end.sec*SPB:start+settings.defLen;
    let dur=end-start; if(dur<=0) dur=settings.defLen;
    const voice=Math.max(1,(n.payload&&n.payload.voice)||1);
    const velo=(n.payload&&n.payload.velocity!=null)?n.payload.velocity:(+vel.value||96);

    let type, pts, ncurve;
    const contour = n.payload && Array.isArray(n.payload.contour) ? n.payload.contour : null;
    if(contour && contour.length>=2){
      const cs=contour.map(c=>({t:(c.pos!=null?c.pos:c.t)||0, hz:tabotaToHz(c.hz!=null?c.hz:(c.note!=null?c.note:c.yValue),'frequency',masterA4), curve:c.curve}))
                      .filter(c=>c.hz!=null).sort((a,b)=>a.t-b.t);
      if(cs.length<2){ skipped++; continue; }
      type=cs.some(c=>c.curve)?'glide':'free';
      pts=cs.map(c=>{ const o={t:Math.max(0,Math.min(1,c.t)),hz:c.hz}; if(c.curve)o.curve=c.curve; return o; });
    } else if(m==='glide'){
      const a=n.pitch.from, b=n.pitch.to; if(a==null||b==null){ skipped++; continue; }
      if(Math.abs(1200*Math.log2(b/a))<0.5){ type='hold'; pts=[{t:0,hz:a}]; }
      else { type='glide'; pts=[{t:0,hz:a},{t:1,hz:b}]; ncurve=(n.payload&&n.payload.curve)||'linear'; }
    } else {
      const hz=n.pitch.hz; if(hz==null){ skipped++; continue; }
      type='hold'; pts=[{t:0,hz}];
    }
    const note={id:NID++, start, dur, type, vel:velo, voice, pts};
    if(type==='glide' && ncurve) note.curve=ncurve;
    out.push(note);
  }
  return {notes:out, bpm:masterBpm, sig:[sigNum_,sigDen_], a4:masterA4, skipped, bend};
}
function _hasV2Shape(list){
  return Array.isArray(list) && list.some(ev=> ev && (ev.frame || ev.value || ev.position || ev.ref));
}
function notesFromTabota(doc){
  const v2 = (doc && typeof doc.languageVersion==='string' && /^2\./.test(doc.languageVersion)) || _hasV2Shape(doc && doc.score);
  return v2 ? _notesFromV2(doc) : _notesFromV1(doc);
}

const impJsonBtn=document.getElementById('impJson'), impJsonFile=document.getElementById('impJsonFile');

  if(!res.notes.length){ flash('no pitched events found in that JSON'); impJsonFile.value=''; return; }
  pushHistory();
  notes=res.notes; clearGran();
  bpm.value=Math.round(res.bpm);
  if(res.sig){ sigNum.value=res.sig[0]||4; sigDen.value=res.sig[1]||4; }
  a4.value=res.a4; if(res.bend){ bendRange.value=res.bend; document.getElementById('pillRange').textContent='±'+res.bend; }
  NID=Math.max(NID,0,...notes.map(n=>n.id))+1;
  const maxB=Math.max(0,...notes.map(n=>n.start+n.dur));
  bars.value=Math.max(1, Math.ceil((maxB+0.5)/Math.max(1,settings.sigNum)));
  fitContent(); changed();
  flash(`imported ${notes.length} events`+(res.skipped?` · ${res.skipped} skipped`:''));
  impJsonFile.value='';
};

   ============================================================ */
function seed(){
  // demo polyphony + a drawn multi-point glide that rises and falls across several notes
  const a=settings.a4;
  notes=[
    {id:NID++, start:0, dur:6, type:'hold',  vel:80, voice:1, pts:[{t:0,hz:a/2}]},                         // A3 drone (voice 1)
    {id:NID++, start:0, dur:1, type:'hold',  vel:100,voice:2, pts:[{t:0,hz:a}]},                            // A4 exact
    {id:NID++, start:1, dur:1, type:'hold',  vel:100,voice:2, pts:[{t:0,hz:a*Math.pow(2,3.5/12)}]},         // +350¢ neutral third
    {id:NID++, start:2, dur:2, type:'glide', curve:'smooth', vel:100,voice:2, pts:[{t:0,hz:a},{t:1,hz:a*Math.pow(2,7/12)}]}, // eased glide A4->E5
    {id:NID++, start:4, dur:2, type:'glide', vel:100,voice:2, pts:[                          // multi-point glide, per-segment curves
       {t:0,hz:a,curve:'exp'},{t:.25,hz:a*Math.pow(2,4/12),curve:'log'},{t:.5,hz:a*Math.pow(2,-2/12),curve:'smooth'},{t:.75,hz:a*Math.pow(2,5/12),curve:'linear'},{t:1,hz:a}]},
  ];
}
populateRoot(); populateScaleSelect(); loadManifest();
populateCycleSelect(); loadCycManifest();
window.addEventListener('load',()=>{ resize(); seed(); fitContent(); regimePill(); changed(); });
resize(); // initial (in case load already fired)
})();
</script>
